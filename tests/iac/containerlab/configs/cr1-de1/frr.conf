frr version 10.4.1
frr defaults traditional
hostname cr1-de1
service integrated-vtysh-config
!
ipv6 prefix-list AS215932v6-out seq 5 permit 2a0c:b641:b50::/44
!
interface lo
 ipv6 address 2a0c:b641:b50::b/128
exit
!
interface eth1
 ipv6 address 2a0c:b641:b50:ff11::/127
exit
!
interface eth2
 ipv6 address 2a0c:b641:b50:ff12::1/127
exit
!
router bgp 215932
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 neighbor 2a0c:b641:b50:ff11::1 remote-as 215932
 neighbor 2a0c:b641:b50:ff12:: remote-as 215932
 address-family ipv6 unicast
  network 2a0c:b641:b50::/44
  neighbor 2a0c:b641:b50:ff11::1 activate
  neighbor 2a0c:b641:b50:ff12:: activate
 exit-address-family
exit
