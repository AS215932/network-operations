frr version 10.4.1
frr defaults traditional
hostname rtr
service integrated-vtysh-config
!
interface lo
 ipv6 address 2a0c:b641:b50::d/128
exit
!
interface eth1
 ipv6 address 2a0c:b641:b50:ff10::1/127
exit
!
interface eth2
 ipv6 address 2a0c:b641:b50:ff11::1/127
exit
!
router bgp 215932
 bgp router-id 0.0.0.13
 no bgp default ipv4-unicast
 neighbor 2a0c:b641:b50:ff10:: remote-as 215932
 neighbor 2a0c:b641:b50:ff11:: remote-as 215932
 address-family ipv6 unicast
  network 2a0c:b641:b50::/44
  neighbor 2a0c:b641:b50:ff10:: activate
  neighbor 2a0c:b641:b50:ff11:: activate
 exit-address-family
exit
