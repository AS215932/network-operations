# OpenBSD autoinstall response file for the firewall VM (fw)
#
# Usage:
#   1. Serve this file at http://<dom0-mgmt-ip>/install.conf
#   2. Boot the VM from the OpenBSD install ISO
#   3. At the I/U/A/S prompt, type 'a' for Autoinstall
#   4. Select the NIC on the mgmt network for DHCP (xnf1)
#   5. Confirm the install.conf URL
#
# Requires:
#   - DHCP server on mgmt bridge with next-server pointing to dom0
#   - HTTP server on dom0 serving this file on port 80
#   - iptables rules allowing traffic from mgmt bridge to dom0
#
# NIC mapping (XCP-NG Xen PV drivers):
#   xnf0 = vif device 0 = WAN (xenbr0)
#   xnf1 = vif device 1 = mgmt (xapi0)
#   xnf2 = vif device 2 = transit (xapi1)

