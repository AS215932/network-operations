version: 1
defaults:
  max_changed_files: 20
  max_file_bytes: 1048576
  denied_path_globs:
    - ".env"
    - ".env.*"
    - "*.key"
    - "*.pem"
    - "id_*"
    - "secrets/**"
    - "**/secrets/**"
  denied_content_patterns:
    - "-----BEGIN .*PRIVATE KEY-----"
    - "AKIA[0-9A-Z]{16}"
    - "(?i)(api_key|token|secret)\\s*=\\s*['\\\"][^'\\\"]+['\\\"]"
  allowed_gate_commands:
    - "python"
    - "uv"
    - "pytest"
    - "git"
  protected_branch_prefixes:
    - "main"
    - "master"
    - "production"
    - "prod"
  allowed_pr_remotes:
    - "origin"
  allowed_handoff_dirs:
    - "/tmp"
repos: {}
