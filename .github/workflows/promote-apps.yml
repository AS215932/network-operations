---
name: promote-apps

on:
  repository_dispatch:
    types: [app-promote]
  workflow_dispatch:
    inputs:
      title:
        description: Promotion PR title
        type: string
        required: true
        default: Promote app SHAs
      noc_agent_sha:
        description: Optional AS215932/noc-agent commit SHA
        type: string
        required: false
        default: ""
      hyrule_mcp_sha:
        description: Optional AS215932/hyrule-mcp commit SHA
        type: string
        required: false
        default: ""
      hyrule_cloud_sha:
        description: Optional AS215932/hyrule-cloud commit SHA
        type: string
        required: false
        default: ""
      hyrule_web_sha:
        description: Optional AS215932/hyrule-web commit SHA
        type: string
        required: false
        default: ""
      hyrule_network_proxy_sha:
        description: Optional AS215932/hyrule-network-proxy commit SHA
        type: string
        required: false
        default: ""
      impact:
        description: Short deploy impact note
        type: string
        required: false
        default: Automated app SHA promotion.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-apps
  cancel-in-progress: false

jobs:
  promote:
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Generate promotion app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PROMOTION_APP_ID }}
          private-key: ${{ secrets.PROMOTION_APP_PRIVATE_KEY }}
          owner: AS215932
          repositories: network-operations

      - name: Resolve promotion request
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REPOSITORY: ${{ github.event.client_payload.repository }}
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
          DISPATCH_TITLE: ${{ github.event.client_payload.title }}
          DISPATCH_IMPACT: ${{ github.event.client_payload.impact }}
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_IMPACT: ${{ inputs.impact }}
          INPUT_NOC_AGENT_SHA: ${{ inputs.noc_agent_sha }}
          INPUT_HYRULE_MCP_SHA: ${{ inputs.hyrule_mcp_sha }}
          INPUT_HYRULE_CLOUD_SHA: ${{ inputs.hyrule_cloud_sha }}
          INPUT_HYRULE_WEB_SHA: ${{ inputs.hyrule_web_sha }}
          INPUT_HYRULE_NETWORK_PROXY_SHA: ${{ inputs.hyrule_network_proxy_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="${INPUT_TITLE:-Promote app SHAs}"
          impact="${INPUT_IMPACT:-Automated app SHA promotion.}"
          noc_agent_sha="${INPUT_NOC_AGENT_SHA:-}"
          hyrule_mcp_sha="${INPUT_HYRULE_MCP_SHA:-}"
          hyrule_cloud_sha="${INPUT_HYRULE_CLOUD_SHA:-}"
          hyrule_web_sha="${INPUT_HYRULE_WEB_SHA:-}"
          hyrule_network_proxy_sha="${INPUT_HYRULE_NETWORK_PROXY_SHA:-}"

          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            repo="${DISPATCH_REPOSITORY:-}"
            sha="${DISPATCH_SHA:-}"
            sha="${sha,,}"

            if ! [[ "$sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::repository_dispatch payload sha must be a 40-character commit SHA"
              exit 1
            fi

            case "$repo" in
              AS215932/noc-agent)
                noc_agent_sha="$sha"
                ;;
              AS215932/hyrule-mcp)
                hyrule_mcp_sha="$sha"
                ;;
              AS215932/hyrule-cloud)
                hyrule_cloud_sha="$sha"
                ;;
              AS215932/hyrule-web)
                hyrule_web_sha="$sha"
                ;;
              AS215932/hyrule-network-proxy)
                hyrule_network_proxy_sha="$sha"
                ;;
              *)
                echo "::error::unsupported promotion source repository: ${repo:-<missing>}"
                exit 1
                ;;
            esac

            canonical="$(gh api "repos/${repo}/commits/${sha}" --jq .sha)"
            if [ "$canonical" != "$sha" ]; then
              echo "::error::commit ${sha} was not found in ${repo}"
              exit 1
            fi

            title="${DISPATCH_TITLE:-Promote ${repo#AS215932/} ${sha:0:7}}"
            impact="${DISPATCH_IMPACT:-Automated promotion request from ${repo}@${sha}.}"
          fi

          {
            printf 'title=%s\n' "$title"
            printf 'impact=%s\n' "$impact"
            printf 'noc_agent_sha=%s\n' "$noc_agent_sha"
            printf 'hyrule_mcp_sha=%s\n' "$hyrule_mcp_sha"
            printf 'hyrule_cloud_sha=%s\n' "$hyrule_cloud_sha"
            printf 'hyrule_web_sha=%s\n' "$hyrule_web_sha"
            printf 'hyrule_network_proxy_sha=%s\n' "$hyrule_network_proxy_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Load promotion branch
        env:
          BRANCH: promotion/app-sha-pins
        run: |
          set -euo pipefail
          if git fetch origin "$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi

      - name: Update app pins
        env:
          PROMOTION_TITLE: ${{ steps.resolve.outputs.title }}
          PROMOTION_IMPACT: ${{ steps.resolve.outputs.impact }}
          NOC_AGENT_SHA: ${{ steps.resolve.outputs.noc_agent_sha }}
          HYRULE_MCP_SHA: ${{ steps.resolve.outputs.hyrule_mcp_sha }}
          HYRULE_CLOUD_SHA: ${{ steps.resolve.outputs.hyrule_cloud_sha }}
          HYRULE_WEB_SHA: ${{ steps.resolve.outputs.hyrule_web_sha }}
          HYRULE_NETWORK_PROXY_SHA: ${{ steps.resolve.outputs.hyrule_network_proxy_sha }}
        run: |
          scripts/ci/promote-app-pins.py \
            --title "$PROMOTION_TITLE" \
            --impact "$PROMOTION_IMPACT" \
            --noc-agent-sha "$NOC_AGENT_SHA" \
            --hyrule-mcp-sha "$HYRULE_MCP_SHA" \
            --hyrule-cloud-sha "$HYRULE_CLOUD_SHA" \
            --hyrule-web-sha "$HYRULE_WEB_SHA" \
            --hyrule-network-proxy-sha "$HYRULE_NETWORK_PROXY_SHA" \
            --body-file /tmp/promotion-body.md

      - name: Validate pins
        run: scripts/ci/iac-static.sh

      - name: Check promotion diff
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- ansible/inventory/host_vars/noc.yml ansible/inventory/host_vars/api.yml ansible/inventory/host_vars/web.yml ansible/inventory/host_vars/netproxy.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No app pin changes requested; promotion PR not needed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit promotion branch
        if: steps.diff.outputs.changed == 'true'
        env:
          BRANCH: promotion/app-sha-pins
          COMMIT_MESSAGE: ${{ steps.resolve.outputs.title }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ansible/inventory/host_vars/noc.yml ansible/inventory/host_vars/api.yml ansible/inventory/host_vars/web.yml ansible/inventory/host_vars/netproxy.yml
          git commit -m "$COMMIT_MESSAGE"
          git push --force-with-lease origin "$BRANCH"

      - name: Open or update promotion PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: promotion/app-sha-pins
          PR_TITLE: ${{ steps.resolve.outputs.title }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Use the REST API rather than `gh pr create`/`gh pr edit`: those issue a
          # GraphQL projectCards query that hard-fails (exit 1) since GitHub's
          # Projects-classic sunset, which previously blocked every promotion PR.
          body="$(cat /tmp/promotion-body.md)"
          existing="$(gh api \
            "repos/${REPO}/pulls?head=${REPO%%/*}:${BRANCH}&state=open" \
            --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/${REPO}/pulls/${existing}" \
              -f title="$PR_TITLE" \
              -f body="$body" >/dev/null
            echo "Updated PR #$existing" >> "$GITHUB_STEP_SUMMARY"
          else
            number="$(gh api --method POST "repos/${REPO}/pulls" \
              -f title="$PR_TITLE" \
              -f head="$BRANCH" \
              -f base=main \
              -f body="$body" \
              --jq '.number')"
            echo "Opened PR #$number" >> "$GITHUB_STEP_SUMMARY"
          fi
