---
name: app-promotion-deploy

on:
  push:
    branches: [main]
    paths:
      - ansible/inventory/host_vars/noc.yml
      - ansible/inventory/host_vars/api.yml
      - ansible/inventory/host_vars/web.yml
      - ansible/inventory/host_vars/netproxy.yml
      - ansible/inventory/host_vars/loop.yml
      - ansible/inventory/host_vars/mon.yml
      - ansible/inventory/host_vars/extmon.yml
      - ansible/playbooks/noc.yml
      - ansible/playbooks/engineering-loop.yml
      - ansible/roles/noc_agent/**
      - ansible/roles/engineering_loop/**
      - ansible/roles/knowledge_mcp/**
      - ansible/roles/knowledge_loop/**
      - ansible/roles/knowledge_api/**
      - ansible/roles/agent_core_collector/**
      - ansible/roles/agentic_observatory/**
      - configs/mon/icinga2/**
      - configs/mon/prometheus-rules/**
      - configs/mon/prometheus.yml
      - configs/mon/blackbox.yml
      - ansible/roles/prometheus/**
      - ansible/playbooks/prometheus.yml
      - configs/mon/alertmanager.yml.j2
      - ansible/roles/alertmanager/**
      - ansible/playbooks/alertmanager.yml
      - configs/xo-mcp-package.json
      - configs/noc-agent.env.j2
      - configs/noc-agent.service
      - configs/noc-agent-bot.service
      - ansible/roles/vault_agent/templates/noc-agent.env.ctmpl.j2
      - ansible/roles/vault_agent/templates/engineering-loop.env.ctmpl.j2
      - ansible/roles/vault_agent/templates/knowledge-loop.env.ctmpl.j2
      - ansible/roles/vault_agent/templates/knowledge-loop-github-app-key.pem.ctmpl.j2
      - ansible/roles/vault_agent/templates/agent-core-collector.env.ctmpl.j2
      - ansible/roles/vault_agent/templates/agentic-observatory.env.ctmpl.j2

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: production-app-promotion
  cancel-in-progress: false

jobs:
  detect:
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      firewall_matrix: ${{ steps.detect.outputs.firewall_matrix }}
      has_firewalls: ${{ steps.detect.outputs.has_firewalls }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - id: detect
        run: |
          set -euo pipefail
          changed="$(git diff --name-only HEAD^ HEAD -- \
            ansible/inventory/host_vars/noc.yml \
            ansible/inventory/host_vars/api.yml \
            ansible/inventory/host_vars/web.yml \
            ansible/inventory/host_vars/netproxy.yml \
            ansible/inventory/host_vars/loop.yml \
            ansible/inventory/host_vars/mon.yml \
            ansible/inventory/host_vars/extmon.yml \
            ansible/playbooks/noc.yml \
            ansible/playbooks/engineering-loop.yml \
            ansible/roles/noc_agent \
            ansible/roles/engineering_loop \
            ansible/roles/knowledge_mcp \
            ansible/roles/knowledge_loop \
            ansible/roles/knowledge_api \
            ansible/roles/agent_core_collector \
            ansible/roles/agentic_observatory \
            configs/mon/icinga2 \
            configs/mon/prometheus-rules \
            configs/mon/prometheus.yml \
            configs/mon/blackbox.yml \
            ansible/roles/prometheus \
            ansible/playbooks/prometheus.yml \
            configs/mon/alertmanager.yml.j2 \
            ansible/roles/alertmanager \
            ansible/playbooks/alertmanager.yml \
            configs/xo-mcp-package.json \
            configs/noc-agent.env.j2 \
            configs/noc-agent.service \
            configs/noc-agent-bot.service \
            ansible/roles/vault_agent/templates/noc-agent.env.ctmpl.j2 \
            ansible/roles/vault_agent/templates/engineering-loop.env.ctmpl.j2 \
            ansible/roles/vault_agent/templates/knowledge-loop.env.ctmpl.j2 \
            ansible/roles/vault_agent/templates/knowledge-loop-github-app-key.pem.ctmpl.j2 \
            ansible/roles/vault_agent/templates/agent-core-collector.env.ctmpl.j2 \
            ansible/roles/vault_agent/templates/agentic-observatory.env.ctmpl.j2)"
          python3 - "$changed" <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import sys

          changed = set(sys.argv[1].splitlines())
          matrix = []
          firewall_matrix = []

          def add_once(playbook: str, limit: str) -> None:
              entry = {"playbook": playbook, "limit": limit}
              if entry not in matrix:
                  matrix.append(entry)

          def add_firewall_once(limit: str) -> None:
              entry = {"playbook": "firewall", "limit": limit}
              if entry not in firewall_matrix:
                  firewall_matrix.append(entry)

          mon_icinga_changed = any(path.startswith("configs/mon/icinga2/") for path in changed)
          prometheus_changed = any(
              path.startswith("configs/mon/prometheus-rules/")
              or path == "configs/mon/prometheus.yml"
              or path == "configs/mon/blackbox.yml"
              or path.startswith("ansible/roles/prometheus/")
              or path == "ansible/playbooks/prometheus.yml"
              for path in changed
          )
          alertmanager_changed = any(
              path == "configs/mon/alertmanager.yml.j2"
              or path.startswith("ansible/roles/alertmanager/")
              or path == "ansible/playbooks/alertmanager.yml"
              for path in changed
          )
          noc_changed = any(path in changed for path in {
              "ansible/inventory/host_vars/noc.yml",
              "ansible/playbooks/noc.yml",
              "configs/xo-mcp-package.json",
              "configs/noc-agent.env.j2",
              "configs/noc-agent.service",
              "configs/noc-agent-bot.service",
              "ansible/roles/vault_agent/templates/noc-agent.env.ctmpl.j2",
          }) or any(path.startswith("ansible/roles/noc_agent/") for path in changed)
          engineering_loop_changed = any(path in changed for path in {
              "ansible/inventory/host_vars/loop.yml",
              "ansible/playbooks/engineering-loop.yml",
              "ansible/roles/vault_agent/templates/engineering-loop.env.ctmpl.j2",
              "ansible/roles/vault_agent/templates/knowledge-loop.env.ctmpl.j2",
              "ansible/roles/vault_agent/templates/knowledge-loop-github-app-key.pem.ctmpl.j2",
              "ansible/roles/vault_agent/templates/agent-core-collector.env.ctmpl.j2",
              "ansible/roles/vault_agent/templates/agentic-observatory.env.ctmpl.j2",
          }) or any(
              path.startswith((
                  "ansible/roles/engineering_loop/",
                  "ansible/roles/knowledge_mcp/",
                  "ansible/roles/knowledge_loop/",
                  "ansible/roles/knowledge_api/",
                  "ansible/roles/agent_core_collector/",
                  "ansible/roles/agentic_observatory/",
              ))
              for path in changed
          )

          mon_firewall_changed = "ansible/inventory/host_vars/mon.yml" in changed
          extmon_firewall_changed = "ansible/inventory/host_vars/extmon.yml" in changed

          # Firewalls run in a dedicated prerequisite job. Consumer applies do
          # not start unless every same-promotion firewall succeeds.
          if mon_firewall_changed:
              add_firewall_once("mon")
          if extmon_firewall_changed:
              add_firewall_once("extmon")
          # Ordering within the consumer matrix matters for NOC monitoring:
          # install mon-side CheckCommand/script definitions before rendering
          # host services that reference them, then deploy noc-side services.
          if mon_icinga_changed or noc_changed:
              add_once("icinga2", "mon")
          if noc_changed:
              add_once("monitoring", "noc")
              add_once("noc", "noc")
          if engineering_loop_changed:
              add_once("engineering-loop", "loop")
          if prometheus_changed:
              add_once("prometheus", "mon")
          if alertmanager_changed:
              add_once("alertmanager", "mon")
          if "ansible/inventory/host_vars/api.yml" in changed:
              add_once("cloud", "api")
          if "ansible/inventory/host_vars/web.yml" in changed:
              add_once("web", "web")
          if "ansible/inventory/host_vars/netproxy.yml" in changed:
              add_once("network-proxy", "netproxy")
          print(f"matrix={json.dumps({'include': matrix})}")
          print(f"has_changes={'true' if matrix else 'false'}")
          print(f"firewall_matrix={json.dumps({'include': firewall_matrix})}")
          print(f"has_firewalls={'true' if firewall_matrix else 'false'}")
          PY

  firewall:
    needs: detect
    if: ${{ needs.detect.outputs.has_firewalls == 'true' }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJSON(needs.detect.outputs.firewall_matrix) }}
    uses: ./.github/workflows/apply.yml
    with:
      playbook: ${{ matrix.playbook }}
      limit: ${{ matrix.limit }}
      dry_run: false

  apply:
    needs: [detect, firewall]
    if: >-
      ${{
        always() &&
        needs.detect.outputs.has_changes == 'true' &&
        (needs.firewall.result == 'success' || needs.firewall.result == 'skipped')
      }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/apply.yml
    with:
      playbook: ${{ matrix.playbook }}
      limit: ${{ matrix.limit }}
      dry_run: false
