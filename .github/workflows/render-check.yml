---
name: render-check

# Renders every playbook in --tags validate --connection=local mode and
# asserts that the checked-in ansible/generated/ output matches what the
# render produces. Catches stale generated/ checkins (the operator forgot
# to commit a re-render) and template typos that don't surface until apply.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'configs/**'
      - 'docs/network-flows.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  render:
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    steps:
      - uses: actions/checkout@v6

      - name: Render every playbook (validate-only, no apply)
        run: scripts/ci/render-all.sh

      - name: Repo deploy preflight
        run: scripts/ci/deploy-preflight.sh --repo-only

      - name: Assert generated/ matches HEAD
        run: |
          set -e
          # Catch BOTH modified tracked files and brand-new untracked renders
          # (a never-committed generated file slips past `git diff --exit-code`).
          if [ -n "$(git status --porcelain ansible/generated/)" ]; then
            echo "::error::ansible/generated/ is stale or has uncommitted renders. Re-run scripts/ci/render-all.sh locally and commit the diff." >&2
            git status --porcelain ansible/generated/ >&2
            git diff ansible/generated/ >&2 || true
            exit 1
          fi

      - name: Upload render output (debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: render-output
          path: ansible/generated/
          retention-days: 7
