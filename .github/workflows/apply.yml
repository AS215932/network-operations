---
name: apply

# Manual gated deployment. Run with:
#   gh workflow run apply.yml -F playbook=firewall -F limit=cr1-de1 -F dry_run=true
#
# The first invocation each session must be approved via the `production`
# environment protection rule (set up once: settings → environments).
# A required reviewer (the user) approves; the workflow then runs the
# pre-snapshot → render/apply → post-snapshot → diff sequence and posts
# the diff to the run summary + as a comment on the named PR (if any).

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: Playbook to apply (matches ansible/playbooks/<name>.yml)
        type: choice
        required: true
        options:
          - firewall
          - monitoring
          - icinga2
          - logs
          - cloud
          - web
          - noc
          - vault
          - ci
          - ci-runner-key
          - knot
          - extmon
          - frr
          - rtr_routing
          - networkd_resolved
          - mail_openbsd
          - freebsd_resolv
          - noc_mcp_key
      limit:
        description: Ansible --limit pattern (host or group)
        type: string
        required: true
        default: ""
      dry_run:
        description: Dry-run only (render + check, no apply)
        type: boolean
        required: true
        default: true
      pr_number:
        description: PR number to post the diff to (optional)
        type: string
        required: false
        default: ""
      bootstrap_ci_runner_key:
        description: Connect as inventory users for first-time ci-runner-key bootstrap
        type: boolean
        required: true
        default: false
  workflow_call:
    inputs:
      playbook:
        description: Playbook to apply (matches ansible/playbooks/<name>.yml)
        type: string
        required: true
      limit:
        description: Ansible --limit pattern (host or group)
        type: string
        required: true
      dry_run:
        description: Dry-run only (render + check, no apply)
        type: boolean
        required: true
      pr_number:
        description: PR number to post the diff to (optional)
        type: string
        required: false
        default: ""
      bootstrap_ci_runner_key:
        description: Connect as inventory users for first-time ci-runner-key bootstrap
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: production-infra
  cancel-in-progress: false

jobs:
  apply:
    runs-on: [self-hosted, linux, x64, hyrule-infra]
    # Real applies pause on the protected `production` environment. Dry-runs
    # must stay ungated so promotion PR validation can be automated.
    environment: ${{ inputs.dry_run && 'dry-run' || 'production' }}
    timeout-minutes: 30
    env:
      ANSIBLE_FORCE_COLOR: "true"
      # The runner SSHes to the infra fleet with its own key (placed +
      # known_hosts-seeded by the github_runner role); overrides ansible.cfg's
      # workstation default of ~/.ssh/id_servify.
      ANSIBLE_PRIVATE_KEY_FILE: /var/lib/github-runner/.ssh/id_ci
      # ci-runner-key.yml reads CI_KEY_PATH and distributes its public half to
      # target hosts. In apply.yml runs the key already exists on the runner.
      CI_KEY_PATH: /var/lib/github-runner/.ssh/id_ci
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Runner deploy preflight
        run: scripts/ci/deploy-preflight.sh --runner

      - name: Source Vault-rendered secrets
        run: |
          # Vault Agent on `ci` renders /etc/github-runner/secrets.env. Sourced
          # here so playbooks pick up DISCORD_WEBHOOK_URL, ICINGA_API_*, etc.
          if [ -r /etc/github-runner/secrets.env ]; then
            set -a; . /etc/github-runner/secrets.env; set +a
            # Mask each value in the run log BEFORE exporting to later steps.
            # Values placed in $GITHUB_ENV are otherwise echoed in plaintext in
            # every subsequent step's "env:" group (network-operations#148).
            while IFS='=' read -r _key _; do
              case "$_key" in
                [A-Z_][A-Z0-9_]*)
                  _val="${!_key}"
                  [ -n "$_val" ] && echo "::add-mask::$_val"
                  printf '%s=%s\n' "$_key" "$_val" >> "$GITHUB_ENV"
                  ;;
              esac
            done < /etc/github-runner/secrets.env
          else
            echo "::warning::/etc/github-runner/secrets.env not found — apply may fail on env-var lookups"
          fi

      - name: Summarize app version pins
        if: ${{ contains(fromJSON('["noc","cloud","web"]'), inputs.playbook) }}
        env:
          PLAYBOOK: ${{ inputs.playbook }}
        run: |
          set -euo pipefail

          case "$PLAYBOOK" in
            noc)
              host_vars="ansible/inventory/host_vars/noc.yml"
              entries="noc_agent_version|AS215932/noc-agent hyrule_mcp_version|AS215932/hyrule-mcp"
              ;;
            cloud)
              host_vars="ansible/inventory/host_vars/api.yml"
              entries="hyrule_cloud_version|AS215932/hyrule-cloud"
              ;;
            web)
              host_vars="ansible/inventory/host_vars/web.yml"
              entries="hyrule_web_version|AS215932/hyrule-web"
              ;;
          esac

          extract_pin() {
            local key="$1"
            local file="$2"
            sed -nE "s/^${key}:[[:space:]]*['\"]?([0-9a-fA-F]{40})['\"]?[[:space:]]*$/\1/p" "$file" | head -1
          }

          {
            echo "## App version pins"
            echo
            echo "| Variable | Repository | SHA | Compare |"
            echo "| --- | --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          for entry in $entries; do
            key="${entry%%|*}"
            repo="${entry##*|}"
            current="$(extract_pin "$key" "$host_vars")"
            previous=""
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              tmp="$(mktemp)"
              if git show "HEAD^:${host_vars}" > "$tmp" 2>/dev/null; then
                previous="$(extract_pin "$key" "$tmp")"
              fi
              rm -f "$tmp"
            fi

            if [ -n "$previous" ] && [ "$previous" != "$current" ]; then
              compare="[${previous:0:7}...${current:0:7}](https://github.com/${repo}/compare/${previous}...${current})"
            else
              compare="unchanged"
            fi

            echo "| \`${key}\` | \`${repo}\` | \`${current}\` | ${compare} |" >> "$GITHUB_STEP_SUMMARY"
          done

      # -e ansible_user=ci: the runner connects as the dedicated `ci` deploy
      # user on every host (created + NOPASSWD-root by the ci_runner_key role)
      # and escalates with sudo — never root, never the operator's svag. An
      # extra-var so it overrides per-host ansible_user (rtr/xoa=root, etc.).
      - name: Pre-deploy Icinga snapshot
        working-directory: ansible
        env:
          PLAYBOOK: ${{ inputs.playbook }}
        run: |
          ansible-playbook "playbooks/${PLAYBOOK}.yml" \
            --tags snapshot \
            -e ansible_user=ci \
            -e snapshot_phase=pre

      - name: Render-only (dry run)
        if: ${{ inputs.dry_run }}
        working-directory: ansible
        env:
          PLAYBOOK: ${{ inputs.playbook }}
          LIMIT: ${{ inputs.limit }}
        run: |
          limit_args=()
          if [ -n "$LIMIT" ]; then
            limit_args=(--limit "$LIMIT")
          fi
          ansible-playbook "playbooks/${PLAYBOOK}.yml" \
            --tags validate \
            --connection=local \
            --skip-tags=snapshot \
            "${limit_args[@]}"

      - name: Apply
        if: ${{ !inputs.dry_run }}
        working-directory: ansible
        env:
          PLAYBOOK: ${{ inputs.playbook }}
          LIMIT: ${{ inputs.limit }}
          BOOTSTRAP_CI_RUNNER_KEY: ${{ inputs.bootstrap_ci_runner_key }}
        run: |
          playbook="$PLAYBOOK"
          apply_var="${playbook//-/_}_apply=true"
          user_args=(-e ansible_user=ci)
          limit_args=()
          if [ -n "$LIMIT" ]; then
            limit_args=(--limit "$LIMIT")
          fi
          if [ "$playbook" = "ci-runner-key" ] && [ "$BOOTSTRAP_CI_RUNNER_KEY" = "true" ]; then
            user_args=()
          fi
          ansible-playbook "playbooks/${playbook}.yml" \
            --tags apply \
            "${user_args[@]}" \
            -e "${apply_var}" \
            "${limit_args[@]}"

      - name: Post-deploy Icinga snapshot
        if: ${{ !inputs.dry_run }}
        working-directory: ansible
        env:
          PLAYBOOK: ${{ inputs.playbook }}
        run: |
          ansible-playbook "playbooks/${PLAYBOOK}.yml" \
            --tags snapshot \
            -e ansible_user=ci \
            -e snapshot_phase=post

      - name: Post-deploy Goss validation
        if: ${{ !inputs.dry_run }}
        env:
          PLAYBOOK: ${{ inputs.playbook }}
          LIMIT: ${{ inputs.limit }}
        run: scripts/ci/goss-validate.sh "$PLAYBOOK" "$LIMIT"

      - name: Capture snapshot diff
        if: ${{ !inputs.dry_run }}
        id: diff
        run: |
          set -e
          shopt -s nullglob
          snapshots_root=ansible/generated/snapshots
          if [ ! -d "$snapshots_root" ]; then
            echo "::warning::no snapshots directory found at $snapshots_root"
            echo "diff=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Two most recent snapshot dirs are pre/post.
          mapfile -t dirs < <(ls -1dt "$snapshots_root"/*/ 2>/dev/null | head -2)
          if [ "${#dirs[@]}" -lt 2 ]; then
            echo "::warning::need 2 snapshot dirs, found ${#dirs[@]}"
            exit 0
          fi
          {
            echo "## Icinga snapshot diff"
            echo
            echo '```diff'
            diff -ruN "${dirs[1]}" "${dirs[0]}" || true
            echo '```'
          } > /tmp/diff.md
          {
            echo "diff<<EOF"
            cat /tmp/diff.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post diff to workflow summary
        if: ${{ !inputs.dry_run && steps.diff.outputs.diff != '' }}
        run: cat /tmp/diff.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post diff as PR comment
        if: ${{ !inputs.dry_run && inputs.pr_number != '' && steps.diff.outputs.diff != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --body-file /tmp/diff.md

      - name: Upload snapshots as artifact
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-${{ inputs.playbook }}-${{ inputs.limit }}
          path: ansible/generated/snapshots/
          retention-days: 30
