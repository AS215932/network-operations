---
name: apply
run-name: ${{ inputs.dry_run == true && 'Dry-run' || 'Apply' }} playbook ${{ inputs.playbook }} to target(s) ${{ inputs.limit }}

# Manual gated deployment. Run with:
#   gh workflow run apply.yml -F playbook=firewall -F limit=cr1-de1 -F dry_run=true
#
# The first invocation each session must be approved via the `production`
# environment protection rule (set up once: settings → environments).
# A required reviewer (the user) approves; the workflow then renders/applies
# the playbook and runs post-deploy Goss validation. Regressions surface
# through live Icinga / the hyrule MCP, not a pre/post snapshot bracket.

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: Playbook to apply (matches ansible/playbooks/<name>.yml)
        type: choice
        required: true
        options:
          - firewall
          - monitoring
          - icinga2
          - prometheus
          - alertmanager
          - logs
          - cloud
          - cloud_reprovision_vm
          - web
          - noc
          - network-proxy
          - tunnel-proxy
          - vault
          - ci
          - ci-runner-key
          - knot
          - extmon
          - engineering-loop
          - soc
          - frr
          - rtr_routing
          - networkd_resolved
          - mail_openbsd
          - freebsd_resolv
          - noc_mcp_key
      limit:
        description: Ansible --limit pattern (host or group)
        type: string
        required: true
        default: ""
      dry_run:
        description: Dry-run only (render + check, no apply)
        type: boolean
        required: true
        default: true
      bootstrap_ci_runner_key:
        description: Connect as inventory users for first-time ci-runner-key bootstrap
        type: boolean
        required: true
        default: false
  workflow_call:
    inputs:
      playbook:
        description: Playbook to apply (matches ansible/playbooks/<name>.yml)
        type: string
        required: true
      limit:
        description: Ansible --limit pattern (host or group)
        type: string
        required: true
      dry_run:
        description: Dry-run only (render + check, no apply)
        type: boolean
        required: true
      bootstrap_ci_runner_key:
        description: Connect as inventory users for first-time ci-runner-key bootstrap
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  # Live applies remain strictly serialized. Dry-runs are render/check only and
  # must not get stuck behind, or block, the production apply lane. The live
  # key is versioned because the original production-infra key produced
  # jobless pending workflow_dispatch runs after cancelled attempts.
  group: ${{ inputs.dry_run && format('production-infra-dry-run-{0}', github.run_id) || 'production-infra-live-v2' }}
  cancel-in-progress: false

jobs:
  apply:
    name: ${{ inputs.dry_run == true && 'Dry-run' || 'Apply' }} playbook ${{ inputs.playbook }} to target(s) ${{ inputs.limit }}
    runs-on: [self-hosted, linux, x64, hyrule-infra]
    # Real applies pause on the protected `production` environment. Dry-runs
    # must stay ungated so promotion PR validation can be automated.
    environment: ${{ inputs.dry_run && 'dry-run' || 'production' }}
    timeout-minutes: 30
    env:
      ANSIBLE_FORCE_COLOR: "true"
      # The runner SSHes to the infra fleet with its own key (placed +
      # known_hosts-seeded by the github_runner role); overrides ansible.cfg's
      # workstation default of ~/.ssh/id_servify.
      ANSIBLE_PRIVATE_KEY_FILE: /var/lib/github-runner/.ssh/id_ci
      # ci-runner-key.yml reads CI_KEY_PATH and distributes its public half to
      # target hosts. In apply.yml runs the key already exists on the runner.
      CI_KEY_PATH: /var/lib/github-runner/.ssh/id_ci
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Runner deploy preflight
        run: scripts/ci/deploy-preflight.sh --runner

      # New inventory hosts become reachable without a manual `apply.yml ci`
      # known_hosts reseed (network-operations#404).
      - name: Seed missing SSH host keys
        run: scripts/ci/seed-missing-host-keys.sh

      - name: Source Vault-rendered secrets
        run: |
          # Vault Agent on `ci` renders /etc/github-runner/secrets.env. Sourced
          # here so playbooks pick up DISCORD_WEBHOOK_URL, ICINGA_API_*, etc.
          if [ -r /etc/github-runner/secrets.env ]; then
            set -a; . /etc/github-runner/secrets.env; set +a
            # Mask each value in the run log BEFORE exporting to later steps.
            # Values placed in $GITHUB_ENV are otherwise echoed in plaintext in
            # every subsequent step's "env:" group (network-operations#148).
            while IFS='=' read -r _key _; do
              case "$_key" in
                [A-Z_][A-Z0-9_]*)
                  _val="${!_key}"
                  [ -n "$_val" ] && echo "::add-mask::$_val"
                  printf '%s=%s\n' "$_key" "$_val" >> "$GITHUB_ENV"
                  ;;
              esac
            done < /etc/github-runner/secrets.env
          else
            echo "::warning::/etc/github-runner/secrets.env not found — apply may fail on env-var lookups"
          fi

      - name: Summarize app version pins
        if: ${{ contains(fromJSON('["noc","engineering-loop","cloud","web","network-proxy","tunnel-proxy"]'), inputs.playbook) }}
        env:
          PLAYBOOK: ${{ inputs.playbook }}
        run: |
          set -euo pipefail

          case "$PLAYBOOK" in
            noc)
              host_vars="ansible/inventory/host_vars/noc.yml"
              entries="noc_agent_version|AS215932/noc-agent hyrule_mcp_version|AS215932/hyrule-mcp noc_knowledge_version|AS215932/knowledge"
              ;;
            engineering-loop)
              host_vars="ansible/inventory/host_vars/loop.yml"
              entries="engineering_loop_version|AS215932/engineering-loop knowledge_mcp_version|AS215932/knowledge knowledge_loop_version|AS215932/knowledge agentic_observatory_version|AS215932/agentic-observatory"
              ;;
            cloud)
              host_vars="ansible/inventory/host_vars/api.yml"
              entries="hyrule_cloud_version|AS215932/hyrule-cloud"
              ;;
            web)
              host_vars="ansible/inventory/host_vars/web.yml"
              entries="hyrule_web_version|AS215932/hyrule-web"
              ;;
            network-proxy)
              host_vars="ansible/inventory/host_vars/netproxy.yml"
              entries="hyrule_network_proxy_version|AS215932/hyrule-network-proxy"
              ;;
            tunnel-proxy)
              host_vars="ansible/inventory/host_vars/netproxy.yml"
              entries="hyrule_tunnel_proxy_version|AS215932/hyrule-network-proxy"
              ;;
          esac

          extract_pin() {
            local key="$1"
            local file="$2"
            sed -nE "s/^${key}:[[:space:]]*['\"]?([0-9a-fA-F]{40})['\"]?[[:space:]]*$/\1/p" "$file" | head -1
          }

          {
            echo "## App version pins"
            echo
            echo "| Variable | Repository | SHA | Compare |"
            echo "| --- | --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          for entry in $entries; do
            key="${entry%%|*}"
            repo="${entry##*|}"
            current="$(extract_pin "$key" "$host_vars")"
            previous=""
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              tmp="$(mktemp)"
              if git show "HEAD^:${host_vars}" > "$tmp" 2>/dev/null; then
                previous="$(extract_pin "$key" "$tmp")"
              fi
              rm -f "$tmp"
            fi

            if [ -n "$previous" ] && [ "$previous" != "$current" ]; then
              compare="[${previous:0:7}...${current:0:7}](https://github.com/${repo}/compare/${previous}...${current})"
            else
              compare="unchanged"
            fi

            echo "| \`${key}\` | \`${repo}\` | \`${current}\` | ${compare} |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Resolve apply gate variable
        env:
          PLAYBOOK: ${{ inputs.playbook }}
        run: |
          set -euo pipefail

          playbook="$PLAYBOOK"
          extra_apply_vars=""
          case "$playbook" in
            cloud)
              apply_var="hyrule_cloud_apply=true"
              expected_apply_var="hyrule_cloud_apply=true"
              ;;
            web)
              apply_var="hyrule_web_apply=true"
              expected_apply_var="hyrule_web_apply=true"
              ;;
            network-proxy)
              apply_var="hyrule_network_proxy_apply=true"
              expected_apply_var="hyrule_network_proxy_apply=true"
              ;;
            tunnel-proxy)
              apply_var="hyrule_tunnel_proxy_apply=true"
              expected_apply_var="hyrule_tunnel_proxy_apply=true"
              ;;
            engineering-loop)
              apply_var="engineering_loop_apply=true"
              expected_apply_var="engineering_loop_apply=true"
              extra_apply_vars="knowledge_mcp_apply=true knowledge_loop_apply=true knowledge_api_apply=true agent_core_collector_apply=true agentic_observatory_apply=true"
              ;;
            soc)
              # role gate is soc_agent_apply (role name != playbook name)
              apply_var="soc_agent_apply=true"
              expected_apply_var="soc_agent_apply=true"
              ;;
            *)
              apply_var="${playbook//-/_}_apply=true"
              expected_apply_var="${playbook//-/_}_apply=true"
              ;;
          esac

          if [ "$apply_var" != "$expected_apply_var" ]; then
            echo "::error::${playbook} resolved apply gate ${apply_var}, expected ${expected_apply_var}"
            exit 1
          fi

          printf 'APPLY_VAR=%s\n' "$apply_var" >> "$GITHUB_ENV"
          printf 'APPLY_EXTRA_VARS=%s\n' "$extra_apply_vars" >> "$GITHUB_ENV"
          {
            echo "## Apply gate"
            echo
            echo "\`${apply_var}\`"
            if [ -n "$extra_apply_vars" ]; then
              echo "\`${extra_apply_vars}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mint hyrule-cloud Vault bootstrap
        if: ${{ !inputs.dry_run && inputs.playbook == 'cloud' }}
        run: |
          set -euo pipefail

          if [ -n "${VAULT_HYRULE_CLOUD_ROLE_ID:-}" ] && { [ -n "${VAULT_HYRULE_CLOUD_WRAPPED_SECRET_ID:-}" ] || [ -n "${VAULT_HYRULE_CLOUD_SECRET_ID:-}" ]; }; then
            echo "hyrule-cloud Vault bootstrap already provided by environment"
            exit 0
          fi

          token_file="/run/vault-agent/github-runner.token"
          if [ ! -r "$token_file" ]; then
            echo "::error::${token_file} is not readable by the runner user; re-apply playbooks/ci.yml to refresh Vault Agent token sink permissions"
            exit 1
          fi
          vault_token="$(cat "$token_file")"

          export VAULT_ADDR="${VAULT_ADDR:-http://[2a0c:b641:b50:2::c0]:8200}"
          export VAULT_TOKEN="$vault_token"

          role_id="$(vault read -field=role_id auth/approle/role/hyrule-cloud/role-id)"
          wrapped_secret_id="$(vault write -wrap-ttl=10m -field=wrapping_token -f auth/approle/role/hyrule-cloud/secret-id)"

          if [ -z "$role_id" ] || [ -z "$wrapped_secret_id" ]; then
            echo "::error::failed to mint hyrule-cloud Vault bootstrap credentials"
            exit 1
          fi

          echo "::add-mask::$role_id"
          echo "::add-mask::$wrapped_secret_id"
          printf 'VAULT_HYRULE_CLOUD_ROLE_ID=%s\n' "$role_id" >> "$GITHUB_ENV"
          printf 'VAULT_HYRULE_CLOUD_WRAPPED_SECRET_ID=%s\n' "$wrapped_secret_id" >> "$GITHUB_ENV"

          {
            echo "## hyrule-cloud Vault bootstrap"
            echo
            echo "Minted response-wrapped AppRole SecretID for this apply run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mint engineering-loop Vault bootstrap
        if: ${{ !inputs.dry_run && inputs.playbook == 'engineering-loop' }}
        run: |
          set -euo pipefail

          if [ -n "${VAULT_ENGINEERING_LOOP_ROLE_ID:-}" ] && { [ -n "${VAULT_ENGINEERING_LOOP_WRAPPED_SECRET_ID:-}" ] || [ -n "${VAULT_ENGINEERING_LOOP_SECRET_ID:-}" ]; }; then
            echo "engineering-loop Vault bootstrap already provided by environment"
            exit 0
          fi

          token_file="/run/vault-agent/github-runner.token"
          if [ ! -r "$token_file" ]; then
            echo "::error::${token_file} is not readable by the runner user; re-apply playbooks/ci.yml to refresh Vault Agent token sink permissions"
            exit 1
          fi
          vault_token="$(cat "$token_file")"

          export VAULT_ADDR="${VAULT_ADDR:-http://[2a0c:b641:b50:2::c0]:8200}"
          export VAULT_TOKEN="$vault_token"

          role_id="$(vault read -field=role_id auth/approle/role/engineering-loop/role-id)"
          wrapped_secret_id="$(vault write -wrap-ttl=10m -field=wrapping_token -f auth/approle/role/engineering-loop/secret-id)"

          if [ -z "$role_id" ] || [ -z "$wrapped_secret_id" ]; then
            echo "::error::failed to mint engineering-loop Vault bootstrap credentials"
            exit 1
          fi

          echo "::add-mask::$role_id"
          echo "::add-mask::$wrapped_secret_id"
          printf 'VAULT_ENGINEERING_LOOP_ROLE_ID=%s\n' "$role_id" >> "$GITHUB_ENV"
          printf 'VAULT_ENGINEERING_LOOP_WRAPPED_SECRET_ID=%s\n' "$wrapped_secret_id" >> "$GITHUB_ENV"

          {
            echo "## engineering-loop Vault bootstrap"
            echo
            echo "Minted response-wrapped AppRole SecretID for this apply run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mint knowledge-loop Vault bootstrap
        if: ${{ !inputs.dry_run && inputs.playbook == 'engineering-loop' }}
        run: |
          set -euo pipefail

          if [ -n "${VAULT_KNOWLEDGE_LOOP_ROLE_ID:-}" ] && { [ -n "${VAULT_KNOWLEDGE_LOOP_WRAPPED_SECRET_ID:-}" ] || [ -n "${VAULT_KNOWLEDGE_LOOP_SECRET_ID:-}" ]; }; then
            echo "knowledge-loop Vault bootstrap already provided by environment"
            exit 0
          fi

          token_file="/run/vault-agent/github-runner.token"
          if [ ! -r "$token_file" ]; then
            echo "::error::${token_file} is not readable by the runner user; re-apply playbooks/ci.yml to refresh Vault Agent token sink permissions"
            exit 1
          fi
          vault_token="$(cat "$token_file")"

          export VAULT_ADDR="${VAULT_ADDR:-http://[2a0c:b641:b50:2::c0]:8200}"
          export VAULT_TOKEN="$vault_token"

          role_id="$(vault read -field=role_id auth/approle/role/knowledge-loop/role-id)"
          wrapped_secret_id="$(vault write -wrap-ttl=10m -field=wrapping_token -f auth/approle/role/knowledge-loop/secret-id)"

          if [ -z "$role_id" ] || [ -z "$wrapped_secret_id" ]; then
            echo "::error::failed to mint knowledge-loop Vault bootstrap credentials"
            exit 1
          fi

          echo "::add-mask::$role_id"
          echo "::add-mask::$wrapped_secret_id"
          printf 'VAULT_KNOWLEDGE_LOOP_ROLE_ID=%s\n' "$role_id" >> "$GITHUB_ENV"
          printf 'VAULT_KNOWLEDGE_LOOP_WRAPPED_SECRET_ID=%s\n' "$wrapped_secret_id" >> "$GITHUB_ENV"

          {
            echo "## knowledge-loop Vault bootstrap"
            echo
            echo "Minted response-wrapped AppRole SecretID for this apply run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mint agent-core-collector Vault bootstrap
        if: ${{ !inputs.dry_run && inputs.playbook == 'engineering-loop' }}
        run: |
          set -euo pipefail

          if [ -n "${VAULT_AGENT_CORE_COLLECTOR_ROLE_ID:-}" ] && { [ -n "${VAULT_AGENT_CORE_COLLECTOR_WRAPPED_SECRET_ID:-}" ] || [ -n "${VAULT_AGENT_CORE_COLLECTOR_SECRET_ID:-}" ]; }; then
            echo "agent-core-collector Vault bootstrap already provided by environment"
            exit 0
          fi

          token_file="/run/vault-agent/github-runner.token"
          if [ ! -r "$token_file" ]; then
            echo "::error::${token_file} is not readable by the runner user; re-apply playbooks/ci.yml to refresh Vault Agent token sink permissions"
            exit 1
          fi
          vault_token="$(cat "$token_file")"

          export VAULT_ADDR="${VAULT_ADDR:-http://[2a0c:b641:b50:2::c0]:8200}"
          export VAULT_TOKEN="$vault_token"

          role_id="$(vault read -field=role_id auth/approle/role/agent-core-collector/role-id)"
          wrapped_secret_id="$(vault write -wrap-ttl=10m -field=wrapping_token -f auth/approle/role/agent-core-collector/secret-id)"

          if [ -z "$role_id" ] || [ -z "$wrapped_secret_id" ]; then
            echo "::error::failed to mint agent-core-collector Vault bootstrap credentials"
            exit 1
          fi

          echo "::add-mask::$role_id"
          echo "::add-mask::$wrapped_secret_id"
          printf 'VAULT_AGENT_CORE_COLLECTOR_ROLE_ID=%s\n' "$role_id" >> "$GITHUB_ENV"
          printf 'VAULT_AGENT_CORE_COLLECTOR_WRAPPED_SECRET_ID=%s\n' "$wrapped_secret_id" >> "$GITHUB_ENV"

          {
            echo "## agent-core-collector Vault bootstrap"
            echo
            echo "Minted response-wrapped AppRole SecretID for this apply run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mint agentic-observatory Vault bootstrap
        if: ${{ !inputs.dry_run && inputs.playbook == 'engineering-loop' }}
        run: |
          set -euo pipefail

          if [ -n "${VAULT_AGENTIC_OBSERVATORY_ROLE_ID:-}" ] && { [ -n "${VAULT_AGENTIC_OBSERVATORY_WRAPPED_SECRET_ID:-}" ] || [ -n "${VAULT_AGENTIC_OBSERVATORY_SECRET_ID:-}" ]; }; then
            echo "agentic-observatory Vault bootstrap already provided by environment"
            exit 0
          fi

          token_file="/run/vault-agent/github-runner.token"
          if [ ! -r "$token_file" ]; then
            echo "::error::${token_file} is not readable by the runner user; re-apply playbooks/ci.yml to refresh Vault Agent token sink permissions"
            exit 1
          fi
          vault_token="$(cat "$token_file")"

          export VAULT_ADDR="${VAULT_ADDR:-http://[2a0c:b641:b50:2::c0]:8200}"
          export VAULT_TOKEN="$vault_token"

          role_id="$(vault read -field=role_id auth/approle/role/agentic-observatory/role-id)"
          wrapped_secret_id="$(vault write -wrap-ttl=10m -field=wrapping_token -f auth/approle/role/agentic-observatory/secret-id)"

          if [ -z "$role_id" ] || [ -z "$wrapped_secret_id" ]; then
            echo "::error::failed to mint agentic-observatory Vault bootstrap credentials"
            exit 1
          fi

          echo "::add-mask::$role_id"
          echo "::add-mask::$wrapped_secret_id"
          printf 'VAULT_AGENTIC_OBSERVATORY_ROLE_ID=%s\n' "$role_id" >> "$GITHUB_ENV"
          printf 'VAULT_AGENTIC_OBSERVATORY_WRAPPED_SECRET_ID=%s\n' "$wrapped_secret_id" >> "$GITHUB_ENV"

          {
            echo "## agentic-observatory Vault bootstrap"
            echo
            echo "Minted response-wrapped AppRole SecretID for this apply run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Render-only (dry run)
        if: ${{ inputs.dry_run }}
        working-directory: ansible
        env:
          PLAYBOOK: ${{ inputs.playbook }}
          LIMIT: ${{ inputs.limit }}
        run: |
          limit_args=()
          if [ -n "$LIMIT" ]; then
            limit_args=(--limit "$LIMIT")
          fi
          ansible-playbook "playbooks/${PLAYBOOK}.yml" \
            --tags validate \
            --connection=local \
            "${limit_args[@]}"

      # -e ansible_user=ci: the runner connects as the dedicated `ci` deploy
      # user on every host (created + NOPASSWD-root by the ci_runner_key role)
      # and escalates with sudo — never root, never the operator's svag. An
      # extra-var so it overrides per-host ansible_user (rtr/xoa=root, etc.).
      - name: Apply
        if: ${{ !inputs.dry_run }}
        working-directory: ansible
        env:
          PLAYBOOK: ${{ inputs.playbook }}
          LIMIT: ${{ inputs.limit }}
          BOOTSTRAP_CI_RUNNER_KEY: ${{ inputs.bootstrap_ci_runner_key }}
        run: |
          playbook="$PLAYBOOK"
          user_args=(-e ansible_user=ci)
          limit_args=()
          if [ -n "$LIMIT" ]; then
            limit_args=(--limit "$LIMIT")
          fi
          if [ "$playbook" = "ci-runner-key" ] && [ "$BOOTSTRAP_CI_RUNNER_KEY" = "true" ]; then
            user_args=()
          fi
          extra_var_args=()
          for extra_var in ${APPLY_EXTRA_VARS:-}; do
            extra_var_args+=(-e "$extra_var")
          done
          ansible-playbook "playbooks/${playbook}.yml" \
            --tags apply \
            "${user_args[@]}" \
            -e "${APPLY_VAR}" \
            "${extra_var_args[@]}" \
            "${limit_args[@]}"

      - name: Post-deploy Goss validation
        if: ${{ !inputs.dry_run }}
        env:
          PLAYBOOK: ${{ inputs.playbook }}
          LIMIT: ${{ inputs.limit }}
        run: scripts/ci/goss-validate.sh "$PLAYBOOK" "$LIMIT"
