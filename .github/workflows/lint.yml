---
name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: lint
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    # roles_path lives in ansible/ansible.cfg, which isn't picked up when lint
    # runs from the repo root — point ansible at ansible/roles explicitly so
    # syntax-check can resolve role references.
    env:
      ANSIBLE_ROLES_PATH: ${{ github.workspace }}/ansible/roles
    steps:
      - uses: actions/checkout@v7

      - name: yamllint
        id: yamllint
        continue-on-error: true
        run: yamllint -c .yamllint .

      - name: ansible-lint
        id: ansible_lint
        continue-on-error: true
        run: ansible-lint -c .ansible-lint ansible/playbooks/ ansible/roles/

      - name: shellcheck
        id: shellcheck
        continue-on-error: true
        run: |
          set -e
          # Skip generated/, but lint all hand-written scripts.
          # --severity=error keeps this permissive at launch (the existing
          # scripts have warning/style/info findings only); tighten via #58.
          mapfile -t scripts < <(find scripts -type f \( -name '*.sh' -o -name '*.bash' \) -print)
          if [ "${#scripts[@]}" -gt 0 ]; then
            shellcheck --severity=error "${scripts[@]}"
          else
            echo "no shell scripts found, skipping"
          fi

      - name: jinja2 syntax check
        id: jinja_syntax
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import sys
          from pathlib import Path
          from jinja2 import Environment, FileSystemLoader, TemplateSyntaxError

          repo = Path(".")
          j2_files = [p for p in repo.rglob("*.j2")
                      if "/generated/" not in str(p)
                      and not str(p).startswith(".git")]

          fail = 0
          for p in j2_files:
              env = Environment(loader=FileSystemLoader(p.parent))
              try:
                  env.parse(p.read_text())
              except TemplateSyntaxError as e:
                  print(f"::error file={p},line={e.lineno}::{e.message}")
                  fail = 1
          sys.exit(fail)
          EOF

      - name: Fail if any lint check failed
        if: >
          steps.yamllint.outcome == 'failure' ||
          steps.ansible_lint.outcome == 'failure' ||
          steps.shellcheck.outcome == 'failure' ||
          steps.jinja_syntax.outcome == 'failure'
        run: |
          echo "::error::one or more lint checks failed"
          exit 1
