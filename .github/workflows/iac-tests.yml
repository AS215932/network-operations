---
name: iac-tests

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/iac-tests.yml'
      - '.pre-commit-config.yaml'
      - 'ansible/**'
      - 'configs/**'
      - 'scripts/ci/**'
      - 'tests/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/iac-tests.yml'
      - '.pre-commit-config.yaml'
      - 'ansible/**'
      - 'configs/**'
      - 'scripts/ci/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  static-iac:
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    env:
      ANSIBLE_ROLES_PATH: ${{ github.workspace }}/ansible/roles
    steps:
      - uses: actions/checkout@v4

      - name: Static IaC contract tests
        run: scripts/ci/iac-static.sh

      - name: Ansible syntax check
        working-directory: ansible
        run: |
          set -euo pipefail
          for playbook in playbooks/*.yml; do
            ansible-playbook "$playbook" --syntax-check
          done

  batfish:
    runs-on: [self-hosted, linux, x64, hyrule-infra]
    needs: static-iac
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_BATFISH_TESTS == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Batfish AS215932 model tests
        run: |
          python3 -m venv .venv-batfish
          . .venv-batfish/bin/activate
          pip install pytest pybatfish
          scripts/ci/batfish-test.sh

  containerlab-frr:
    runs-on: [self-hosted, linux, x64, hyrule-infra]
    needs: static-iac
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_CONTAINERLAB_TESTS == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Containerlab dynamic FRR smoke test
        run: scripts/ci/containerlab-frr-test.sh

  ansible-idempotency:
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    needs: static-iac
    steps:
      - uses: actions/checkout@v4

      - name: Render/validate idempotency gate
        run: scripts/ci/ansible-idempotency.sh
