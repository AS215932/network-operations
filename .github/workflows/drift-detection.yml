---
name: drift-detection

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    runs-on: [self-hosted, linux, x64, hyrule-infra]
    timeout-minutes: 45
    env:
      ANSIBLE_FORCE_COLOR: "true"
      ANSIBLE_PRIVATE_KEY_FILE: /var/lib/github-runner/.ssh/id_ci
    steps:
      - uses: actions/checkout@v7

      - name: Source runner-scoped secrets
        run: |
          set -euo pipefail
          scripts/ci/deploy-preflight.sh --runner
          set -a; . /etc/github-runner/secrets.env; set +a
          while IFS='=' read -r _key _; do
            case "$_key" in
              [A-Z_][A-Z0-9_]*)
                _val="${!_key}"
                [ -n "$_val" ] && echo "::add-mask::$_val"
                printf '%s=%s\n' "$_key" "$_val" >> "$GITHUB_ENV"
                ;;
            esac
          done < /etc/github-runner/secrets.env

      - name: Seed missing SSH host keys
        run: scripts/ci/seed-missing-host-keys.sh

      # The sweep itself (playbook list, limit, drift semantics) lives in
      # scripts/ci/check-drift.sh, shared with post-merge-apply.yml.
      - name: Check production drift
        id: drift
        working-directory: ansible
        run: ../scripts/ci/check-drift.sh drift-logs

      - name: Summarize drift
        if: always()
        working-directory: ansible
        run: ../scripts/ci/summarize-drift-logs.sh drift-logs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-logs
          path: ansible/drift-logs/*.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Alert CI on drift failure
        if: failure() && env.CI_DISCORD_WEBHOOK_URL != ''
        env:
          CI_DISCORD_WEBHOOK_URL: ${{ env.CI_DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n --arg content "AS215932 drift detection failed: ${RUN_URL}" '{content: $content}' \
            | curl -fsS -H 'Content-Type: application/json' -d @- "$CI_DISCORD_WEBHOOK_URL"
