---
name: xo-source-upgrade-plan

on:
  schedule:
    # Weekly, early Monday UTC. This is plan-only: it never restarts XO.
    - cron: '37 3 * * 1'
  workflow_dispatch:
    inputs:
      create_issue:
        description: Create/update a GitHub issue when an XO upgrade is available
        type: boolean
        default: true
      xo_source_ref:
        description: Git ref to compare against
        type: string
        default: origin/master
  workflow_call:
    inputs:
      create_issue:
        description: Create/update a GitHub issue when an XO upgrade is available
        type: boolean
        default: false
      xo_source_ref:
        description: Git ref to compare against
        type: string
        default: origin/master

permissions:
  contents: read
  issues: write

defaults:
  run:
    shell: bash

jobs:
  plan:
    runs-on: [self-hosted, linux, x64, hyrule-infra]
    timeout-minutes: 20
    env:
      ANSIBLE_FORCE_COLOR: "true"
      ANSIBLE_PRIVATE_KEY_FILE: /var/lib/github-runner/.ssh/id_ci
      XO_SOURCE_PLAN_OUTPUT: ../xo-source-upgrade-plan.json
      XO_SOURCE_REF: ${{ inputs.xo_source_ref || 'origin/master' }}
    outputs:
      upgrade_available: ${{ steps.plan.outputs.upgrade_available }}
      current_revision: ${{ steps.plan.outputs.current_revision }}
      target_revision: ${{ steps.plan.outputs.target_revision }}
      behind: ${{ steps.plan.outputs.behind }}
    steps:
      - uses: actions/checkout@v6

      - name: Plan XO source upgrade
        id: plan
        working-directory: ansible
        run: |
          set -euo pipefail
          ansible-playbook playbooks/xo_source_upgrade_plan.yml \
            --limit xoa \
            -e ansible_user=ci \
            -e xo_source_ref="$XO_SOURCE_REF"

          plan_path="${XO_SOURCE_PLAN_OUTPUT}"
          if [ ! -s "$plan_path" ]; then
            echo "::error::XO source upgrade plan was not written to ${plan_path}"
            exit 1
          fi

          upgrade_available="$(jq -r '.upgrade_available' "$plan_path")"
          current_revision="$(jq -r '.current_revision' "$plan_path")"
          target_revision="$(jq -r '.target_revision' "$plan_path")"
          behind="$(jq -r '.behind' "$plan_path")"

          {
            echo "upgrade_available=${upgrade_available}"
            echo "current_revision=${current_revision}"
            echo "target_revision=${target_revision}"
            echo "behind=${behind}"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize plan
        run: |
          set -euo pipefail
          plan_path="xo-source-upgrade-plan.json"
          upgrade_available="$(jq -r '.upgrade_available' "$plan_path")"
          current_revision="$(jq -r '.current_revision' "$plan_path")"
          target_revision="$(jq -r '.target_revision' "$plan_path")"
          behind="$(jq -r '.behind' "$plan_path")"
          active_target="$(jq -r '.active_server_target' "$plan_path")"
          runbook="$(jq -r '.runbook_command' "$plan_path")"

          {
            echo "## Xen Orchestra source upgrade plan"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Upgrade available | \`${upgrade_available}\` |"
            echo "| Current revision | \`${current_revision}\` |"
            echo "| Target revision | \`${target_revision}\` |"
            echo "| Commits behind | \`${behind}\` |"
            echo "| Active xo-server target | \`${active_target}\` |"
            echo
            echo "Runbook command:"
            echo
            echo '```bash'
            echo "$runbook"
            echo '```'
            echo
            if [ "$upgrade_available" = "True" ] || [ "$upgrade_available" = "true" ]; then
              echo "### Pending commits"
              echo
              jq -r '.pending_commits[]? | "- `" + . + "`"' "$plan_path"
            else
              echo "XO source is already at the target ref."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload XO upgrade plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: xo-source-upgrade-plan
          path: xo-source-upgrade-plan.json
          if-no-files-found: error
          retention-days: 30

      - name: Create or update XO upgrade issue
        if: >-
          (steps.plan.outputs.upgrade_available == 'true' || steps.plan.outputs.upgrade_available == 'True') &&
          (github.event_name == 'schedule' || inputs.create_issue)
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const plan = JSON.parse(fs.readFileSync('xo-source-upgrade-plan.json', 'utf8'))
            const title = `Upgrade Xen Orchestra source to ${plan.target_revision}`
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const pending = (plan.pending_commits || [])
              .map(line => `- \`${line}\``)
              .join('\n') || '- No commit summary captured.'
            const body = [
              'Weekly XO source upgrade planner found an available update.',
              '',
              `- Current revision: \`${plan.current_revision}\``,
              `- Target ref: \`${plan.target_ref}\``,
              `- Target revision: \`${plan.target_revision}\``,
              `- Commits behind: \`${plan.behind}\``,
              `- Active server target: \`${plan.active_server_target}\``,
              `- Planner run: ${runUrl}`,
              '',
              'Runbook command:',
              '',
              '```bash',
              plan.runbook_command,
              '```',
              '',
              'Pending commits:',
              '',
              pending,
              '',
            ].join('\n')

            const { owner, repo } = context.repo
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })
            const match = existing.data.find(issue => issue.title.startsWith('Upgrade Xen Orchestra source to '))
            if (match) {
              await github.rest.issues.update({ owner, repo, issue_number: match.number, title, body })
              core.notice(`Updated issue #${match.number}`)
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              })
              core.notice(`Created issue #${created.data.number}`)
            }
