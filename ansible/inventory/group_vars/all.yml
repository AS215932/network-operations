---
# AS215932 network constants and peer registry.
# Every firewall rule references peers by name, never by literal address.
# When a host moves, this is the one place to update.

# --- Subnets ---
as215932_prefix: "2a0c:b641:b50::/44"
infra_subnet: "2a0c:b641:b50:2::/64"
vpn_clients_subnet: "2a0c:b641:b50:3::/64"
# Routed GUA /64 for Docker bridge containers on the loop VM.
loop_docker_subnet: "2a0c:b641:b50:f0::/64"
customer_subnet: "2a0c:b641:b51::/48"
wg_link_prefix: "2a0c:b641:b50:ff00::/56"  # all wg /127s sit under this
router_loopback_subnet: "2a0c:b641:b50::/64"
mgmt_v4: "10.0.0.0/24"
legacy_infra_v4: "10.0.2.0/24"

# rtr customer isolation: packets forwarded from customer allocations must not
# reach infrastructure, management, router loopback, or router mesh ranges.  The
# rtr nftables template enforces these by destination prefix (not only oifname),
# because VRF forwarding can expose the VRF master/slave devices differently in
# netfilter.
customer_isolation_block_v6:
  - "{{ infra_subnet }}"
  - "{{ router_loopback_subnet }}"
  - "{{ wg_link_prefix }}"
customer_isolation_block_v4:
  - "{{ mgmt_v4 }}"
  - "{{ legacy_infra_v4 }}"

# --- Ops workstation (KPN home) ---
# Live in cr1-* pf SSH allows and configs/knot.conf.j2 AXFR sources.
ops_prefix_v4: "77.166.211.126/32"
ops_prefix_v6: "2a02:a442:1016::/48"

# --- Peer registry ---
# ipv6: overlay address (or loopback for routers).
# underlay: physical underlay address (routers only — used as WG endpoint).
peers:
  rtr:
    ipv6: "2a0c:b641:b50:2::1"
    loopback: "2a0c:b641:b50::d"
    underlay: "2001:41d0:303:48a::2"
  dns:     { ipv6: "2a0c:b641:b50:2::10" }
  api:     { ipv6: "2a0c:b641:b50:2::20" }
  web:     { ipv6: "2a0c:b641:b50:2::30" }
  proxy:   { ipv6: "2a0c:b641:b50:2::40" }
  mon:     { ipv6: "2a0c:b641:b50:2::50" }
  vpn:     { ipv6: "2a0c:b641:b50:2::60" }
  xoa:
    ipv6: "2a0c:b641:b50:2::70"
    mgmt_v4: "10.0.0.10"
  irc:     { ipv6: "2a0c:b641:b50:2::80" }
  mail:
    ipv6: "2a0c:b641:b50:2::90"
  noc:     { ipv6: "2a0c:b641:b50:2::a0" }
  log:
    ipv6: "2a0c:b641:b50:2::b0"
    mgmt_v4: "10.0.0.60"
  vault:   { ipv6: "2a0c:b641:b50:2::c0" }
  ci:      { ipv6: "2a0c:b641:b50:2::d0" }
  netproxy: { ipv6: "2a0c:b641:b50:2::e0" }
  loop:    { ipv6: "2a0c:b641:b50:2::f0" }
  agentmail:
    ipv6: "2a0c:b641:b50:2::110"
    dns_name: "mx1.agentmail.hyrule.host"
  # ci-pr — unprivileged PR runner, customer-isolated segment (not infra).
  # Key matches inventory_hostname (the monitoring template does
  # peers[inventory_hostname]); referenced via peers['ci-pr'] where needed.
  ci-pr:   { ipv6: "2a0c:b641:b51::c1" }
  ns2:
    ipv4: "54.38.14.218"
    ipv6: "2001:41d0:304:300::7bfb"
  cr1_nl1:
    loopback: "2a0c:b641:b50::a"
    underlay: "2a0c:b640:8:69::1"
  cr1-nl1:
    loopback: "2a0c:b641:b50::a"
    underlay: "2a0c:b640:8:69::1"
  cr1_de1:
    loopback: "2a0c:b641:b50::b"
    underlay: "2a0c:b640:10::213"
  cr1-de1:
    loopback: "2a0c:b641:b50::b"
    underlay: "2a0c:b640:10::213"
  cr1_ch1:
    loopback: "2a0c:b641:b50::c"
    underlay: "2a09:4c0:100:2d88::8898"
    underlay_v4: "45.136.136.152"
    gateway6: "2a09:4c0:100:2d88::8bfe"
  cr1-ch1:
    loopback: "2a0c:b641:b50::c"
    underlay: "2a09:4c0:100:2d88::8898"
    underlay_v4: "45.136.136.152"
    gateway6: "2a09:4c0:100:2d88::8bfe"
  # Off-net external monitor (Vultr London; different ASN, different billing).
  # Probes AS215932 from the outside the same way real users do.
  extmon:
    ipv4: "45.32.179.134"
    ipv6: "2001:19f0:7402:0cd5:5400:06ff:fe40:7112"

# --- BGP peer addresses (external transits) ---
bgp_peers:
  servperso_de: "2a0c:b640:10::ffff"
  servperso_nl: "2a0c:b640:8:69::ffff"  # placeholder — nl1 BGP peer not live-confirmed
  extra_transit: "2a0c:b641:870::ffff"
  securebit_ch_v4: "45.136.139.250"
  securebit_ch_v6: "2a09:4c0:100:2d88::8bfa"
  sbix_rs1_v4: "185.1.135.1"
  sbix_rs1_v6: "2001:7f8:d9:1::1"
  sbix_rs2_v4: "185.1.135.2"
  sbix_rs2_v6: "2001:7f8:d9:1::2"
  sbix_rs3_v4: "185.1.135.3"
  sbix_rs3_v6: "2001:7f8:d9:1::3"
  sbix_rs4_v4: "185.1.135.4"
  sbix_rs4_v6: "2001:7f8:d9:1::4"
  fourixp_rs1_v6: "2001:7f8:d0::8b7c:1"
  fourixp_rs2_v6: "2001:7f8:d0::8b7c:2"
  fourixp_rs3_v6: "2001:7f8:d0::8b7c:3"

# --- Openprovider DNS secondary AXFR sources ---
# From hyrule-infra/configs/knot.conf.j2:28-29.
openprovider_secondaries_v4:
  - "35.157.8.190"
  - "18.203.73.190"
  - "185.27.175.218"
openprovider_secondaries_v6:
  - "2a00:f10:121:400:4be:60ff:fe00:526"
  - "2a05:d014:f80:6e00:c937:174c:45eb:a5f7"

# --- WireGuard tunnel underlay UDP ports (per CLAUDE.md mesh table) ---
wg_ports:
  - 1337
  - 1338
  - 1339
  - 1340
  - 1341
  - 1342

# --- SSH source set used by every host's input chain ---
# Permits the ops workstation directly, any client connected to the VPN, and
# the ci runner (apply.yml SSHes to the fleet for --tags apply).
ssh_allow_sources_v6:
  - "{{ ops_prefix_v6 }}"
  - "{{ vpn_clients_subnet }}"
  - "{{ peers.ci.ipv6 }}/128"
  - "{{ peers.noc.ipv6 }}/128"
  - "{{ peers.mon.ipv6 }}/128"
ssh_allow_sources_v4:
  - "{{ ops_prefix_v4 }}"

# --- Mail server public identity ---
# Dedicated OVH failover IPv4 for SMTP deliverability. Reverse DNS is set in
# OVH to mail.as215932.net.
mail_failover_ipv4: "51.91.236.215"
mail_failover_ipv4_gateway: "193.70.32.254"

# --- SSH login user per host (consumed by roles/hyrule-mcp hosts.yml render) ---
# Routers and the XO appliance accept root; everything else uses svag.
ssh_users:
  rtr: root
  xoa: root
  cr1-nl1: svag
  cr1-de1: svag
  cr1-ch1: svag
  extmon: root      # Vultr image login — matches inventory ansible_user
  default: svag

# --- Centralized logging (Vector → Loki) ---
# These are the constants the `logs` role reads; per-host knobs (logs_role,
# logs_register, logs_agent_disk_buffer_bytes) live in host_vars/<host>.yml.
logs_aggregator_host: log
logs_aggregator_port_vector: 6000
logs_aggregator_port_syslog: 6514
logs_loki_query_port: 3100
logs_vector_metrics_port: 8686
