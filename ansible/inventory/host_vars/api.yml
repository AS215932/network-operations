---
# api — hyrule-cloud (FastAPI on :8402) + PostgreSQL (localhost) + postgres_exporter.

hyrule_cloud_version: 23b60357c58baad8c509813c8f3897ab674a9a07
hyrule_cloud_monero_wallet_rpc_enabled: true

firewall_extra_rules:
  # API upstreams and backend health checks.
  - { proto: tcp, dport: 8402, src: ["{{ peers.proxy.ipv6 }}", "{{ peers.web.ipv6 }}", "{{ peers.mon.ipv6 }}"], comment: "hyrule-cloud API from proxy/web/mon" }

  # Monitoring scrapes.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }
  - { proto: tcp, dport: 9187, src: "{{ peers.mon.ipv6 }}", comment: "postgres_exporter scrape" }

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: api

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "Debian 13"
  role: "hyrule-cloud (FastAPI :8402) + Postgres"
  summary: "hyrule-cloud VM-lifecycle API on :8402 backed by PostgreSQL, with postgres_exporter for monitoring."
network_flows_outbound:
  - { to: dns, proto: tcp, port: 53, purpose: "RFC 2136 dynamic DNS updates (TSIG hyrule-dns)" }
  - { to: dns, proto: tcp, port: 8453, purpose: "HMAC-authenticated managed customer DNS control" }
  - { to: netproxy, proto: tcp, port: 8450, purpose: "authenticated internal Hyrule Network Proxy sidecar API" }
  - { to: openprovider, proto: tcp, port: 443, purpose: "domain registration API" }
