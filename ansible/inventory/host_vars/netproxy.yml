---
# netproxy — internal Hyrule network proxy sidecar target.

hyrule_network_proxy_version: b82dc72bbf382167062bff272606ce84ec20538c

firewall_extra_rules:
  - { proto: tcp, dport: 8450, src: "{{ peers.api.ipv6 }}", comment: "hyrule-cloud API to network proxy sidecar" }
  - { proto: tcp, dport: 8451, src: "{{ peers.mon.ipv6 }}", comment: "Prometheus scrape hyrule-network-proxy metrics" }
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: netproxy

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "Debian 13"
  role: "Hyrule Network Proxy sidecar (:8450 API, :8451 metrics/health)"
  summary: "Internal Hyrule Network Proxy sidecar that executes paid x402-gated Hyrule Cloud network requests."
  notes: "Prometheus scrape targets go green once the VM is provisioned and the sidecar applied (issue #214)."
network_flows_outbound:
  - { to: public, proto: "tcp+udp", purpose: "direct/Tor/I2P/Yggdrasil egress for request modes, subject to sidecar SSRF/IP policy" }
