---
# dom0 — XCP-NG hypervisor on the OVH RISE-S server.
# Underlay-only; not on AS215932 overlay. Reached via mgmt v4 from xoa
# and via the public IPv4 (193.70.32.138) from outside.
#
# This role only manages dom0's internal Xen networks + mgmt v6 today.
# node_exporter / Vector / Icinga registration on dom0 require the
# monitoring + logs roles to grow a RedHat / XCP-NG branch — filed as
# follow-up to issue #24.
#
# ansible_python_interpreter is XCP-NG-shipped: /usr/bin/python (CentOS 7
# vintage) or /usr/libexec/platform-python depending on minor version.
ansible_python_interpreter: /usr/bin/python

# Registry identity. dom0 is underlay-only and not managed by the firewall /
# monitoring / logs roles yet (see comment above + issue #24), but it is still
# the most important server we run — the hypervisor every VM lives on — so it
# carries host_meta for the server registry / generated network-flows doc.
host_meta:
  os: "XCP-NG 8.3"
  role: "XCP-NG hypervisor (OVH RISE-S dom0)"
  ipv4: "193.70.32.138 (public), 10.0.0.1 (mgmt)"
  summary: "Underlay-only Xen host for the whole AS215932 fleet; hypervisor every VM runs on."
  notes: >-
    NDP-proxies rtr's OVH underlay address and bridges the mgmt/infra/vm/wan
    Xen networks. Reached over mgmt IPv4 from xoa and the public IPv4 from
    outside. Not managed by the firewall/monitoring/logs roles yet (issue #24).

# No firewall, monitoring, or logs role registration here yet — see role
# defaults dom0_apply: false.
