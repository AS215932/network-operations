---
# cr1-de1 — FreeBSD 15.0 + FRRouting at Servperso DE.
# Multi-interface (vtnet0..3), no antispoof, BGP peers with Servperso + Extra-Transit.
# Live ruleset captured at ansible/baseline/cr1-de1/pf.conf.

ansible_python_interpreter: /usr/local/bin/python3.11

pf_ext_if: "vtnet0"
pf_extra_ifs:
  - { name: "transit2_if", dev: "vtnet1" }
  - { name: "ixp_dus",     dev: "vtnet2" }
  - { name: "ixp_fra",     dev: "vtnet3" }
pf_ext_ifs: ["vtnet0", "vtnet1", "vtnet2", "vtnet3"]
pf_antispoof: false
pf_use_as215932_table: true

# WG underlay listener ports — 1337 (cr1-nl1), 1338 (rtr), 1342 (cr1-ch1).
pf_wg_ports: [1337, 1338, 1342]

# External BGP peers (Servperso DE + Extra-Transit + LocIX).
pf_bgp_peers:
  - "2a0c:b640:10::ffff"
  - "2a0c:b641:870::ffff"
  # - "[LocIX DUS IP placeholder]"
  # - "[LocIX FRA IP placeholder]"

firewall_extra_rules:
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", family: inet6, comment: "node_exporter scrape from mon" }
  - { proto: tcp, dport: 9342, src: "{{ peers.mon.ipv6 }}", family: inet6, comment: "frr_exporter scrape from mon" }

# mon's icinga2 by_ssh pubkey, authorized for the dedicated `monitoring`
# user. Provisioned by the monitoring role on next apply; until then the
# egress-* checks fail with "Host key verification failed" because no
# user/known_hosts pairing exists. Set MONITORING_BY_SSH_PUBKEY in
# secrets.local.sh.
monitoring_by_ssh_pubkey: "{{ lookup('env', 'MONITORING_BY_SSH_PUBKEY') | default('', true) }}"

# --- Logs --- (issue #17: FreeBSD doesn't ship a vector pkg in modern
# versions; ship via native syslogd @@host:6514 TCP forward instead.)
logs_register: true
logs_role: router
logs_use_freebsd_syslogd: true

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "FreeBSD 15.0"
  role: "core router (Servperso DE + Extra-Transit + IXPs)"
  summary: "Core router at Servperso DE: FreeBSD + FRRouting, Servperso DE plus Extra-Transit and IXP peering."
  notes: "Listens on four interfaces (vtnet0..3); WG/BGP/transit rules bind to the interface set, SSH/ICMP only on the primary external interface. pf-template inbound (from pf_bgp_peers/pf_wg_ports): external BGP from Servperso DE 2a0c:b640:10::ffff and Extra-Transit 2a0c:b641:870::ffff tcp/179; WireGuard UDP 1337/1338/1342; pass quick on wg all no state; ICMP/ICMPv6 ping; transit inet6 from any to AS215932. Only the explicit mon scrapes are in firewall_extra_rules."
network_flows_outbound: []
