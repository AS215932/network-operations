---
# loop — dedicated Engineering Loop operations-lane VM.
# Runs one budgeted, issue-driven agent cycle at a time. It is deliberately
# not a deploy source for the infra fleet: no fleet SSH key, no production
# Vault breadth, and no public listener beyond node_exporter for mon.

# Bumped to the build containing agent-core v0.4.0 sink_from_env support
# (engineering-loop #26), so live loop cycles can fan out to the collector while
# retaining the local JSONL trace sink.
engineering_loop_version: "789e90bc5a791629d3b7ff69c6fc3bd22a92da30"
engineering_loop_timer_enabled: true
engineering_loop_noc_lhp_base_url: "http://[{{ peers.noc.ipv6 }}]:8000"
engineering_loop_lhp_callback_enabled: true
# Turn agent-core TraceEvent/CostUsage emission on for the live loop cycles.
engineering_loop_agent_core_trace_enabled: true
engineering_loop_agent_core_trace_collector_url: "http://[{{ peers.loop.ipv6 }}]:8770/v1/trace"

# Local read-only knowledge MCP server for Engineering Loop context. It is
# deployed as a Docker container and bound to host loopback only.
knowledge_mcp_version: "32bca0c345988f2a504f00f9f30937424ac66c4e"
knowledge_mcp_enabled: true
knowledge_mcp_host: 127.0.0.1
knowledge_mcp_port: 8767
knowledge_mcp_transport: streamable-http
knowledge_mcp_agent_core_trace_enabled: true
knowledge_mcp_agent_core_trace_collector_url: "http://[{{ peers.loop.ipv6 }}]:8770/v1/trace"
# Docker uses routed IPv6 for egress: containers receive GUA addresses from
# this /64, and rtr has a static/iBGP return route via loop's infra address.
knowledge_mcp_docker_ipv6_enabled: true
knowledge_mcp_docker_fixed_cidr_v6: "{{ loop_docker_subnet }}"
knowledge_mcp_docker_dns:
  - "{{ peers.rtr.ipv6 }}"

# Collector-backed Agent-Core trace ingestion. The collector binds only to the
# loop overlay address and stores events in local Postgres.
agent_core_collector_version: "0faf25793eaa0ca4ad74382f544aa2e10d7c80db"
agent_core_collector_enabled: true
agent_core_collector_bind: "{{ peers.loop.ipv6 }}"
agent_core_collector_port: 8770

# Governed Knowledge Loop producer agent (distinct from the read-only Knowledge
# MCP above). Pinned to the merged Knowledge revision that ships
# `hyrule-knowledge loop --once` (AS215932/knowledge#18). The workflow enables
# knowledge_loop_apply for engineering-loop, so this pin keeps the first apply
# reproducible instead of tracking floating `main`. The systemd timer stays
# disabled until a reviewed canary flips knowledge_loop_timer_enabled; applying
# now only provisions the runtime (user, pinned checkout, deps, disabled
# service/timer). Live OpenRouter enrichment budget stays the role default 0.
knowledge_loop_version: "0b414aea6777ab067ae69c4fd82f715e847cc58e"
knowledge_loop_timer_enabled: false

# Dogfood scope: let the loop author the VPS launch-proof wedge in hyrule-cloud
# (still draft-PR + human-merge gated). All other repos stay docs-only.
engineering_loop_allowed_paths:
  hyrule-cloud:
    - hyrule_cloud
    - tests
    - scripts
    - docs
  hyrule-web:
    - frontend
    - hyrule_web
    - tests

monitoring_register: true
monitoring_role: loop
monitoring_check_vars:
  engineering_loop: true

monitoring_disks:
  "disk /": { mountpoint: "/" }

monitoring_extra_services:
  - name: engineering-loop
    check_command: dummy
    interval: 1h
    retry: 5m
    enable_active_checks: false
    enable_passive_checks: true
    notes: "Passive run-status check submitted by the Engineering Loop daemon after every cycle"
  - name: engineering-loop-timer
    check_command: prom_systemd_unit
    interval: 2m
    retry: 1m
    notes: "Engineering Loop hourly timer is active on the dedicated loop VM"
    vars:
      prom_instance: "[{{ peers.loop.ipv6 }}]:9100"
      systemd_unit: hyrule-engineering-loop.timer
  - name: knowledge-mcp-service
    check_command: prom_systemd_unit
    interval: 2m
    retry: 1m
    notes: "Knowledge MCP container service is active on loopback for Engineering Loop context"
    vars:
      prom_instance: "[{{ peers.loop.ipv6 }}]:9100"
      systemd_unit: hyrule-knowledge-mcp.service
  - name: agent-core-collector-health
    check_command: http
    interval: 1m
    retry: 30s
    max_check_attempts: 3
    notes: "Agent-Core trace collector health endpoint over the management overlay"
    vars:
      http_address: "{{ peers.loop.ipv6 }}"
      http_port: 8770
      http_uri: /healthz
      http_vhost: agent-core-collector.loop.as215932.internal
      http_ssl: false
      http_ipv6: true
      http_timeout: 5
      http_expect_body_regex: '"status":"ok"'

firewall_extra_rules:
  # node_exporter scrape from mon only.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }
  # Agent-Core collector: local loop producers, NOC producers, and mon health check only.
  - { proto: tcp, dport: 8770, src: ["{{ peers.loop.ipv6 }}", "{{ peers.noc.ipv6 }}", "{{ peers.mon.ipv6 }}"], comment: "agent-core collector" }

firewall_forward_extra_raw_nft: |
  iifname docker0 ip6 saddr {{ loop_docker_subnet }} counter accept comment "loop Docker IPv6 egress"

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: loop
