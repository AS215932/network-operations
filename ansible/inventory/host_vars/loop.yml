---
# loop — dedicated Engineering Loop operations-lane VM.
# Runs one budgeted, issue-driven agent cycle at a time. It is deliberately
# not a deploy source for the infra fleet: no fleet SSH key, no production
# Vault breadth, and no public listener beyond node_exporter for mon.

# Bumped to the insight-stream build (#37): governor/daemon/intake decisions
# become InsightDecisionRecords, capability success-history CLI for the
# Tier-2 governor path. Emission is live via
# engineering_loop_insight_records_enabled below.
engineering_loop_version: "c393d005f9aea18ecc8bd54427f07257673a63d0"
engineering_loop_timer_enabled: true
engineering_loop_governor_timer_enabled: true
engineering_loop_noc_lhp_base_url: "http://[{{ peers.noc.ipv6 }}]:8000"
engineering_loop_lhp_callback_enabled: true
# Turn agent-core TraceEvent/CostUsage emission on for the live loop cycles.
engineering_loop_agent_core_trace_enabled: true
engineering_loop_agent_core_trace_collector_url: "http://[{{ peers.loop.ipv6 }}]:8770/v1/trace"
# Emit governor/daemon/intake decisions as InsightDecisionRecords to the
# collector (loop_decision_envelope events, open past the label-scoped ingest
# guard). Read-only; the second producer after NOC (#419) into the IDQ/CGS
# stream, and the data source for the Governor Tier-2-with-history gate.
engineering_loop_insight_records_enabled: true

# Local read-only knowledge MCP server for Engineering Loop context. It is
# deployed as a Docker container and bound to host loopback only. Pinned to
# the grounding-aware build (#35): grounding.jsonl/sqlite grounding table in
# exports, insight metrics CLI; A0 issue + A1 routing context unchanged.
knowledge_mcp_version: "a68f974e7ed093d8f4195a15dc5b1afc636999f4"
knowledge_mcp_enabled: true
knowledge_mcp_host: 127.0.0.1
knowledge_mcp_port: 8767
knowledge_mcp_transport: streamable-http
knowledge_mcp_agent_core_trace_enabled: true
knowledge_mcp_agent_core_trace_collector_url: "http://[{{ peers.loop.ipv6 }}]:8770/v1/trace"
# Docker uses routed IPv6 for egress: containers receive GUA addresses from
# this /64, and rtr has a static/iBGP return route via loop's infra address.
knowledge_mcp_docker_ipv6_enabled: true
knowledge_mcp_docker_fixed_cidr_v6: "{{ loop_docker_subnet }}"
knowledge_mcp_docker_dns:
  - "{{ peers.rtr.ipv6 }}"

# Collector-backed Agent-Core trace ingestion. The collector binds only to the
# loop overlay address and stores events in local Postgres. v0.8.1: insight
# read API (GET /v1/insights), 180d insight retention prune, and the ingest
# token (HYRULE_COLLECTOR_INGEST_TOKEN) now guards ONLY insight_label writes —
# trace + insight-record ingest stays open so the token can't 401 producers
# (network-operations#422). Required before minting the token (#420/#421).
agent_core_collector_version: "5cf30cbf3729d41874262c49fb70552a311b1b4b"
agent_core_collector_enabled: true
agent_core_collector_bind: "{{ peers.loop.ipv6 }}"
agent_core_collector_port: 8770

# Standalone read-only Knowledge API (knowledge#36): serves IDQ/CGS/silence
# metrics (source=ledger|collector) + concepts to the Observatory metrics page,
# so operators never SSH to run the CLI. Reads only; the insight ledger is
# still written solely by the reviewed nightly sync. Binds the loop overlay
# (mon health-checks it; observatory calls it same-host).
knowledge_api_version: "5da5e30d88c037d0a3055973b05999c68f310844"
knowledge_api_enabled: true
knowledge_api_bind: "{{ peers.loop.ipv6 }}"
knowledge_api_port: 8781
knowledge_api_collector_url: "http://[{{ peers.loop.ipv6 }}]:8770"

# Governed Knowledge Loop producer agent (distinct from the read-only Knowledge
# MCP above). Pinned to the merged Knowledge revision that ships runtime
# LoopDecisionEnvelope emission, shared decision memory export/query support,
# A0 GitHub issue context, and A1 routing policy context for knowledge-gap
# routing (AS215932/knowledge#30–#33) plus the grounding/insight build (#35:
# grounding exports, IDQ/CGS metrics CLI, insight sync behind
# insight_sync_enabled=false). The canary runs daily, opens at most one
# reviewed PR/day, and keeps live OpenRouter calls disabled.
knowledge_loop_version: "a68f974e7ed093d8f4195a15dc5b1afc636999f4"
knowledge_loop_timer_enabled: true
knowledge_loop_agent_core_trace_enabled: true
knowledge_loop_agent_core_trace_collector_url: "http://[{{ peers.loop.ipv6 }}]:8770/v1/trace"
# Phase-2 nightly insight sync: pull collector decisions/labels into
# ledger/insights/ on the reviewed nightly PR (durable, git-tracked archival —
# the only insight-ledger write path). Staged disabled; the collector URL is
# wired. Flip enabled to true in a promotion PR once labels are flowing (#425).
knowledge_loop_insight_sync_enabled: false
knowledge_loop_insight_collector_url: "http://[{{ peers.loop.ipv6 }}]:8770"
knowledge_loop_max_openrouter_calls_per_day: 0
knowledge_loop_max_prs_per_day: 1

# Agentic Observatory internal operator console. Insight inbox (#9) ships
# read-only: the label action stays out of OBSERVATORY_ENABLED_ACTIONS until
# the collector ingest token exists (fails closed without it).
agentic_observatory_version: "00127b4c6a5482296c6177e7454201e34ebb5894"
agentic_observatory_user: agentic-observatory
agentic_observatory_group: agentic-observatory
agentic_observatory_config_dir: /etc/agentic-observatory
agentic_observatory_env_file: /etc/agentic-observatory/observatory.env
agentic_observatory_state_dir: /var/lib/agentic-observatory
agentic_observatory_enabled: true
agentic_observatory_host: "{{ peers.loop.ipv6 }}"
agentic_observatory_port: 8780
agentic_observatory_read_only: false
agentic_observatory_actions_enabled: true
# Staged write rollout, stage 1 (LIVE): low-risk case actions only. The gated
# revision (af4dff6) was installed first (PR #329) so this flip restarts on
# allowlist-aware code. Expand the allowlist (suppress, artifact_review,
# verification_result) only in later stages, each as its own change.
# insight_label (#9): accept/dismiss/defer/edit an insight -> InsightLabel
# posted to the collector for IDQ/CGS scoring. Fails closed without the
# collector ingest token, so this must land AFTER that token is minted +
# rendered (OBSERVATORY_COLLECTOR_INGEST_TOKEN).
agentic_observatory_enabled_actions: "feedback,ack,insight_label"
agentic_observatory_collector_base_url: "http://[{{ peers.loop.ipv6 }}]:8770"
agentic_observatory_noc_base_url: "http://[{{ peers.noc.ipv6 }}]:8000"

# Dogfood scope: let the loop author the VPS launch-proof wedge in hyrule-cloud
# (still draft-PR + human-merge gated). All other repos stay docs-only.
engineering_loop_allowed_paths:
  hyrule-cloud:
    - hyrule_cloud
    - tests
    - scripts
    - docs
  hyrule-web:
    - frontend
    - hyrule_web
    - tests

monitoring_register: true
monitoring_role: loop
monitoring_check_vars:
  engineering_loop: true
  notification_route: ai

monitoring_disks:
  "disk /": { mountpoint: "/" }

monitoring_extra_services:
  - name: engineering-loop
    check_command: dummy
    interval: 1h
    retry: 5m
    enable_active_checks: false
    enable_passive_checks: true
    notes: "Passive run-status check submitted by the Engineering Loop daemon after every cycle"
  - name: engineering-loop-timer
    check_command: prom_systemd_unit
    interval: 2m
    retry: 1m
    notes: "Engineering Loop hourly timer is active on the dedicated loop VM"
    vars:
      prom_instance: "[{{ peers.loop.ipv6 }}]:9100"
      systemd_unit: hyrule-engineering-loop.timer
  - name: knowledge-mcp-service
    check_command: prom_systemd_unit
    interval: 2m
    retry: 1m
    notes: "Knowledge MCP container service is active on loopback for Engineering Loop context"
    vars:
      prom_instance: "[{{ peers.loop.ipv6 }}]:9100"
      systemd_unit: hyrule-knowledge-mcp.service
  - name: agentic-observatory-health
    check_command: http
    interval: 1m
    retry: 30s
    max_check_attempts: 3
    notes: "Agentic Observatory internal operator console health endpoint"
    vars:
      http_address: "{{ peers.loop.ipv6 }}"
      http_port: 8780
      http_uri: /healthz
      http_vhost: observatory.servify.network
      http_ssl: false
      http_ipv6: true
      http_timeout: 5
      http_expect_body_regex: '"status":"ok"'
  - name: agent-core-collector-health
    check_command: http
    interval: 1m
    retry: 30s
    max_check_attempts: 3
    notes: "Agent-Core trace collector health endpoint over the management overlay"
    vars:
      http_address: "{{ peers.loop.ipv6 }}"
      http_port: 8770
      http_uri: /healthz
      http_vhost: agent-core-collector.loop.as215932.internal
      http_ssl: false
      http_ipv6: true
      http_timeout: 5
      http_expect_body_regex: '"status":"ok"'
  - name: knowledge-api-health
    check_command: http
    interval: 1m
    retry: 30s
    max_check_attempts: 3
    notes: "Knowledge read API health endpoint (insight metrics + concepts)"
    vars:
      http_address: "{{ peers.loop.ipv6 }}"
      http_port: 8781
      http_uri: /healthz
      http_vhost: knowledge-api.loop.as215932.internal
      http_ssl: false
      http_ipv6: true
      http_timeout: 5
      http_expect_body_regex: '"status":"ok"'

firewall_extra_rules:
  # node_exporter scrape from mon only.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }
  # Agent-Core collector: local loop producers, NOC producers, and mon health check only.
  - { proto: tcp, dport: 8770, src: ["{{ peers.loop.ipv6 }}", "{{ peers.noc.ipv6 }}", "{{ peers.mon.ipv6 }}"], comment: "agent-core collector" }
  # Knowledge read API: same-host Observatory + mon health check only.
  - { proto: tcp, dport: 8781, src: ["{{ peers.loop.ipv6 }}", "{{ peers.mon.ipv6 }}"], comment: "knowledge read API" }
  # Agentic Observatory: proxy and mon health checks only.
  - { proto: tcp, dport: 8780, src: ["{{ peers.proxy.ipv6 }}", "{{ peers.mon.ipv6 }}"], comment: "agentic observatory" }

firewall_forward_extra_raw_nft: |
  iifname docker0 ip6 saddr {{ loop_docker_subnet }} counter accept comment "loop Docker IPv6 egress"

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: loop

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "Debian 13"
  role: "Engineering Loop operations-lane VM (draft PR automation, no fleet SSH)"
  summary: "Engineering Loop operations-lane VM: consumes loop:approved issues and stops at draft PRs; hosts the Agent-Core trace collector and a loopback knowledge MCP."
  notes: "Not an infra deploy source: no fleet SSH key, no app runtime secrets, no Vault breadth. Docker bridge containers get routed GUA /64 addresses (2a0c:b641:b50:f0::/64), resolve via rtr Unbound, and egress over IPv6. loop does not SSH to the infra fleet."
network_flows_outbound:
  - { to: github, proto: tcp, port: 443, purpose: "issues, checkouts, branch pushes, draft PRs, knowledge MCP build context" }
  - { to: model-providers, proto: tcp, port: 443, purpose: "selected backend/provider LLM APIs" }
  - { to: mon, proto: tcp, port: 5665, purpose: "Icinga passive check submission" }
  - { to: log, proto: tcp, port: 6000, purpose: "Vector agent to aggregator" }
  - { to: vault, proto: tcp, port: 8200, purpose: "Vault Agent secret render" }
  - { to: rtr, proto: "tcp+udp", port: 53, purpose: "Docker bridge containers resolve via rtr Unbound (DNS64)" }
  - { to: public, proto: tcp, port: 443, purpose: "Docker container base-image and package downloads over routed IPv6 egress" }
