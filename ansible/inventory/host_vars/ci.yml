---
# ci — self-hosted GitHub Actions runner for AS215932/network-operations.
#
# The runner picks up workflow jobs labeled `self-hosted, linux, x64, hyrule-infra`
# (see .github/workflows/*.yml). It has overlay v6 reach to every infra host and
# a Vault AppRole for secret retrieval during apply runs.
#
# First-time provisioning runbook: docs/ci/provision.md

github_runner_storage_enabled: true
github_runner_data_disk_device: /dev/xvdi

monitoring_disks:
  "disk /": { mountpoint: "/" }
  "disk /var/lib/github-runner": { mountpoint: "/var/lib/github-runner" }

firewall_extra_rules:
  # node_exporter scrape from mon only.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }

# Monitoring — register on mon (new host, not in legacy infra-vms.conf).
# The runner-health check lives in configs/mon/icinga2/services/github-runner.conf
# (Prometheus query on node_systemd_unit_state) — no by_ssh trust plumbing needed.
monitoring_register: true
monitoring_role: ci
monitoring_check_vars:
  github_runner: true

# Logs — ship journald to log VM.
logs_register: true
logs_role: ci

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "Debian 13"
  role: "Self-hosted GitHub Actions runner (privileged)"
  summary: "Privileged self-hosted GitHub Actions runner for AS215932/network-operations; runs apply jobs against the fleet."
  notes: "Outbound only — no inbound from the public internet."
network_flows_outbound:
  - { to: github, proto: tcp, port: 443, purpose: "poll runner queue, fetch action images" }
  - { to: anthropic, proto: tcp, port: 443, purpose: "AI review (api.anthropic.com)" }
  - { to: all-infra, proto: tcp, port: 22, purpose: "apply runs via ansible-playbook --tags apply" }
  - { to: mon, proto: tcp, port: 9090, purpose: "Prometheus query during render-check" }
  - { to: log, proto: tcp, port: 6000, purpose: "Vector agent to aggregator" }
