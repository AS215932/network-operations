---
# agentmail — dedicated Stalwart host for the API-only Agent Mail product.
# This is intentionally separate from the corporate OpenBSD `mail` host.

# Every mutation/listener is staged off. A launch change must flip these gates
# in reviewed inventory and satisfy the role's readiness assertions.
agent_mail_apply: false
agent_mail_start: false
agent_mail_public_enabled: false
agent_mail_canary_enabled: false
agent_mail_smtp_firewall_enabled: false
agent_mail_bootstrap_enabled: false
agent_mail_bootstrap_firewall_enabled: false
agent_mail_backup_enabled: false

agent_mail_legal_approved: false
agent_mail_abuse_process_approved: false
agent_mail_dns_verified: false
agent_mail_ptr_verified: false
agent_mail_backup_restore_verified: false
agent_mail_canaries_verified: false

# Populated only for the bounded pre-launch canary window. Each entry must be a
# global-unicast CIDR; /0 is rejected. Resolve and freeze the exact controlled
# sender and recipient MX ranges immediately before the reviewed canary apply.
agent_mail_canary_inbound_ipv4_sources: []
agent_mail_canary_inbound_ipv6_sources: []
agent_mail_canary_outbound_ipv4_destinations: []
agent_mail_canary_outbound_ipv6_destinations: []

# Dedicated public IPv4 is intentionally absent until provisioned and PTR-
# verified. Never substitute the corporate mail failover address.
agent_mail_public_ipv4: "{{ lookup('ansible.builtin.env', 'AGENT_MAIL_PUBLIC_IPV4') | default('', true) }}"
agent_mail_bridge_name: br-agentmail
agent_mail_bridge_ipv6_subnet: "fd21:5932:110::/64"

# Apply-only secrets. Operators load these from Vault into the environment;
# controller review artifacts contain names/placeholders, never values.
agent_mail_dns_tsig_secret: "{{ lookup('ansible.builtin.env', 'AGENT_MAIL_DNS_TSIG_SECRET') | default('', true) }}"
agent_mail_webhook_secret: "{{ lookup('ansible.builtin.env', 'AGENT_MAIL_WEBHOOK_SECRET') | default('', true) }}"
agent_mail_recovery_admin_secret: "{{ lookup('ansible.builtin.env', 'AGENT_MAIL_RECOVERY_ADMIN_SECRET') | default('', true) }}"

firewall_extra_rules:
  # JMAP management/data plane and readiness/metrics. No customer credentials
  # or public SMTP submission are exposed.
  - { proto: tcp, dport: 443, src: ["{{ peers.api.ipv6 }}", "{{ peers.mon.ipv6 }}", "{{ ops_prefix_v6 }}", "{{ vpn_clients_subnet }}"], family: ip6, comment: "Agent Mail internal HTTPS/JMAP" }
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", family: ip6, comment: "node_exporter scrape" }

  # Bootstrap is a temporary operator-only listener. Both this inventory gate
  # and agent_mail_bootstrap_enabled must be reviewed to true together.
  - { proto: tcp, dport: 8080, src: ["{{ ops_prefix_v6 }}", "{{ vpn_clients_subnet }}"], family: ip6, enabled: false, comment: "Stalwart bootstrap (temporary)" }

  # SMTP reception is staged but disabled. Public launch uses `any`; the
  # temporary canary mode substitutes the reviewed source CIDRs above.
  - { proto: tcp, dport: 25, src: "{{ 'any' if agent_mail_public_enabled | bool else agent_mail_canary_inbound_ipv6_sources }}", family: ip6, enabled: false, comment: "Agent Mail SMTP reception IPv6 (gated)" }
  - { proto: tcp, dport: 25, src: "{{ 'any' if agent_mail_public_enabled | bool else agent_mail_canary_inbound_ipv4_sources }}", family: ip, enabled: false, comment: "Agent Mail SMTP reception IPv4 (gated)" }

# Docker-published ports traverse the forward hook after DNAT. Pin the bridge
# name in Compose so these rules are deterministic. The bridge has an IPv6 ULA;
# Docker's default NAT gateway mode masquerades its egress to the host's
# allowlisted overlay address. Private JMAP and bootstrap retain their source
# restrictions. SMTP is unrestricted only at public launch; the temporary
# canary gate pins both reception and delivery to reviewed global CIDRs.
firewall_forward_pre_established_raw_nft: |
  {% if not (agent_mail_smtp_firewall_enabled | bool) %}
  iifname "{{ agent_mail_bridge_name }}" tcp dport 25 counter drop comment "Agent Mail outbound SMTP kill switch"
  {% endif %}

firewall_forward_extra_raw_nft: |
  ip6 saddr { {{ peers.api.ipv6 }}, {{ peers.mon.ipv6 }}, {{ ops_prefix_v6 }}, {{ vpn_clients_subnet }} } ct status dnat oifname "{{ agent_mail_bridge_name }}" tcp dport 443 counter accept comment "Agent Mail private JMAP DNAT"
  {% if agent_mail_bootstrap_firewall_enabled | bool %}
  ip6 saddr { {{ ops_prefix_v6 }}, {{ vpn_clients_subnet }} } ct status dnat oifname "{{ agent_mail_bridge_name }}" tcp dport 8080 counter accept comment "Agent Mail bootstrap DNAT"
  {% endif %}
  {% if agent_mail_start | bool %}
  iifname "{{ agent_mail_bridge_name }}" udp dport 53 counter accept comment "Agent Mail DNS egress"
  iifname "{{ agent_mail_bridge_name }}" tcp dport { 53, 443 } counter accept comment "Agent Mail DNS and HTTPS egress"
  {% endif %}
  {% if agent_mail_public_enabled | bool %}
  ct status dnat oifname "{{ agent_mail_bridge_name }}" tcp dport 25 counter accept comment "Agent Mail SMTP reception DNAT"
  iifname "{{ agent_mail_bridge_name }}" tcp dport 25 counter accept comment "Agent Mail SMTP delivery"
  {% elif agent_mail_canary_enabled | bool %}
  ip6 saddr { {{ agent_mail_canary_inbound_ipv6_sources | join(', ') }} } ct status dnat oifname "{{ agent_mail_bridge_name }}" tcp dport 25 counter accept comment "Agent Mail restricted canary SMTP reception IPv6"
  ip saddr { {{ agent_mail_canary_inbound_ipv4_sources | join(', ') }} } ct status dnat oifname "{{ agent_mail_bridge_name }}" tcp dport 25 counter accept comment "Agent Mail restricted canary SMTP reception IPv4"
  iifname "{{ agent_mail_bridge_name }}" ip6 daddr { {{ agent_mail_canary_outbound_ipv6_destinations | join(', ') }} } tcp dport 25 counter accept comment "Agent Mail restricted canary SMTP delivery IPv6"
  iifname "{{ agent_mail_bridge_name }}" ip daddr { {{ agent_mail_canary_outbound_ipv4_destinations | join(', ') }} } tcp dport 25 counter accept comment "Agent Mail restricted canary SMTP delivery IPv4"
  {% endif %}

# The firewall role owns only `table inet filter` on this Docker host. Replacing
# that table instead of flushing the complete ruleset preserves Docker's NAT,
# forwarding, and masquerade tables across later firewall reloads.
firewall_preserve_external_tables: true

monitoring_register: true
monitoring_role: agent-mail
monitoring_display_name: "agentmail (Stalwart, API-only)"
monitoring_node_listen: "[{{ peers.agentmail.ipv6 }}]:9100"
monitoring_node_textfile_dir: /var/lib/node_exporter/textfile_collector
monitoring_disks:
  "disk /": { mountpoint: "/" }
  "disk /mnt/agent-mail-backup": { mountpoint: "/mnt/agent-mail-backup" }
monitoring_extra_services:
  - name: stalwart-ready
    check_command: http
    interval: 1m
    retry: 30s
    max_check_attempts: 5
    notes: "Stalwart readiness over the private HTTPS/JMAP listener"
    vars:
      http_address: "{{ peers.agentmail.ipv6 }}"
      http_port: 443
      http_uri: /healthz/ready
      http_vhost: mx1.agentmail.hyrule.host
      http_ssl: true
      http_sni: true
      http_ipv6: true
      http_timeout: 10
  - name: agent-mail-backup-timer
    check_command: prom_systemd_unit
    interval: 5m
    retry: 1m
    max_check_attempts: 3
    notes: "Agent Mail quiesced-backup timer is active"
    vars:
      prom_instance: "[{{ peers.agentmail.ipv6 }}]:9100"
      systemd_unit: agent-mail-backup.timer
  - name: agent-mail-backup-service
    check_command: prom_systemd_not_failed
    interval: 5m
    retry: 1m
    max_check_attempts: 3
    notes: "Agent Mail backup oneshot has no failed systemd state"
    vars:
      prom_instance: "[{{ peers.agentmail.ipv6 }}]:9100"
      systemd_unit: agent-mail-backup.service
  - name: agent-mail-backup-freshness
    check_command: prom_agent_mail_backup_freshness
    interval: 5m
    retry: 1m
    max_check_attempts: 3
    notes: "Latest successful Agent Mail backup is recent"
    vars:
      prom_instance: "[{{ peers.agentmail.ipv6 }}]:9100"
      backup_warn_seconds: 93600
      backup_crit_seconds: 129600

logs_register: true
logs_role: agent-mail

host_meta:
  os: "Debian 13"
  role: "Stalwart Agent Mail (dedicated, API-only)"
  summary: "Dedicated Stalwart host for disposable Agent Mail accounts; public launch remains gated off in inventory."
  notes: "Only SMTP reception on tcp/25 is eligible for public exposure. HTTPS/JMAP is private to api/mon/operators; SMTP submission, IMAP, POP, ManageSieve, and webmail are never published."
  ipv4: "unassigned — dedicated address and PTR required before launch"
network_flows_outbound:
  - { to: dns, proto: "tcp+udp", port: 53, purpose: "Agent Mail resolver traffic and TSIG-authenticated DNS updates" }
  - { to: hyrule-cloud, proto: tcp, port: 443, purpose: "signed Stalwart event webhooks" }
  - { to: acme-providers, proto: tcp, port: 443, purpose: "certificate issuance" }
  - { to: public, proto: tcp, port: 25, purpose: "outbound SMTP delivery from product mailboxes" }
  - { to: package-registries, proto: tcp, port: 443, purpose: "pinned Stalwart container image pull" }
