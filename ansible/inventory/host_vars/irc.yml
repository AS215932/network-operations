---
# irc — Soju IRC bouncer.
# TLS termination is handled by Caddy on proxy; soju listens plaintext on :6697
# and is reachable only from proxy (and the ops-prefix/vpn-clients SSH set).

firewall_extra_rules:
  # Soju bouncer — TLS terminated by Soju itself.
  - { proto: tcp, dport: 6697, src: any, family: v6, comment: "Soju IRCS (public)" }

  # ACME HTTP-01 challenge — certbot --standalone briefly binds tcp/80 during issuance/renewal.
  # We're using HTTP-01 instead of DNS-01 because Openprovider secondaries don't refresh
  # in time for the ACME check (project_openprovider_notify memory).
  - { proto: tcp, dport: 80, src: any, family: v6, comment: "ACME HTTP-01 (certbot standalone)" }

  # Monitoring.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }

# --- Monitoring ---
monitoring_register: true
monitoring_display_name: "irc (Soju IRC bouncer)"
monitoring_role: irc
monitoring_extra_services:
  - name: ircs-tcp
    check_command: tcp
    interval: 2m
    notes: "Soju TLS listener on tcp/6697"
    vars: { tcp_address: "{{ peers.irc.ipv6 }}", tcp_port: 6697 }
  - name: ircs-cert-validity
    check_command: ssl
    interval: 1h
    notes: "TLS certificate days-until-expiry on Soju"
    vars: { ssl_address: "{{ peers.irc.ipv6 }}", ssl_port: 6697, ssl_cert_valid_days_warn: 14, ssl_cert_valid_days_critical: 5 }
