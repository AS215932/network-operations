# extmon — external monitoring host (Vultr / DigitalOcean / Hetzner Cloud).
#
# Lives outside AS215932. Probes our public services from the open internet
# the same way real users do, and posts alerts to Discord *directly* —
# never via NAT64. Independent failure domain from the OVH server.
#
# Stack: prometheus + blackbox_exporter + alertmanager (Debian apt packages).
# Self-scrape: prometheus-node-exporter on :9100.
#
# Provisioning runbook: docs/extmon.md.

# extmon is a Debian VPS but sits in the `external` group, not `linux`, so it
# doesn't inherit these from group_vars/linux.yml. Set them statically so
# --connection=local renders (the firewall role's include_vars) don't fail on
# an unprovisioned host with no gathered facts.
ansible_os_family: Debian
ansible_distribution: Debian

# Role gate: false renders configs to ansible/generated/extmon/ but does not
# install packages or restart services. Mirrors the other roles' apply gates.
extmon_apply: false

# Discord webhook for Alertmanager. Will move to Vault in Phase C/L4 — for
# now sourced from secrets.local.sh on the operator's workstation:
#   export EXTMON_DISCORD_WEBHOOK_URL='https://discord.com/api/webhooks/...'
# Use discord.com (v4 + v6) instead of discordapp.com (v4-only) so future
# redeploys to v6-preferred providers stay clean.
extmon_discord_webhook_url: "{{ lookup('ansible.builtin.env', 'EXTMON_DISCORD_WEBHOOK_URL') | default('') }}"
extmon_noc_alertmanager_webhook_url: "{{ lookup('ansible.builtin.env', 'EXTMON_NOC_ALERTMANAGER_WEBHOOK_URL') | default('') }}"

# BGP/network intelligence secrets. Cloudflare Radar is optional but improves
# hijack/leak/MOAS visibility; Hyrule ingest is used once /v1/internal/bgp is live.
# Native BGPStream packages do not support Debian 13/trixie yet.
extmon_install_bgpstream: false
extmon_bgp_cloudflare_api_token: "{{ lookup('ansible.builtin.env', 'EXTMON_BGP_CLOUDFLARE_API_TOKEN') | default('') }}"
extmon_bgp_hyrule_ingest_url: "{{ lookup('ansible.builtin.env', 'EXTMON_BGP_HYRULE_INGEST_URL') | default('https://cloud.hyrule.host/v1/internal/bgp', true) }}"
extmon_bgp_ingest_token: "{{ lookup('ansible.builtin.env', 'EXTMON_BGP_INGEST_TOKEN') | default('', true) }}"
extmon_bgp_bgp_tools_user_agent: "{{ lookup('ansible.builtin.env', 'EXTMON_BGP_BGPTOOLS_USER_AGENT') | default('AS215932-bgp-observer/1.0 (noc@as215932.net; +https://as215932.net)', true) }}"
extmon_diag_agent_token: "{{ lookup('ansible.builtin.env', 'EXTMON_DIAG_AGENT_TOKEN') | default('') }}"

# OVH API credentials for the service-expiry collector (Phase C/L0b). Same
# tokens as scripts/ovh-cli.py uses; rendered into /etc/ovh.conf on extmon.
extmon_ovh_endpoint: "{{ lookup('ansible.builtin.env', 'OVH_ENDPOINT') | default('ovh-eu') }}"
extmon_ovh_application_key: "{{ lookup('ansible.builtin.env', 'OVH_APPLICATION_KEY') | default('') }}"
extmon_ovh_application_secret: "{{ lookup('ansible.builtin.env', 'OVH_APPLICATION_SECRET') | default('') }}"
extmon_ovh_consumer_key: "{{ lookup('ansible.builtin.env', 'OVH_CONSUMER_KEY') | default('') }}"
extmon_ovh_server_name: "ns3526203.ip-193-70-32.eu"
extmon_ovh_failover_ips:
  - "46.105.40.223"   # rtr (NAT64 + Caddy DNAT)
  - "51.91.236.215"   # mail (SMTP/IMAP failover)
  - "54.38.14.218"    # ns2 (auth DNS secondary)

# Mon delegates the public IPv4 API health probe to extmon's dual-stack
# blackbox_exporter. The service listens on :9115 by package default; expose it
# only to the mon peer.
firewall_extra_rules:
  - { proto: tcp, dport: 9115, src: "{{ peers.mon.ipv6 }}", comment: "blackbox IPv4 probes requested by mon" }

# Inbound SSH allow-list comes from the firewall role's standard set (ops
# workstation, VPN clients, ci, noc, mon) — UFW and its extmon_ssh_allow_*
# vars are retired; see roles/extmon/tasks/ufw.yml.

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
# extmon lives OUTSIDE AS215932 (off-net, different ASN) so it is not part of the
# overlay flow map, but it is transcribed here because its host_vars file exists
# and it appears as a source in noc's inbound rules.
host_meta:
  os: "Debian 13"
  role: "External monitoring host (off-net)"
  summary: "Off-net external monitor (Vultr London, different ASN) probing AS215932 public services from the outside and posting alerts directly."
  notes: "Outside AS215932; independent failure domain. Runs its own Prometheus + blackbox + Alertmanager. Inbound SSH comes from the firewall role's standard allow set."
network_flows_outbound:
  - { to: noc, proto: tcp, port: 8000, purpose: "best-effort external Alertmanager webhook enrichment" }
  - { to: hyrule-cloud, proto: tcp, port: 443, purpose: "BGP intelligence ingest (cloud.hyrule.host/v1/internal/bgp)" }
  - { to: public, proto: tcp, port: 443, purpose: "probe AS215932 public services, Discord webhook, Cloudflare Radar, OVH API" }
  # blackbox probes of AS215932 public services from off-net (over public IPv6).
  - { to: dns, proto: udp, port: 53, purpose: "blackbox DNS SOA probe of ns1 (auth Knot)" }
  - { to: ns2, proto: udp, port: 53, purpose: "blackbox DNS SOA probe of ns2 (off-net secondary)" }
  - { to: mail, proto: tcp, port: [25, 465, 587, 993], purpose: "blackbox SMTP/submission/IMAPS reachability + TLS probes" }
  - { to: public, proto: icmp6, purpose: "blackbox ICMP v4/v6 reachability probes of AS215932 endpoints" }
