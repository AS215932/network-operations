---
# ci-pr — UNPRIVILEGED self-hosted GitHub Actions runner for untrusted PR code
# (PR-Agent, Semgrep, and — after Wave 4 — all pull_request lint/test/build jobs).
#
# Deliberately on the CUSTOMER-ISOLATED segment (2a0c:b641:b51::/48, rtr enX3):
# rtr's forward chain drops enX3 -> { enX2 infra, enX0 mgmt }, so a compromised
# PR job here cannot reach the management overlay. Treat ci-pr as DISPOSABLE.
#
# Hard isolation vs the privileged `ci` runner:
#   - github_runner_vault_enabled: false  -> no Vault AppRole, no secrets.env
#   - github_runner_ssh_key_path: ""      -> no id_ci fleet deploy key
#   - containerlab/xcaddy disabled         -> no lab toolchain
#   - no infra/mgmt reachability (customer isolation enforced on rtr)
#
# Monitoring works (mon -> ci-pr:9100 is infra->customer = permitted, pull-only).
# Log shipping does NOT (ci-pr -> log:6000 is customer->infra = dropped by the
# isolation), so logs_register stays false — local journald only. Turning it on
# would require punching a ci-pr->log hole in the customer isolation; don't.
#
# Runbook: docs/ci/provision-ci-pr.md. Flows: docs/network-flows.md -> "### ci-pr".

# --- github_runner role: UNPRIVILEGED profile ---
github_runner_group_name: public-pr
github_runner_labels:
  - self-hosted
  - linux
  - "{{ github_runner_arch }}"
  - hyrule-public-pr
github_runner_vault_enabled: false        # no AppRole, no /etc/github-runner/secrets.env
github_runner_ssh_key_path: ""            # no id_ci deploy key
github_runner_containerlab_enabled: false # labs stay on the privileged `ci` runner
github_runner_caddy_rfc2136_enabled: false
github_runner_storage_enabled: false      # no separate data disk
# Routed-GUA container networking. Containers get GUAs from this /64 (a slice of
# our customer /48); ci-pr forwards (net.ipv6.conf.all.forwarding=1, set by the
# role) and rtr routes the /64 back via a static route
# (2a0c:b641:b51:c1::/64 via 2a0c:b641:b51::c1, issue #132). Docker 26.x leaves
# ip6tables/IPv6-NAT off, so this is true routing — no masquerade — which the
# rtr return route depends on.
github_runner_docker_ipv6_enabled: true
github_runner_docker_fixed_cidr_v6: "2a0c:b641:b51:c1::/64"
# Container resolver = rtr's Unbound. It binds ONLY the infra address
# 2a0c:b641:b50:2::1 (no listener on the customer gateway 2a0c:b641:b51::1 —
# verified live), and rtr's input chain explicitly accepts :53 from the whole
# customer /48 ("DNS recursion from overlay"). Querying rtr's own recursive
# resolver is router-input, not a customer→infra-HOST forward, so it does not
# breach ci-pr's customer isolation — and it inherits the #131 DNS64 CloudFront
# override (Docker blob pulls take the fast NAT64 path).
github_runner_docker_dns:
  - "2a0c:b641:b50:2::1"

# --- Firewall: default-deny inbound + node_exporter scrape from mon only ---
# node_exporter is pull-only; mon -> ci-pr is infra->customer, which rtr permits.
firewall_extra_rules:
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape (mon, pull-only)" }
firewall_forward_extra_raw_nft: |
  iifname docker0 ip6 saddr {{ github_runner_docker_fixed_cidr_v6 }} counter accept comment "ci-pr Docker IPv6 egress"

# --- Monitoring: register on mon (Icinga host + node_exporter scrape) ---
monitoring_register: true
monitoring_role: ci
monitoring_check_vars:
  github_runner: true

# --- Logs: OFF. Pushing to the log VM (customer->infra) is dropped by the
# customer isolation; shipping would require weakening that boundary. The logs
# role end_hosts itself when logs_register is false — local journald only.
logs_register: false

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "Debian 13"
  role: "Unprivileged PR runner (PR-Agent/Semgrep/PR CI)"
  summary: "Unprivileged self-hosted GitHub Actions runner for untrusted PR code, deliberately on the customer-isolated segment."
  notes: "Customer-isolated: rtr drops forwarding from 2a0c:b641:b51::/48 to infra/router/mgmt ranges. No Vault, no id_ci, no Containerlab, no log shipping (ci-pr to log:6000 is customer-to-infra, dropped) — treated as disposable."
network_flows_outbound:
  - { to: github, proto: tcp, port: 443, purpose: "runner queue, action images" }
  - { to: openrouter, proto: tcp, port: 443, purpose: "PR-Agent LLM" }
  - { to: package-registries, proto: tcp, port: 443, purpose: "PyPI/npm/ghcr/Docker Hub toolchain and semgrep image" }
  - { to: rtr, proto: "tcp+udp", port: 53, purpose: "Unbound + DNS64 via 2a0c:b641:b51::1" }
