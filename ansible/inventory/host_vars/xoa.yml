---
# xoa — Xen Orchestra. mgmt NIC reaches dom0 XAPI; infra NIC serves UI.

# enX0 is XOA-appliance-managed (netplan-rendered to /run); enX1 is the static
# infra-bound NIC carrying our overlay resolver. Attach the search-domain drop-in
# there so it doesn't fight the appliance.
networkd_primary_unit: "10-enX1"

firewall_extra_rules:
  # Xen Orchestra UI — proxied by Caddy.
  - { proto: tcp, dport: [80, 443], src: "{{ peers.proxy.ipv6 }}", comment: "XO UI from proxy" }

  # XAPI talks back over the mgmt /24. dom0 contacts XO via 10.0.0.10.
  - { proto: tcp, dport: 80,  src: "10.0.0.0/24", family: ip, comment: "XAPI from dom0 (mgmt v4)" }
  - { proto: tcp, dport: 443, src: "10.0.0.0/24", family: ip, comment: "XAPI HTTPS from dom0 (mgmt v4)" }

  # Monitoring.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: xoa

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "Debian 13"
  role: "Xen Orchestra"
  summary: "Xen Orchestra appliance: the infra NIC serves the UI (via Caddy on proxy) and the mgmt NIC reaches dom0 XAPI."
network_flows_outbound: []
