---
# mon — Prometheus + Alertmanager + Grafana + Icinga2 + blackbox_exporter.
# Discord webhook for mon alerts (Alertmanager + Icinga2). On the CI runner the
# Vault-rendered env provides DISCORD_WEBHOOK_URL (github-runner.env.ctmpl.j2),
# NOT a mon-specific var — so DISCORD_WEBHOOK_URL must be in the fallback chain
# or the automated `apply(alertmanager, mon)` pre-flight sees an empty webhook
# and aborts. MON_DISCORD_WEBHOOK_URL is the optional mon-specific override
# (e.g. from secrets.local.sh for a manual apply). Mirrors icinga2's default.
#   export MON_DISCORD_WEBHOOK_URL='https://discord.com/api/webhooks/...'  # optional override
mon_discord_webhook_url: "{{ lookup('ansible.builtin.env', 'MON_DISCORD_WEBHOOK_URL') | default(lookup('ansible.builtin.env', 'DISCORD_WEBHOOK_URL'), true) | default('') }}"

firewall_extra_rules:
  # Grafana via Caddy.
  - { proto: tcp, dport: 3000, src: "{{ peers.proxy.ipv6 }}", comment: "Grafana from proxy" }

  # Self-scrape (mon scrapes its own node_exporter).
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter self-scrape" }

  # NOC automation queries Prometheus and Icinga's REST API directly.
  - { proto: tcp, dport: 9090, src: "{{ peers.noc.ipv6 }}", comment: "Prometheus API from noc-agent" }
  - { proto: tcp, dport: 5665, src: "{{ peers.noc.ipv6 }}", comment: "Icinga2 API from noc-agent" }

  # Engineering Loop submits its own passive run-status check to Icinga.
  - { proto: tcp, dport: 5665, src: "{{ peers.loop.ipv6 }}", comment: "Icinga2 passive check from engineering-loop" }

  # Blackbox is localhost-only (Prometheus runs on the same box). Loopback is
  # already accepted by the base firewall rules.

# Let the read-only diagnostic MCP (SSHes in as svag) traverse/read
# /etc/icinga2/conf.d (0750 root:nagios) to correlate alerts with check
# definitions. View-only group membership; the config structure isn't secret.
# See issue #49 + roles/noc_mcp_key.
noc_mcp_reader_groups:
  - nagios

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: mon
