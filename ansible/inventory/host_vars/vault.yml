---
# vault — AS215932 machine secret plane.

firewall_extra_rules:
  - { proto: tcp, dport: 8200, src: "{{ peers.proxy.ipv6 }}", comment: "Vault API from Caddy proxy" }
  - { proto: tcp, dport: 8200, src: ["{{ peers.noc.ipv6 }}", "{{ peers.mon.ipv6 }}", "{{ peers.api.ipv6 }}", "{{ peers.web.ipv6 }}", "{{ peers.ci.ipv6 }}"], comment: "Vault API from internal agents/checks" }
  - { proto: tcp, dport: 8200, src: "{{ vpn_clients_subnet }}", comment: "Vault API from VPN operators" }
  - { proto: tcp, dport: 8200, src: "{{ ops_prefix_v6 }}", comment: "Vault API from ops prefix" }
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }

monitoring_register: true
monitoring_role: vault
monitoring_extra_services:
  - name: vault-health
    check_command: http
    interval: 1m
    retry: 30s
    notes: "Vault seal/standby health endpoint via internal API"
    vars:
      http_address: "{{ peers.vault.ipv6 }}"
      http_port: 8200
      http_uri: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
      http_ipv6: true
      http_timeout: 10
      http_expect_body_regex: '"sealed":false|"initialized":false'

logs_register: true
logs_role: vault
