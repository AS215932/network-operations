---
# rtr — Debian 13 + FRRouting + nftables, dom0-hosted VM at OVH FR.
# Bridges: enX0 (mgmt), enX2 (infra), enX3 (vm/customer), enX4 (wan/underlay).
# Carries IPv4 NAT/DNAT for legacy v4 service ingress + customer VM isolation.

# --- networkd_resolved role override: drop-in goes on the overlay infra interface,
#     not the mgmt link-local one (enX0 has no DNS to advertise).
networkd_primary_unit: "10-enX2"

# --- FRR role override ---
# rtr runs BGP in the overlay VRF, so the frr role's post-reload soft clear must
# target it. The role default (`clear bgp ipv6 unicast * soft`) hits the empty
# default VRF and is a no-op here. See network-operations#150. (rtr's iBGP peers
# carry no inbound route-maps today, so this only matters once rtr gains inbound
# policy — e.g. future peering — but keep it correct.)
frr_clear_bgp_cmd: "vtysh -c 'clear bgp vrf overlay ipv6 unicast * soft'"

# --- IPv4 variables for the preserved nat/forward block ---
rtr_wan_ip:   "46.105.40.223"
rtr_wan_if:   "enX4"
rtr_dns_v4:   "10.0.2.10"
rtr_proxy_v4: "10.0.2.40"
rtr_vpn_v4:   "10.0.2.60"

# --- Input chain posture ---
# Enforced default-deny. Customer forwarding isolation is enforced separately in
# the rtr nftables forward chains.
firewall_input_policy: drop
firewall_log_only: false

firewall_extra_rules:
  # DNS recursion — overlay VMs and customer VMs use rtr's Unbound resolver.
  # peers.rtr.underlay is rtr's OWN queries: Unbound is `ip vrf exec overlay`-
  # confined (it must, to bind the overlay client addr + forward over the
  # overlay transit), so it can't bind a default-VRF loopback. rtr's own
  # default-VRF processes (apt, curl, unbound-anchor) therefore query the
  # overlay Unbound with rtr's underlay source — allow it so rtr can resolve.
  # See issue #135. (Goes away with the OpenBSD/rdomain migration, #14.)
  - { proto: tcp+udp, dport: 53, src: ["{{ infra_subnet }}", "{{ customer_subnet }}", "{{ vpn_clients_subnet }}", "{{ peers.rtr.underlay }}"], comment: "DNS recursion from overlay + rtr's own (underlay src, VRF)" }

  # Monitoring scrapes from mon.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }
  - { proto: tcp, dport: 9342, src: "{{ peers.mon.ipv6 }}", comment: "frr_exporter scrape" }

  # iBGP from cr1-nl1, cr1-de1, cr1-ch1 loopbacks (sourced from their loopback addresses).
  - { proto: tcp, dport: 179, src: ["{{ peers.cr1_nl1.loopback }}", "{{ peers.cr1_de1.loopback }}", "{{ peers.cr1_ch1.loopback }}"], comment: "iBGP from cr1-* loopbacks" }

  # WireGuard underlay listeners (v6 endpoints — physical underlay addresses).
  - { proto: udp, dport: 1337, src: "{{ peers.cr1_nl1.underlay }}", comment: "WG to cr1-nl1" }
  - { proto: udp, dport: 1338, src: "{{ peers.cr1_de1.underlay }}", comment: "WG to cr1-de1" }
  - { proto: udp, dport: 1339, src: "{{ peers.cr1_ch1.underlay }}", comment: "WG to cr1-ch1" }

# OSPF6 runs on wg0/wg1/wg2 between router loopbacks and is multicast. Allow per-iface.
firewall_extra_raw_nft: |
  # OSPF6 (proto 89) on WireGuard/overlay interfaces — iBGP/OSPF mesh transit.
  # Linux VRF input can expose OSPF packets as arriving on the VRF master
  # (`overlay`) rather than the WG slave, so allow both forms.
  iifname { overlay, wg0, wg1, wg2 } meta l4proto 89 accept comment "OSPF6 on overlay/wg mesh"
  # iBGP also accepted on wg ifaces with no source restriction (already covered above
  # via loopback src match, but this is a defense-in-depth allow for the wg link).

# --- Monitoring --- (issue #21: migrate from legacy configs/mon/icinga2/hosts/routers.conf
# rtr.ovh1 entry to the standard monitoring_register flow. The Host object is now
# named "rtr" — service files keying on host.name updated accordingly.)
monitoring_register: true
monitoring_role: router
monitoring_display_name: "rtr (OVH FR)"
monitoring_check_vars:
  has_frr: true
  underlay_address6: "{{ peers.rtr.underlay }}"
  prom_instance_frr: "[{{ peers.rtr.ipv6 }}]:9342"
  site: "ovh1"

# Per-host by_ssh check scripts (issue #20). Deployed to
# /usr/local/lib/nagios/plugins/ — mon's icinga2 by_ssh services reference them
# at that absolute path. See configs/mon/icinga2/services/rtr-checks.conf.
monitoring_check_scripts:
  - check_jool_success_delta.sh

# mon's icinga2 by_ssh pubkey, authorized for the dedicated `monitoring`
# user by the monitoring role. Privileged checks run through the scoped
# sudoers drop for /usr/local/lib/nagios/plugins/*.
# Set MONITORING_BY_SSH_PUBKEY in secrets.local.sh until the icinga2 role
# lands a Vault-rendered pubkey distribution path.
monitoring_by_ssh_pubkey: "{{ lookup('env', 'MONITORING_BY_SSH_PUBKEY') | default('', true) }}"
monitoring_remove_legacy_root_by_ssh_key: true

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: router
logs_agent_disk_buffer_bytes: 300000000   # ~286 MB — router log volume is low (Vector requires ≥ 256 MiB + 32 B)
