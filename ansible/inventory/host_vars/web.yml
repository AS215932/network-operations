---
# web — hyrule-web (uvicorn :8080 hyrule.host) + nginx (:8081 as215932.net).

hyrule_web_version: 043eb9606b17fe82a3ae69194ab0bfbcdc70baa9

firewall_extra_rules:
  - { proto: tcp, dport: 8080, src: ["{{ peers.proxy.ipv6 }}", "{{ peers.mon.ipv6 }}"], comment: "hyrule-web upstream from proxy/mon" }
  - { proto: tcp, dport: 8081, src: ["{{ peers.proxy.ipv6 }}", "{{ peers.mon.ipv6 }}"], comment: "as215932.net upstream from proxy/mon" }
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: web

# --- Structured flow metadata (read by scripts/render-network-flows.py) ---
host_meta:
  os: "Debian 13"
  role: "nginx + uvicorn (:8080, :8081)"
  summary: "Serves the hyrule.host landing page (uvicorn :8080) and the as215932.net info site (nginx :8081)."
network_flows_outbound:
  - { to: api, proto: tcp, port: 8402, purpose: "hyrule-cloud API backend" }
