---
# noc — autonomous NOC agent + hyrule-mcp tool server.
#
# noc-agent (FastAPI on :8000) receives webhooks from Alertmanager and Icinga2
# on mon, runs an LLM-driven investigation against hyrule-mcp tools, and
# notifies a Discord channel. hyrule-mcp is a stdio child of noc-agent.

noc_agent_version: eb709a88236d29aec439927bbba63413ead9aa67
hyrule_mcp_version: 78b97ee626d665160b9bd3c3741589392655a00e

# XO MCP occasionally takes >5s to answer tools/list via supergateway during
# streamable-HTTP session churn. Keep Icinga + app health probes below their
# 15s HTTP wrapper timeout while avoiding false 5s flaps.
noc_agent_mcp_health_timeout_seconds: 12

firewall_extra_rules:
  # Webhooks from Alertmanager + Icinga2 on mon.
  - { proto: tcp, dport: 8000, src: "{{ peers.mon.ipv6 }}", comment: "noc-agent webhook from mon (Alertmanager + Icinga)" }

  # Monitoring scrapes.
  - { proto: tcp, dport: 9100, src: "{{ peers.mon.ipv6 }}", comment: "node_exporter scrape" }

# Monitoring — register on mon (new host, not in legacy infra-vms.conf).
monitoring_register: true
monitoring_role: noc
monitoring_extra_services:
  - name: noc-agent-health
    check_command: http
    interval: 1m
    retry: 30s
    notes: "FastAPI liveness for noc-agent"
    vars:
      http_address: "{{ peers.noc.ipv6 }}"
      http_port: 8000
      http_uri: "/health"
      http_ipv6: true
      http_timeout: 10
      http_expect_body_regex: '"status":"ok"'

  - name: noc-agent-mcp-health
    # Custom check: surfaces /health/mcp's per-source JSON state instead of
    # the generic check_http "503 + pattern not found" output.
    # CheckCommand defined in configs/mon/icinga2/services/noc-agent-mcp-health.conf.
    check_command: noc_agent_mcp_health
    interval: 1m
    retry: 30s
    notes: "MCP subprocess connectivity for Prometheus/SSH and Xen Orchestra tools"
    vars:
      noc_mcp_host: "{{ peers.noc.ipv6 }}"
      noc_mcp_port: 8000

  - name: noc-agent-config-health
    check_command: http
    interval: 2m
    retry: 30s
    notes: "Required noc-agent runtime configuration and secret presence"
    vars:
      http_address: "{{ peers.noc.ipv6 }}"
      http_port: 8000
      http_uri: "/health/config"
      http_ipv6: true
      http_timeout: 10
      http_expect_body_regex: '"status":"ok"'

  - name: noc-agent-mail-health
    # Custom check: surfaces /health/mail's JSON body (IMAP reason / error) in
    # the alert instead of just the HTTP code.
    # CheckCommand defined in configs/mon/icinga2/services/noc-agent-mail-health.conf.
    check_command: noc_agent_mail_health
    interval: 2m
    retry: 30s
    notes: "NOC mailbox IMAP login/select used by mail polling"
    vars:
      noc_mail_host: "{{ peers.noc.ipv6 }}"
      noc_mail_port: 8000

  - name: noc-agent-model-health
    # Custom check: surfaces /health/model's JSON body in the alert.
    # CheckCommand defined in configs/mon/icinga2/services/noc-agent-model-health.conf.
    check_command: noc_agent_model_health
    interval: 2m
    retry: 30s
    notes: "Configured AI model and fallback access for noc-agent"
    vars:
      noc_model_host: "{{ peers.noc.ipv6 }}"
      noc_model_port: 8000

# --- Logs --- (ships journald to log VM via Vector)
logs_register: true
logs_role: noc
