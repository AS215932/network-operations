all:
  children:
    linux:
      hosts:
        rtr:
          ansible_host: 2a0c:b641:b50:2::1
          ansible_user: root
        dns:
          ansible_host: 2a0c:b641:b50:2::10
        api:
          ansible_host: 2a0c:b641:b50:2::20
        web:
          ansible_host: 2a0c:b641:b50:2::30
        proxy:
          ansible_host: 2a0c:b641:b50:2::40
        mon:
          ansible_host: 2a0c:b641:b50:2::50
        vpn:
          ansible_host: 2a0c:b641:b50:2::60
        xoa:
          ansible_host: 2a0c:b641:b50:2::70
          ansible_user: root
        irc:
          ansible_host: 2a0c:b641:b50:2::80
        noc:
          ansible_host: 2a0c:b641:b50:2::a0
        log:
          ansible_host: 2a0c:b641:b50:2::b0
        vault:
          ansible_host: 2a0c:b641:b50:2::c0
        ci:
          ansible_host: 2a0c:b641:b50:2::d0
        netproxy:
          ansible_host: 2a0c:b641:b50:2::e0
        loop:
          ansible_host: 2a0c:b641:b50:2::f0
        # ci-pr — unprivileged PR runner on the CUSTOMER-isolated segment
        # (2a0c:b641:b51::/48, enX3). In `linux` for firewall+monitoring only.
        ci-pr:
          ansible_host: 2a0c:b641:b51::c1
        ns2:
          ansible_host: 2001:41d0:304:300::7bfb
          ansible_user: debian

    # External monitoring host — deliberately outside `linux` so it does NOT
    # pick up the AS215932 monitoring/logs/networkd roles (it runs its own
    # local Prometheus stack via the `extmon` role). The host-level firewall
    # IS managed by roles/firewall (playbook targets all:!dom0, rules in
    # host_vars/extmon.yml).
    external:
      hosts:
        extmon:
          # Native v6, not the Vultr v4: the ci runner (drift-detection,
          # apply.yml) is an IPv6-only overlay VM and cannot reach a literal
          # IPv4 ansible_host.
          ansible_host: 2001:19f0:7402:0cd5:5400:06ff:fe40:7112
          ansible_user: root             # Vultr Debian image; svag is provisioned for personal SSH

    openbsd:
      hosts:
        mail:
          ansible_host: 2a0c:b641:b50:2::90

    freebsd:
      hosts:
        cr1-nl1:
          ansible_host: 2a0c:b641:b50::a
        cr1-de1:
          ansible_host: 2a0c:b641:b50::b
        cr1-ch1:
          ansible_host: 2a0c:b641:b50::c

    routers:
      hosts:
        rtr:
        cr1-nl1:
        cr1-de1:
        cr1-ch1:

    xcpng:
      hosts:
        dom0:
          ansible_host: 193.70.32.138
          ansible_user: root

    infra_vms:
      hosts:
        dns:
        api:
        web:
        proxy:
        mon:
        vpn:
        xoa:
        irc:
        mail:
        noc:
        log:
