---
# Monitoring rollout — installs node_exporter on the host and registers
# its Icinga2 Host object on mon.
#
# Single source of truth for "which checks run for which host" is
# host_vars/<host>.yml — `monitoring_disks` + `monitoring_extra_services`.
#
# Apply: source ../secrets.local.sh first.
#   ansible-playbook playbooks/monitoring.yml --tags apply -e '{"monitoring_apply":true}'

- name: Monitoring — apply
  # Include FreeBSD so the cr1.* core routers pick up the monitoring role
  # (node_exporter via pkg, dedicated `monitoring` by_ssh user from #69).
  # `linux:openbsd` alone silently no-ops on cr1.* (hosts: pattern doesn't
  # match → "skipping: no hosts matched"), which masked the missing user.
  hosts: linux:openbsd:freebsd
  serial: 1
  gather_facts: false
  become: true
  pre_tasks:
    - name: Pre-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: pre
      run_once: true
      tags: [snapshot, always]
  roles:
    - monitoring
  post_tasks:
    - name: Post-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: post
      run_once: true
      tags: [snapshot, always]
  tags: [monitoring]
