---
# prometheus — manage mon-side Prometheus configuration plus alerting/recording
# rules under /etc/prometheus/ (sourced from configs/mon/).
# Replaces the manual "cp the rule file onto mon + reload" step; rule changes
# now deploy through app-promotion-deploy → apply.yml like any other host.
#
# Alertmanager's own service/configuration remains tracked separately; this
# role manages the Prometheus route to it as part of prometheus.yml.
#
# Render-only (dry run):
#   ansible-playbook playbooks/prometheus.yml --tags validate \
#       --connection=local --limit mon
# Apply (live):
#   ansible-playbook playbooks/prometheus.yml --tags apply \
#       -e '{"prometheus_apply":true}' --limit mon

- name: prometheus — validate + apply mon configuration and rules
  hosts: mon
  gather_facts: true
  become: true
  roles:
    - prometheus
  tags: [prometheus]
