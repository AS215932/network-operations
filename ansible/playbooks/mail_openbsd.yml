---
# OpenBSD mail server rollout.
#
# Validate/render:
#   ansible-playbook playbooks/mail_openbsd.yml --tags validate --connection=local
#
# Apply after DNS/PTR/secrets are ready:
#   set -a; source ../secrets.local.sh; set +a
#   ansible-playbook playbooks/mail_openbsd.yml --tags apply -e '{"mail_apply":true}'

- name: OpenBSD mail server
  hosts: mail
  gather_facts: false
  become: true
  roles:
    - mail_openbsd
  tags: [mail]
