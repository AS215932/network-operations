---
# ci rollout — installs the self-hosted GitHub Actions runner on the ci VM.
#
# Prerequisites:
#   - ci VM provisioned and reachable at peers.ci.ipv6.
#   - First-time runner registration token (1 h TTL):
#       export GH_RUNNER_TOKEN=$(gh api -X POST \
#         /repos/AS215932/network-operations/actions/runners/registration-token \
#         --jq .token)
#     Once registered, .runner / .credentials persist in the install dir.
#
# Apply:
#   set -a; source ../secrets.local.sh; set +a
#   ansible-playbook playbooks/ci.yml --tags apply \
#     -e github_runner_apply=true \
#     -e github_runner_registration_token="$GH_RUNNER_TOKEN" \
#     --limit ci

- name: ci — apply self-hosted runner
  hosts: ci
  serial: 1
  gather_facts: true
  become: true
  roles:
    - github_runner
  tags: [ci]
