---
# noc rollout — installs hyrule-mcp + noc-agent on the noc VM.
#
# hyrule_mcp runs FIRST: creates the noc-agent user, lays down /opt/hyrule-mcp,
# /etc/hyrule-mcp/hosts.yml, /etc/hyrule-mcp/.env, and /var/lib/hyrule-mcp/.ssh/id_noc_mcp.
# noc_agent runs SECOND: clones noc-agent, renders /opt/noc-agent/.env,
# installs the systemd unit, and starts the service.
#
# Prerequisites:
#   - noc VM provisioned and reachable at peers.noc.ipv6.
#   - secrets.local.sh sourced (NOC_MCP_KEY_PATH, NOC_DISCORD_WEBHOOK,
#     GEMINI_API_KEY, ICINGA_API_USER, ICINGA_API_PASSWORD, XO_TOKEN).
#   - For Vault-backed production secrets, set:
#       NOC_AGENT_SECRET_BACKEND=vault
#       VAULT_NOC_AGENT_ROLE_ID=...
#       VAULT_NOC_AGENT_SECRET_ID=...
#   - playbooks/noc-mcp-key.yml has been run so id_noc_mcp.pub is in
#     authorized_keys on every infra host.
#
# Apply:
#   set -a; source ../secrets.local.sh; set +a
#   ansible-playbook playbooks/noc.yml --tags apply -e '{"noc_apply":true}' --limit noc

- name: noc — pre-deploy snapshot
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Pre-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: pre
  tags: [snapshot, always]

- name: noc — apply hyrule-mcp + noc-agent
  hosts: noc
  serial: 1
  gather_facts: true
  become: true
  vars:
    gemini_api_key: "{{ lookup('env', 'GEMINI_API_KEY') }}"
    noc_discord_webhook: "{{ lookup('env', 'NOC_DISCORD_WEBHOOK') }}"
    icinga_api_user: "{{ lookup('env', 'ICINGA_API_USER') }}"
    icinga_api_password: "{{ lookup('env', 'ICINGA_API_PASSWORD') }}"
    xo_token: "{{ lookup('env', 'XO_TOKEN') }}"
    noc_mail_password: "{{ lookup('env', 'MAIL_NOC_PASSWORD') }}"
    noc_mcp_key_path: "{{ lookup('env', 'NOC_MCP_KEY_PATH') }}"
    gemini_quota_project_id: "{{ lookup('env', 'GEMINI_QUOTA_PROJECT_ID') | default('project-73d4ac43-0c8a-4ec0-ac5', true) }}"
    noc_agent_secret_backend: "{{ lookup('env', 'NOC_AGENT_SECRET_BACKEND') | default('env', true) }}"
    noc_agent_google_wif_enabled: "{{ noc_agent_secret_backend == 'vault' }}"
  roles:
    - hyrule_mcp
    - noc_agent
    - role: vault_agent
      vars:
        vault_agent_name: noc-agent
        vault_agent_vault_addr: "https://vault.as215932.net"
        vault_agent_role_id: "{{ lookup('env', 'VAULT_NOC_AGENT_ROLE_ID') | default('', true) }}"
        vault_agent_secret_id: "{{ lookup('env', 'VAULT_NOC_AGENT_SECRET_ID') | default('', true) }}"
        vault_agent_env_destination: /opt/noc-agent/.env
        vault_agent_google_subject_token_destination: "{{ noc_agent_google_subject_token_path }}"
        vault_agent_reload_command: /bin/systemctl restart noc-agent.service
      when: noc_agent_secret_backend == 'vault'
  tags: [noc]

- name: noc — post-deploy snapshot
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Post-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: post
  tags: [snapshot, always]
