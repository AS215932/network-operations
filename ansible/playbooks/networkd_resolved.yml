---
- name: networkd_resolved — apply search domain + DNS drop-in
  hosts: linux
  serial: 1
  gather_facts: true
  become: true
  pre_tasks:
    - name: Pre-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: pre
      run_once: true
      tags: [snapshot, always]
  roles:
    - networkd_resolved
  post_tasks:
    - name: Post-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: post
      run_once: true
      tags: [snapshot, always]
  tags: [networkd_resolved]
