---
# SOC Agent (security governance loop) rollout. The agent is read-only by
# construction and climbs the SOC_MODE ladder (shadow -> case_only ->
# handoff_dry -> handoff_live) one reviewed promotion PR at a time; see
# docs/runbooks/soc-mode-promotion.md for the insight-metrics criteria that
# gate each rung.
#
# No inventory host carries the `soc` group yet — add the target VM (and its
# host_vars, peers entry, network-flows rows, monitoring registration, plus
# the vault_agent play wiring for soc-agent.env.ctmpl.j2) in the same PR that
# first schedules this playbook. soc_agent_version must be an exact reviewed
# SHA before the first apply (validate enforces this).
#
# Validate (no live changes; runs from controller):
#   ansible-playbook playbooks/soc.yml --tags validate \
#     --connection=local --limit soc
#
# Apply (live deploy; timers/services stay disabled unless host vars enable them):
#   ansible-playbook playbooks/soc.yml --tags apply -e soc_agent_apply=true --limit soc

- name: Deploy SOC Agent
  hosts: soc
  become: true
  roles:
    - role: soc_agent
