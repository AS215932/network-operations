---
# Dedicated SOC Agent rollout. Infrastructure and runtime ship dark; promotion
# follows docs/runbooks/agentic-coordination-shadow-cutover.md.

- name: Deploy dedicated SOC Agent security-governance VM
  hosts: soc
  serial: 1
  gather_facts: true
  become: true
  pre_tasks:
    - name: Ensure SOC service group exists before Vault Agent
      ansible.builtin.group:
        name: "{{ soc_agent_group }}"
        state: present
        system: true
      tags: [apply, vault_agent, soc_agent]
  roles:
    - role: firewall
      vars:
        firewall_apply: "{{ soc_agent_apply | default(false) }}"
      tags: [firewall]
    - role: monitoring
      vars:
        monitoring_apply: "{{ soc_agent_apply | default(false) }}"
      tags: [monitoring]
    - role: logs
      vars:
        logs_apply: "{{ soc_agent_apply | default(false) }}"
      tags: [logs]
    - role: vault_agent
      vars:
        vault_agent_name: soc-agent
        vault_agent_role_id: "{{ lookup('env', 'VAULT_SOC_AGENT_ROLE_ID') | default('', true) }}"
        vault_agent_secret_id: >-
          {{
            lookup('env', 'VAULT_SOC_AGENT_WRAPPED_SECRET_ID') |
            default(lookup('env', 'VAULT_SOC_AGENT_SECRET_ID'), true)
          }}
        vault_agent_secret_id_response_wrapping_path: >-
          {{
            'auth/approle/role/soc-agent/secret-id'
            if (lookup('env', 'VAULT_SOC_AGENT_WRAPPED_SECRET_ID') | default('', true)) | length > 0
            else ''
          }}
        vault_agent_env_destination: "{{ soc_agent_secrets_env_file }}"
        vault_agent_reload_command: >-
          for unit in soc-agent.service soc-posture.timer soc-handoffs.timer soc-probes.timer; do
            if /bin/systemctl cat "$unit" >/dev/null 2>&1; then
              /bin/systemctl try-restart "$unit" || exit 1;
            fi;
          done
        vault_agent_env_reload_command: "{{ vault_agent_reload_command }}"
        vault_agent_templates:
          - src: soc-agent.env.ctmpl.j2
            name: soc-agent.env.ctmpl
            destination: "{{ soc_agent_secrets_env_file }}"
            group: "{{ soc_agent_group }}"
            mode: "0640"
            reload_command: "{{ vault_agent_reload_command }}"
        vault_agent_extra_dirs:
          - path: "{{ soc_agent_install_dir }}"
            group: "{{ soc_agent_group }}"
            mode: "0750"
          - path: "{{ soc_agent_config_dir }}"
            group: "{{ soc_agent_group }}"
            mode: "0750"
      tags: [vault_agent, soc_agent]
    - role: soc_agent
      tags: [soc_agent]
  tags: [soc]
