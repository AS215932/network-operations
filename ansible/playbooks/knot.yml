---
- name: Knot DNS — apply
  hosts: nameservers
  # Primary first, then secondary — so when ns2 starts, ns1 already serves
  # the new SOA and AXFR succeeds on the very first NOTIFY.
  serial: 1
  gather_facts: false
  become: true
  pre_tasks:
    - name: Pre-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: pre
      run_once: true
      tags: [snapshot, always]
  roles:
    - knot
  post_tasks:
    - name: Post-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: post
      run_once: true
      tags: [snapshot, always]
  tags: [knot]
