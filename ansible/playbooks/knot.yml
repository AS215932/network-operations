---
- name: Knot DNS — pre-deploy snapshot
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Pre-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: pre
  tags: [snapshot, always]

- name: Knot DNS — apply
  hosts: nameservers
  # Primary first, then secondary — so when ns2 starts, ns1 already serves
  # the new SOA and AXFR succeeds on the very first NOTIFY.
  serial: 1
  gather_facts: false
  become: true
  roles:
    - knot
  tags: [knot]

- name: Knot DNS — post-deploy snapshot
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Post-deploy Icinga snapshot
      include_role:
        name: firewall
        tasks_from: snapshot
      vars:
        snapshot_phase: post
  tags: [snapshot, always]
