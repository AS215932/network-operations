---
# hyrule-prober — internal probe sidecar on noc (AS215932 looking-glass).
#
# Validate (no live changes):
#   ansible-playbook playbooks/prober.yml --tags validate \
#     --connection=local --limit noc
#
# Apply (live deploy):
#   ansible-playbook playbooks/prober.yml --tags apply \
#     -e hyrule_prober_apply=true \
#     --limit noc
#
# Production deploys pin hyrule_prober_version from host_vars/noc.yml.

- name: hyrule-prober — apply
  hosts: noc
  serial: 1
  gather_facts: false
  become: true
  roles:
    - role: hyrule_prober
      tags: [hyrule_prober]
  tags: [hyrule_prober]
