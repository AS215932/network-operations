# Public interfaces
ext_if="vtnet0"
transit2_if="vtnet1"
ixp_dus="vtnet2"
ixp_fra="vtnet3"
ext_ifs="{ vtnet0 vtnet1 vtnet2 vtnet3 }"

# Our networks
table <AS215932> const { 2a0c:b641:b50::/44 }

# Bogons
table <bogons4> persist file "/etc/pf.bogons4"
table <bogons6> persist file "/etc/pf.bogons6"

## Skip loopback
set skip on lo

## Logging interface
set loginterface $ext_if

# Scrub
match all scrub(random-id max-mss 1360)

## Default block
block return in log all
block return out log all

# Drop bogons
block drop in quick log on $ext_if inet from <bogons4>
block drop out quick log on $ext_if inet to <bogons4>
block drop in quick log on $ext_if inet6 from <bogons6>
block drop out quick log on $ext_if inet6 to <bogons6>

# Pass all traffic on WG - no state (asymmetric routing)
pass quick on wg all no state

# Transit traffic to/from our AS - no state (asymmetric routing)
pass in quick on $ext_ifs inet6 from any to <AS215932> no state
pass out quick on $ext_ifs inet6 from <AS215932> to any no state

# Wireguard
pass in quick on $ext_ifs inet proto udp from any to any port { 1337, 1338 } keep state
pass in quick on $ext_ifs inet6 proto udp from any to any port { 1337, 1338 } keep state

# BGP
pass in quick on $ext_ifs inet6 proto tcp from { 2a0c:b640:10::ffff, 2a0c:b641:870::ffff } to any port = bgp flags S/SA keep state

# SSH
pass in quick on $ext_if inet proto tcp from 77.166.211.126 to any port = ssh flags S/SA keep state
pass in quick on $ext_if inet6 proto tcp from 2a02:a442:1016::/48 to any port = ssh flags S/SA keep state

# Allow ping
pass in quick inet proto icmp keep state
pass in quick inet6 proto ipv6-icmp keep state

# Allow any out
pass out quick on $ext_ifs inet proto { tcp, udp, icmp } from any to any keep state
pass out quick on $ext_ifs inet6 proto { tcp, udp, ipv6-icmp } from any to any keep state
