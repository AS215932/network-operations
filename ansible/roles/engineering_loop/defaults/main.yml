---
# Dedicated Engineering Loop operations-lane deployment.
# Default is validate/render only; live mutation requires
# -e engineering_loop_apply=true from apply.yml.

engineering_loop_apply: false

engineering_loop_user: loop
engineering_loop_group: loop

engineering_loop_install_dir: /opt/engineering-loop
engineering_loop_config_dir: /etc/engineering-loop
engineering_loop_env_file: "{{ engineering_loop_install_dir }}/.env"
engineering_loop_state_dir: /var/lib/engineering-loop
engineering_loop_workspace_dir: "{{ engineering_loop_state_dir }}/workspace"
engineering_loop_runs_dir: "{{ engineering_loop_state_dir }}/runs"
engineering_loop_daemon_state_dir: "{{ engineering_loop_state_dir }}/state"
engineering_loop_lib_dir: /usr/local/lib/engineering-loop
engineering_loop_git_askpass_path: "{{ engineering_loop_lib_dir }}/git-askpass"
engineering_loop_github_app_token_path: "{{ engineering_loop_lib_dir }}/github-app-token"
engineering_loop_daemon_wrapper_path: "{{ engineering_loop_lib_dir }}/run-daemon"
engineering_loop_github_app_private_key_file: "{{ engineering_loop_config_dir }}/github-app.private-key.pem"
engineering_loop_icinga_ca_src: "{{ playbook_dir }}/../../configs/mon/icinga2/icinga-ca.crt"
engineering_loop_icinga_ca_dest: /usr/local/share/ca-certificates/as215932-icinga-ca.crt

engineering_loop_repo: https://github.com/AS215932/engineering-loop.git
engineering_loop_version: "a8c6d3f12d2c36532ed0745728750adf4ac29396"

# GitHub issue/PR intake scope for first production rollout.
engineering_loop_repos:
  - AS215932/engineering-loop
  - AS215932/network-operations
  - AS215932/hyrule-cloud
  - AS215932/hyrule-web
  - AS215932/hyrule-mcp
  - AS215932/noc-agent
  - AS215932/hyrule-network-proxy
  - AS215932/as215932.net

# Local workspace checkout names. network-operations intentionally lands at
# hyrule-infra to match the existing sibling checkout convention used by the
# loop and app repos; noc-agent lands at hyrule-noc-agent for the same reason.
# The AS/routing identity repo keeps its canonical dotted checkout name.
engineering_loop_workspace_repositories:
  - repo: https://github.com/AS215932/engineering-loop.git
    dest: engineering-loop
    version: main
  - repo: https://github.com/AS215932/network-operations.git
    dest: hyrule-infra
    version: main
  - repo: https://github.com/AS215932/hyrule-cloud.git
    dest: hyrule-cloud
    version: main
  - repo: https://github.com/AS215932/hyrule-web.git
    dest: hyrule-web
    version: main
  - repo: https://github.com/AS215932/hyrule-mcp.git
    dest: hyrule-mcp
    version: main
  - repo: https://github.com/AS215932/noc-agent.git
    dest: hyrule-noc-agent
    version: main
  - repo: https://github.com/AS215932/hyrule-network-proxy.git
    dest: hyrule-network-proxy
    version: main
  - repo: https://github.com/AS215932/as215932.net.git
    dest: as215932.net
    version: main

# Per-repo write-path widening for the daemon (--allow REPO=PATH_PREFIX).
# Keyed by the loop's sibling checkout name (e.g. hyrule-cloud; network-operations
# maps to hyrule-infra). Empty by default: the daemon stays docs-only for any
# repo not listed here. Widen per repo in host_vars when dogfooding code.
engineering_loop_allowed_paths: {}
engineering_loop_max_runs_per_day: 2
engineering_loop_max_cost_usd_per_day: 10
engineering_loop_timer_enabled: false
engineering_loop_memory_dir: "{{ engineering_loop_state_dir }}/memory"
engineering_loop_legacy_memory_dir: "{{ engineering_loop_workspace_dir }}/hyrule-infra/memory"
engineering_loop_knowledge_context_enabled: true
engineering_loop_knowledge_mcp_url: http://127.0.0.1:8767/mcp
engineering_loop_knowledge_mcp_transport: streamable-http
engineering_loop_knowledge_context_budget: 6000
engineering_loop_knowledge_context_timeout: 20
engineering_loop_knowledge_learning_dir: ""
engineering_loop_noc_lhp_base_url: ""
engineering_loop_lhp_callback_enabled: false

# agent-core observability emission (additive; default off). When enabled, each loop
# cycle also writes agent-core TraceEvent/CostUsage JSON lines to the sink path
# (must sit under a service ReadWritePaths entry, i.e. the state dir).
engineering_loop_agent_core_trace_enabled: false
engineering_loop_agent_core_trace_path: "{{ engineering_loop_state_dir }}/agent-core-trace.jsonl"
engineering_loop_agent_core_trace_collector_url: ""

engineering_loop_git_user_name: "hyrule-engineering-loop[bot]"
engineering_loop_git_user_email: "engineering-loop@as215932.net"

engineering_loop_packages:
  - python3
  - python3-venv
  - git
  - ca-certificates
  - curl
  - gh
  - openssl
