---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart engineering-loop timer
  ansible.builtin.systemd:
    name: hyrule-engineering-loop.timer
    state: "{{ 'restarted' if engineering_loop_timer_enabled | bool else 'stopped' }}"
    enabled: "{{ engineering_loop_timer_enabled | bool }}"
    daemon_reload: true

- name: restart reliability-governor timer
  ansible.builtin.systemd:
    name: hyrule-reliability-governor.timer
    state: "{{ 'restarted' if engineering_loop_governor_timer_enabled | bool else 'stopped' }}"
    enabled: "{{ engineering_loop_governor_timer_enabled | bool }}"
    daemon_reload: true
