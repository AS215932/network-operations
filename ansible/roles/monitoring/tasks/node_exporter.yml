---
- name: Install node_exporter (Debian)
  apt:
    name: "{{ monitoring_pkg }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: [apply]

- name: Configure node_exporter listen address (Debian)
  lineinfile:
    path: "{{ monitoring_node_env_path }}"
    create: true
    regexp: '^ARGS='
    # --collector.systemd.enable-restarts-metrics exposes
    # node_systemd_service_restart_total{name="<unit>"} so a crash/restart loop
    # is visible to Prometheus/Icinga. Without it a flapping unit that bounces
    # back to active=1 between samples is invisible (issue #92). On by default
    # fleet-wide (the blind spot is not github-runner-specific); it adds one
    # series per systemd unit, so set monitoring_node_restart_metrics: false in
    # host_vars on any high-cardinality node where that scrape cost matters.
    line: >-
      ARGS="--web.listen-address={{ monitoring_node_listen }} --collector.systemd{{
      ' --collector.systemd.enable-restarts-metrics' if monitoring_node_restart_metrics | bool else '' }}"
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == "Debian"
  notify: restart node_exporter
  tags: [apply]

- name: Install node_exporter (FreeBSD)
  community.general.pkgng:
    name: "{{ monitoring_pkg }}"
    state: present
  when: ansible_os_family == "FreeBSD"
  tags: [apply]

- name: Configure node_exporter rc settings and daemon logging (FreeBSD)
  copy:
    dest: "{{ monitoring_node_env_path }}"
    content: |
      node_exporter_enable="YES"
      node_exporter_user="nobody"
      node_exporter_group="nobody"
      node_exporter_listen_address="{{ monitoring_node_listen }}"
      node_exporter_args=""
      node_exporter_flags="-S -s info -l daemon"
    owner: root
    group: wheel
    mode: "0644"
  when: ansible_os_family == "FreeBSD"
  notify: restart node_exporter
  tags: [apply]

- name: Install node_exporter (OpenBSD)
  community.general.openbsd_pkg:
    name: "{{ monitoring_pkg }}"
    state: present
  when: ansible_os_family == "OpenBSD"
  tags: [apply]

- name: Configure node_exporter listen address (OpenBSD)
  lineinfile:
    path: "{{ monitoring_node_env_path }}"
    create: true
    regexp: '^node_exporter_flags='
    line: 'node_exporter_flags=--web.listen-address={{ monitoring_node_listen }}'
    owner: root
    group: wheel
    mode: "0644"
  when: ansible_os_family == "OpenBSD"
  notify: restart node_exporter
  tags: [apply]

- name: Enable node_exporter (OpenBSD)
  command: "rcctl enable {{ monitoring_node_service }}"
  changed_when: false
  when: ansible_os_family == "OpenBSD"
  tags: [apply]
