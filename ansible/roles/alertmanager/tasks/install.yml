---
# Install Alertmanager and publish a validated config. The rendered config is
# amtool-checked in a staging path BEFORE it replaces the live file, so a broken
# config can't be loaded on the next reload/restart. Tags inherited from the
# include in main.yml via `apply:`.

- name: Install prometheus-alertmanager
  ansible.builtin.apt:
    name: prometheus-alertmanager
    state: present
    update_cache: true
    cache_valid_time: 3600

# Alertmanager's built-in defaults bind the unauthenticated UI/API on
# --web.listen-address ":9093" (all interfaces) and HA gossip on
# --cluster.listen-address ":9094". The shipped config + prometheus.yml treat it
# as loopback-only (Prometheus alerts to 127.0.0.1:9093), so pin the web listener
# to loopback and disable single-node gossip — otherwise it is reachable on the
# routed host address whenever the mon firewall drifts. ARGS changes need a
# restart (a SIGHUP reload does not rebind the listener).
- name: Constrain Alertmanager to loopback (web + no cluster gossip)
  ansible.builtin.lineinfile:
    path: /etc/default/prometheus-alertmanager
    create: true
    regexp: "^ARGS="
    line: 'ARGS="--web.listen-address=127.0.0.1:9093 --cluster.listen-address="'
    owner: root
    group: root
    mode: "0644"
  notify: restart alertmanager

- name: Stage rendered alertmanager.yml
  ansible.builtin.template:
    src: "{{ alertmanager_config_template }}"
    dest: "{{ alertmanager_staging_path }}"
    owner: root
    group: prometheus
    mode: "0640"
  no_log: true  # keep future receiver credentials out of --diff output

- name: Validate staged config with amtool before publishing to live
  ansible.builtin.command:
    argv: [amtool, check-config, "{{ alertmanager_staging_path }}"]
  changed_when: false

- name: Publish validated alertmanager.yml to the live path
  ansible.builtin.copy:
    src: "{{ alertmanager_staging_path }}"
    dest: "{{ alertmanager_config_path }}"
    remote_src: true
    owner: root
    group: prometheus
    mode: "0640"
  no_log: true  # remote_src copy may surface future receiver credentials
  notify: reload alertmanager

- name: Enable + start alertmanager
  ansible.builtin.systemd:
    name: prometheus-alertmanager
    state: started
    enabled: true
