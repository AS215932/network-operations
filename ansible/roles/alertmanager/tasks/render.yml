---
# Render the review artifact to ansible/generated/mon/alertmanager.yml. The
# config contains no Discord secret: NOC Agent owns route-specific delivery.
# The committed artifact gives the render/idempotency check a stable file.
- name: Ensure generated dir exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../generated/mon"
    state: directory
    mode: "0755"
  delegate_to: localhost
  connection: local
  become: false
  run_once: true

- name: Render alertmanager.yml for review
  ansible.builtin.template:
    src: "{{ alertmanager_config_template }}"
    dest: "{{ playbook_dir }}/../generated/mon/alertmanager.yml"
    mode: "0640"
  delegate_to: localhost
  connection: local
  become: false
