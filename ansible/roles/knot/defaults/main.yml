---
# Defaults consumed by the knot role. Override per-host or per-group.

# "primary" loads zones from disk and notifies secondaries.
# "secondary" pulls AXFR from the primary; zones live in journal only.
knot_role: primary

# Per-host: list of zones to serve. Each entry is a dict { name: <zone> }.
# Both primary and secondary use the same list.
knot_zones: []

# Primary-only: list of secondaries to NOTIFY + transfer to.
# Each entry: { name: <id>, address_v4: <addr>, address_v6: <addr> }
knot_secondaries: []

# Secondary-only: address of the primary (NOTIFY source / AXFR target).
knot_primary_v4: ""
knot_primary_v6: ""

# TSIG key shared between primary and all secondaries. Name MUST be hyrule-dns
# (hardcoded in hyrule-cloud/providers/dns.py:36). Secret is sourced via lookup
# in group_vars/nameservers.yml.
knot_tsig_key_name: hyrule-dns
knot_tsig_secret: ""

# RFC 2136 dynamic-update ACLs (primary only). Each entry: { id: <acl-id>, address: <addr> }
# Empty list disables (e.g. for hosts that don't accept dynupdates).
knot_dynupdate_acls: []

# AXFR-out ACLs (primary only) — TSIG-keyless transfer for ops home prefix.
# Each entry: { id: <acl-id>, address: <addr-or-list> }
knot_xfr_acls: []

# Where rendered configs land in the repo for review.
knot_generated_dir: "{{ playbook_dir }}/../generated"

# Whether to install knot, copy config into place + reload. False = render only.
knot_apply: false

# Customer zones are declared on the primary through a generated include.
# Knot turns those declarations into an RFC 9432 catalog and the secondary
# interprets it, so adding a domain never requires editing host inventory.
knot_customer_catalog_enabled: true
knot_customer_catalog_zone: customer-zones.catalog.invalid
knot_customer_member_template: customer-member
knot_customer_secondary_template: customer-secondary
knot_customer_zones_dir: /var/lib/knot/customer-zones
knot_customer_zones_config: /var/lib/knot/customer-zones.conf
knot_customer_dnssec_policy: customer-domains

# HMAC-authenticated internal control service (primary only).
knot_dns_control_enabled: "{{ knot_role == 'primary' }}"
knot_dns_control_secret: "{{ lookup('env', 'HYRULE_DNS_CONTROL_SECRET') }}"
knot_dns_control_host: "{{ peers.dns.ipv6 | default('::1') }}"
knot_dns_control_port: 8453
knot_dns_control_state_dir: /var/lib/knot/hyrule-dns-control
knot_dns_control_env_file: /etc/knot/hyrule-dns-control.env

# Online backups include zone contents, catalog metadata, and KASP keys.
knot_backup_enabled: true
knot_backup_dir: /var/backups/knot
knot_backup_retention_days: 14
