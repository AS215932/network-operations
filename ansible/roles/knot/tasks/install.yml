---
- name: Install Knot DNS
  apt:
    name:
      - "{{ knot_pkg }}"
      - "{{ knot_dnssecutils_pkg }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [apply]

- name: Ensure /var/lib/knot/zones exists (writable by knot)
  file:
    path: "{{ knot_zones_dir }}"
    state: directory
    owner: knot
    group: knot
    mode: "0750"
  tags: [apply]

- name: Ensure customer zone and control-state directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: knot
    group: knot
    mode: "0750"
  loop:
    - "{{ knot_customer_zones_dir }}"
    - "{{ knot_dns_control_state_dir }}"
  when: knot_customer_catalog_enabled | bool
  tags: [apply]

- name: Ensure the generated customer-zone include exists before Knot validation
  copy:
    dest: "{{ knot_customer_zones_config }}"
    content: "# Generated by hyrule-dns-control. Do not edit.\n"
    force: false
    owner: knot
    group: knot
    mode: "0640"
  when:
    - knot_customer_catalog_enabled | bool
    - knot_role == "primary"
  tags: [apply]

# systemd-resolved binds 127.0.0.53:53 by default; that prevents Knot from
# binding 0.0.0.0:53 (the bind range includes 127.0.0.53). Disable the stub
# listener; system resolution still works via /etc/resolv.conf written by
# resolved itself or by the cloud-init / OVH default config.
- name: Ensure resolved.conf.d/ exists
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"
  tags: [apply]

- name: Disable systemd-resolved DNS stub listener
  copy:
    dest: /etc/systemd/resolved.conf.d/99-no-stub.conf
    content: |
      [Resolve]
      DNSStubListener=no
    owner: root
    group: root
    mode: "0644"
  notify: restart systemd-resolved
  tags: [apply]
