---
- name: reload systemd
  systemd:
    daemon_reload: true

- name: restart noc-agent
  systemd:
    name: noc-agent
    state: restarted
    enabled: true
  when: noc_agent_pyproject.stat.exists | default(false)
  ignore_errors: "{{ ansible_check_mode }}"

- name: restart noc-agent-bot
  systemd:
    name: noc-agent-bot
    state: restarted
    enabled: true
  when: noc_agent_pyproject.stat.exists | default(false)
  ignore_errors: "{{ ansible_check_mode }}"

- name: restart noc coordinator worker
  systemd:
    name: noc-coordinator-worker.service
    state: "{{ 'restarted' if noc_coordinator_worker_enabled | bool else 'stopped' }}"
    enabled: "{{ noc_coordinator_worker_enabled | bool }}"
    daemon_reload: true
  when: noc_agent_pyproject.stat.exists | default(false)
  ignore_errors: "{{ ansible_check_mode }}"

- name: restart xo-mcp
  systemd:
    name: xo-mcp
    state: restarted
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"
- name: restart redis-server
  systemd:
    name: "redis-server"
    state: restarted
    enabled: true
    daemon_reload: true
