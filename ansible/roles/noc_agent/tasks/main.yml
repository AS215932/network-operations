---
# Deploy noc-agent: clone repo, install deps, render .env, install systemd unit.
# Assumes hyrule_mcp role has run first (creates the noc-agent user and lays
# down /opt/hyrule-mcp).

- name: Ensure base packages are installed
  apt:
    name:
      - python3
      - python3-venv
      - git
      - ca-certificates
      - curl
      - gpg
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [apply]

- name: Install Redis apt signing key
  shell: >-
    curl -fsSL {{ noc_agent_redis_repo_key_url }} |
    gpg --dearmor -o {{ noc_agent_redis_repo_keyring }}
  args:
    creates: "{{ noc_agent_redis_repo_keyring }}"
  tags: [apply]

- name: Ensure Redis apt signing key is readable
  file:
    path: "{{ noc_agent_redis_repo_keyring }}"
    owner: root
    group: root
    mode: "0644"
  tags: [apply]

- name: Add Redis apt repository
  apt_repository:
    repo: "deb [signed-by={{ noc_agent_redis_repo_keyring }}] {{ noc_agent_redis_repo_url }} {{ noc_agent_redis_repo_suite }} main"
    filename: redis
    state: present
    update_cache: true
  tags: [apply]

- name: Remove broken Redis Stack package
  apt:
    name: redis-stack-server
    state: absent
    purge: true
    autoremove: true
  tags: [apply]

- name: Install Redis 8 server
  apt:
    name: redis-server
    state: present
  tags: [apply]

- name: Keep Redis 8 bound to localhost
  lineinfile:
    path: "/etc/redis/redis.conf"
    regexp: '^#?\s*bind\s+'
    line: "bind 127.0.0.1 ::1"
  notify: restart redis-server
  tags: [apply]

- name: Keep Redis 8 protected mode enabled
  lineinfile:
    path: "/etc/redis/redis.conf"
    regexp: '^#?\s*protected-mode\s+'
    line: "protected-mode yes"
  notify: restart redis-server
  tags: [apply]

- name: Ensure Redis 8 service is started
  systemd:
    name: "redis-server"
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]

- name: Check if Node.js is already installed
  command: node --version
  register: nodejs_check
  failed_when: false
  changed_when: false
  tags: [apply]

- name: Add NodeSource repository for Node.js LTS
  shell: "curl -fsSL {{ nodejs_lts_setup_url }} | bash -"
  when: nodejs_check.rc != 0
  tags: [apply]

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: true
  when: nodejs_check.rc != 0
  tags: [apply]

- name: Ensure noc-agent install/state dirs exist
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ noc_agent_user }}"
    group: "{{ noc_agent_group }}"
    mode: "0755"
  loop:
    - "{{ noc_agent_install_dir }}"
    - "{{ noc_agent_state_dir }}"
  tags: [apply]

- name: Ensure noc-agent root-owned config/runtime dirs exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ noc_agent_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/noc-agent, mode: "0750" }
    - { path: /run/noc-agent, mode: "0750" }
  when: noc_agent_google_wif_enabled | bool
  tags: [apply]

- name: Generate per-repo deploy key for noc-agent (idempotent)
  command: ssh-keygen -t ed25519 -N "" -C "noc-agent@noc deploy:noc-agent" -f /var/lib/noc-agent/.ssh/id_noc-agent
  args:
    creates: /var/lib/noc-agent/.ssh/id_noc-agent
  become: true
  become_user: "{{ noc_agent_user }}"
  tags: [apply]

- name: Show deploy key pubkey (add to github.com/AS215932/noc-agent deploy keys)
  command: cat /var/lib/noc-agent/.ssh/id_noc-agent.pub
  register: noc_agent_deploy_pub
  changed_when: false
  tags: [apply]

- name: Print deploy-key reminder
  debug:
    msg: |
      noc-agent deploy key (read-only) — add to:
        https://github.com/AS215932/noc-agent/settings/keys
      Pubkey:
        {{ noc_agent_deploy_pub.stdout }}
  tags: [apply]

- name: Configure SSH for noc-agent clones via deploy key
  blockinfile:
    path: /var/lib/noc-agent/.ssh/config
    create: true
    owner: "{{ noc_agent_user }}"
    group: "{{ noc_agent_group }}"
    mode: "0600"
    marker: "# {mark} noc-agent deploy key"
    block: |
      Host github-noc-agent
        Hostname github.com
        User git
        IdentityFile /var/lib/noc-agent/.ssh/id_noc-agent
        IdentitiesOnly yes
  tags: [apply]

- name: Clone noc-agent repository
  git:
    repo: "{{ noc_agent_repo }}"
    dest: "{{ noc_agent_install_dir }}"
    version: "{{ noc_agent_version }}"
    accept_hostkey: true
    update: true
  become: true
  become_user: "{{ noc_agent_user }}"
  ignore_errors: true  # First run will fail until the deploy key is registered on GitHub.
  notify:
    - restart noc-agent
    - restart noc-agent-bot
  tags: [apply]

- name: Check for noc-agent pyproject.toml (set after a successful clone)
  stat:
    path: "{{ noc_agent_install_dir }}/pyproject.toml"
  register: noc_agent_pyproject
  tags: [apply]

- name: Sync noc-agent dependencies via uv
  command: /usr/local/bin/uv sync --frozen
  args:
    chdir: "{{ noc_agent_install_dir }}"
  register: noc_agent_sync
  changed_when: noc_agent_sync.stdout != "" or "Resolved" in noc_agent_sync.stderr or "+" in noc_agent_sync.stderr
  become: true
  become_user: "{{ noc_agent_user }}"
  when: noc_agent_pyproject.stat.exists
  notify:
    - restart noc-agent
    - restart noc-agent-bot
  tags: [apply]

- name: Render /opt/noc-agent/.env
  template:
    src: "{{ playbook_dir }}/../../configs/noc-agent.env.j2"
    dest: "{{ noc_agent_install_dir }}/.env"
    owner: "{{ noc_agent_user }}"
    group: "{{ noc_agent_group }}"
    mode: "0640"
  when: noc_agent_secret_backend == 'env'
  no_log: true
  notify:
    - restart xo-mcp
    - restart noc-agent
    - restart noc-agent-bot
  tags: [apply]

- name: Install Google external-account WIF config for noc-agent
  template:
    src: "{{ playbook_dir }}/../../configs/noc-agent-google-wif.json.j2"
    dest: "{{ noc_agent_google_wif_config_path }}"
    owner: root
    group: "{{ noc_agent_group }}"
    mode: "0640"
  when: noc_agent_google_wif_enabled | bool
  notify:
    - restart noc-agent
    - restart noc-agent-bot
  tags: [apply]

- name: Install /etc/systemd/system/noc-agent.service
  copy:
    src: "{{ playbook_dir }}/../../configs/noc-agent.service"
    dest: /etc/systemd/system/noc-agent.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart noc-agent
    - restart noc-agent-bot
  tags: [apply]

- name: Install /etc/systemd/system/noc-agent-bot.service
  copy:
    src: "{{ playbook_dir }}/../../configs/noc-agent-bot.service"
    dest: /etc/systemd/system/noc-agent-bot.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart noc-agent-bot
  tags: [apply]

- name: Enable and start noc-agent
  systemd:
    name: noc-agent
    state: started
    enabled: true
    daemon_reload: true
  when:
    - noc_agent_pyproject.stat.exists
    - noc_agent_secret_backend == 'env'
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [apply]

- name: Enable and start noc-agent-bot
  systemd:
    name: noc-agent-bot
    state: started
    enabled: true
    daemon_reload: true
  when:
    - noc_agent_pyproject.stat.exists
    - noc_agent_secret_backend == 'env'
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [apply]

- name: Enable noc-agent for Vault Agent managed start
  systemd:
    name: noc-agent
    enabled: true
    daemon_reload: true
  when:
    - noc_agent_pyproject.stat.exists
    - noc_agent_secret_backend == 'vault'
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [apply]

- name: Enable noc-agent-bot for Vault Agent managed start
  systemd:
    name: noc-agent-bot
    enabled: true
    daemon_reload: true
  when:
    - noc_agent_pyproject.stat.exists
    - noc_agent_secret_backend == 'vault'
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [apply]
