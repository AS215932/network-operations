---
- name: reload systemd
  systemd:
    daemon_reload: true

- name: restart hyrule-mcp
  systemd:
    name: hyrule-mcp
    state: restarted
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: restart noc-agent
  systemd:
    name: noc-agent
    state: restarted
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"
