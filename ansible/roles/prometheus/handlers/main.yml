---
# promtool validation runs as a pre-publish task in install.yml (against the
# staging mirror), so a broken ruleset never reaches the live directory. This
# handler only reloads Prometheus once the live rules.d has actually changed.
- name: Reload prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: reloaded
  listen: reload prometheus

- name: Restart blackbox exporter
  ansible.builtin.systemd:
    name: "{{ prometheus_blackbox_service_name }}"
    state: restarted
  listen: restart blackbox exporter
