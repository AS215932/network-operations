---
# promtool validation runs before publishing either prometheus.yml or the
# staged rules mirror, so this handler only reloads a fully validated config.
- name: Reload prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: reloaded
  listen: reload prometheus

- name: Restart blackbox exporter
  ansible.builtin.systemd:
    name: "{{ prometheus_blackbox_service_name }}"
    state: restarted
  listen: restart blackbox exporter
