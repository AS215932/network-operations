---
# Master apply gate. Mirrors icinga2_apply / monitoring_apply; apply.yml passes
# `-e prometheus_apply=true` for the `prometheus` playbook, so CI render/validate
# runs (gate false) never mutate the host.
prometheus_apply: false

# Core Prometheus + blackbox_exporter configuration. These must deploy before
# any rules that depend on newly-added scrape jobs or probe modules.
prometheus_config_repo: "{{ playbook_dir }}/../../configs/mon/prometheus.yml"
prometheus_config_path: /etc/prometheus/prometheus.yml
prometheus_blackbox_config_repo: "{{ playbook_dir }}/../../configs/mon/blackbox.yml"
prometheus_blackbox_config_path: /etc/prometheus/blackbox.yml
prometheus_config_staging_dir: /etc/prometheus/.config.staging
prometheus_blackbox_binary: /usr/bin/prometheus-blackbox-exporter
prometheus_blackbox_service_name: prometheus-blackbox-exporter
# The off-net module is deployed manually because extmon apply consumes secrets
# that are intentionally not present on the CI runner. Refuse to publish scrape
# jobs which depend on it until that prerequisite is live.
prometheus_extmon_strict_probe_check_url: "http://[2001:19f0:7402:0cd5:5400:06ff:fe40:7112]:9115/probe?module=http_200_v4&target=https%3A%2F%2Fcloud.hyrule.host%2Fhealth"

# Where mon's Prometheus loads rules from. configs/mon/prometheus.yml has
# `rule_files: /etc/prometheus/rules.d/*.yml`.
prometheus_rules_dir: /etc/prometheus/rules.d

# Staging mirror where the candidate ruleset is promtool-validated before it is
# published to the live rules_dir. Not read by Prometheus.
prometheus_rules_staging_dir: /etc/prometheus/.rules.d.staging

# Source of truth in the repo. Read-only — the role copies from here.
prometheus_rules_repo: "{{ playbook_dir }}/../../configs/mon/prometheus-rules"
