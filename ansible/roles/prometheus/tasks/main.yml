---
# prometheus role — manages mon-side Prometheus alerting/recording rules under
# /etc/prometheus/rules.d/. Ships the static rule files from
# configs/mon/prometheus-rules/ with a promtool-validated reload, so rule
# changes deploy through the normal apply pipeline instead of a manual cp.
#
# Scope is rules only. prometheus.yml itself and Alertmanager delivery
# (127.0.0.1:9093 → noc-agent) are NOT managed here — see the alerting-delivery
# gap tracked separately; without Alertmanager running, these rules fire but are
# not delivered.

- name: Skip — only runs on mon
  meta: end_host
  when: inventory_hostname != "mon"
  tags: [always]

- name: Validate rule files (controller-side, dry-run friendly)
  ansible.builtin.include_tasks: validate.yml
  tags: [validate, diff, apply]

- name: Apply — push rule files to mon
  ansible.builtin.include_tasks: install.yml
  when: prometheus_apply | bool
  tags: [apply]
