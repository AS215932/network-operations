---
# Controller-side sanity check so the dry-run lane
# (`--tags validate --connection=local`) catches a malformed rule file without
# touching mon. The authoritative `promtool check rules` runs on mon in the
# reload handler, where promtool ships with the prometheus package.
- name: Sanity-check Prometheus core config
  vars:
    _prometheus_doc: "{{ lookup('file', prometheus_config_repo) | from_yaml }}"
  ansible.builtin.assert:
    that:
      - _prometheus_doc.scrape_configs is defined
      - (_prometheus_doc.scrape_configs | type_debug) == "list"
    fail_msg: "prometheus.yml needs a top-level scrape_configs list"
    quiet: true
  delegate_to: localhost
  run_once: true

- name: Sanity-check blackbox_exporter config
  vars:
    _blackbox_doc: "{{ lookup('file', prometheus_blackbox_config_repo) | from_yaml }}"
  ansible.builtin.assert:
    that:
      - _blackbox_doc.modules is defined
      - (_blackbox_doc.modules | type_debug) == "dict"
    fail_msg: "blackbox.yml needs a top-level modules mapping"
    quiet: true
  delegate_to: localhost
  run_once: true

- name: Sanity-check each rule file is a Prometheus rule-group document
  vars:
    _doc: "{{ lookup('file', item) | from_yaml }}"
  ansible.builtin.assert:
    that:
      - _doc.groups is defined
      - (_doc.groups | type_debug) == "list"
    fail_msg: "{{ item | basename }} is not a valid Prometheus rules file (needs a top-level groups: list)"
    success_msg: "{{ item | basename }} ok"
    quiet: true
  loop: "{{ query('ansible.builtin.fileglob', prometheus_rules_repo ~ '/*.yml') }}"
  loop_control:
    label: "{{ item | basename }}"
  delegate_to: localhost
  run_once: true
