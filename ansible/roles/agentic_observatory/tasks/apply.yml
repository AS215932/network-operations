---
- name: Ensure Agentic Observatory packages are installed
  ansible.builtin.apt:
    name: "{{ agentic_observatory_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install uv for Agentic Observatory
  ansible.builtin.shell: |
    set -euo pipefail
    curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh
  args:
    creates: /usr/local/bin/uv
    executable: /bin/bash

- name: Ensure Agentic Observatory group exists
  ansible.builtin.group:
    name: "{{ agentic_observatory_group }}"
    state: present
    system: true

- name: Ensure Agentic Observatory user exists
  ansible.builtin.user:
    name: "{{ agentic_observatory_user }}"
    group: "{{ agentic_observatory_group }}"
    home: "{{ agentic_observatory_state_dir }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Ensure Agentic Observatory directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(agentic_observatory_user) }}"
    group: "{{ item.group | default(agentic_observatory_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ agentic_observatory_install_dir }}", mode: "0755" }
    - { path: "{{ agentic_observatory_config_dir }}", owner: root, mode: "0750" }
    - { path: "{{ agentic_observatory_state_dir }}", mode: "0750" }

- name: Wait for Agentic Observatory env file rendered by Vault Agent
  ansible.builtin.wait_for:
    path: "{{ agentic_observatory_env_file }}"
    state: present
    timeout: 60
    msg: >-
      {{ agentic_observatory_env_file }} is missing. Bootstrap the
      agentic-observatory AppRole/KV and run the Vault Agent role before
      applying agentic_observatory.

- name: Read Agentic Observatory GitHub checkout token
  ansible.builtin.shell: |
    set -euo pipefail
    python3 - {{ agentic_observatory_env_file | quote }} <<'PY'
    import pathlib
    import sys

    prefix = "OBSERVATORY_GITHUB_TOKEN="
    for line in pathlib.Path(sys.argv[1]).read_text().splitlines():
        if line.startswith(prefix):
            print(line[len(prefix):])
            break
    else:
        raise SystemExit("OBSERVATORY_GITHUB_TOKEN missing")
    PY
  args:
    executable: /bin/bash
  register: agentic_observatory_github_token
  changed_when: false
  no_log: true

- name: Assert Agentic Observatory private checkout token is available
  ansible.builtin.assert:
    that:
      - agentic_observatory_github_token.stdout | length > 0
    fail_msg: >-
      Agentic Observatory requires OBSERVATORY_GITHUB_TOKEN for the private
      AS215932/agentic-observatory runtime checkout. Populate the
      agentic-observatory Vault secret or make the repository public.

- name: Ensure Agentic Observatory PostgreSQL role has env password
  ansible.builtin.shell: |
    set -euo pipefail
    db_password="$(python3 - {{ agentic_observatory_env_file | quote }} <<'PY'
    import pathlib
    import sys

    prefix = "OBSERVATORY_DB_PASSWORD="
    for line in pathlib.Path(sys.argv[1]).read_text().splitlines():
        if line.startswith(prefix):
            print(line[len(prefix):])
            break
    else:
        raise SystemExit("OBSERVATORY_DB_PASSWORD missing")
    PY
    )"
    test -n "$db_password"
    export OBSERVATORY_DB_PASSWORD="$db_password"

    sql_file="$(mktemp /tmp/agentic-observatory-pg.XXXXXX.sql)"
    trap 'rm -f "$sql_file"' EXIT
    chmod 0600 "$sql_file"

    python3 - <<'PY' > "$sql_file"
    import os

    password = os.environ["OBSERVATORY_DB_PASSWORD"].replace("'", "''")
    print("""DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ agentic_observatory_database_role }}') THEN
        CREATE ROLE {{ agentic_observatory_database_role }} LOGIN PASSWORD '%s';
      ELSE
        ALTER ROLE {{ agentic_observatory_database_role }} WITH LOGIN PASSWORD '%s';
      END IF;
    END
    $$;""" % (password, password))
    PY

    chown postgres:postgres "$sql_file"
    runuser -u postgres -- psql -v ON_ERROR_STOP=1 -f "$sql_file"
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Check Agentic Observatory PostgreSQL database
  ansible.builtin.command:
    argv:
      - psql
      - -tAc
      - "SELECT 1 FROM pg_database WHERE datname='{{ agentic_observatory_database_name }}'"
  become: true
  become_user: postgres
  register: agentic_observatory_pg_database
  changed_when: false

- name: Create Agentic Observatory PostgreSQL database
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ agentic_observatory_database_name }} OWNER {{ agentic_observatory_database_role }}"
  become: true
  become_user: postgres
  when: agentic_observatory_pg_database.stdout | trim != '1'

- name: Checkout Agentic Observatory runtime
  block:
    - name: Install temporary GitHub netrc for Agentic Observatory checkout
      ansible.builtin.copy:
        dest: "{{ agentic_observatory_state_dir }}/.netrc"
        content: |
          machine github.com
            login x-access-token
            password {{ agentic_observatory_github_token.stdout }}
        owner: "{{ agentic_observatory_user }}"
        group: "{{ agentic_observatory_group }}"
        mode: "0600"
      no_log: true

    - name: Checkout Agentic Observatory runtime source
      ansible.builtin.git:
        repo: "{{ agentic_observatory_repo }}"
        dest: "{{ agentic_observatory_install_dir }}"
        version: "{{ agentic_observatory_version }}"
        update: true
        force: false
      become: true
      become_user: "{{ agentic_observatory_user }}"
      environment:
        HOME: "{{ agentic_observatory_state_dir }}"
        GIT_TERMINAL_PROMPT: "0"
      notify: restart agentic observatory
  always:
    - name: Remove temporary GitHub netrc for Agentic Observatory checkout
      ansible.builtin.file:
        path: "{{ agentic_observatory_state_dir }}/.netrc"
        state: absent
      no_log: true

- name: Sync Agentic Observatory runtime dependencies
  ansible.builtin.command: /usr/local/bin/uv sync --frozen
  args:
    chdir: "{{ agentic_observatory_install_dir }}"
  register: agentic_observatory_uv_sync
  changed_when: >-
    agentic_observatory_uv_sync.stdout != '' or
    'Resolved' in agentic_observatory_uv_sync.stderr or
    '+' in agentic_observatory_uv_sync.stderr
  become: true
  become_user: "{{ agentic_observatory_user }}"
  notify: restart agentic observatory

- name: Install Agentic Observatory systemd service
  ansible.builtin.template:
    src: agentic-observatory.service.j2
    dest: "/etc/systemd/system/{{ agentic_observatory_service_name }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart agentic observatory

- name: Check Agentic Observatory env file is rendered
  ansible.builtin.stat:
    path: "{{ agentic_observatory_env_file }}"
  register: agentic_observatory_env_stat

- name: Set Agentic Observatory service state
  ansible.builtin.systemd:
    name: "{{ agentic_observatory_service_name }}"
    enabled: "{{ agentic_observatory_enabled | bool }}"
    state: "{{ 'started' if (agentic_observatory_enabled | bool and agentic_observatory_env_stat.stat.exists) else 'stopped' }}"
    daemon_reload: true
