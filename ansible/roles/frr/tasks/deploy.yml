---
# Live config push + hot-reload via FRR's integrated reload (frr-reload), which
# computes and applies only the delta against the RUNNING daemon — no restart,
# no session flap. Mirrors the firewall role's safety chain (stage -> syntax
# check -> backup -> at(1) watchdog -> swap).
#
# The reload runs on EVERY apply rather than only when the file changes: the
# config push is idempotent, so after a prior run the on-disk file already
# equals the repo, and a file-change gate would skip the reload even when the
# running daemon is still stale. frr-reload diffs against the running daemon, so
# an unchanged daemon is a cheap no-op; a stale one converges. soft-clear then
# re-applies route-map policy to stored routes (route-map edits need it).
#
# FRR is assumed installed + running; we never restart the daemon.

- name: Check FRR + watchdog prerequisites are present
  command: sh -c 'command -v vtysh >/dev/null 2>&1 && command -v at >/dev/null 2>&1 && command -v atrm >/dev/null 2>&1'
  changed_when: false
  tags: [apply]

- name: Ensure the integrated-reload tooling package is installed
  # On FreeBSD frr-reload.py ships in a separate package (frr10-pythontools);
  # without it the reload silently applies nothing. Debian bundles it (pkg = "").
  package:
    name: "{{ frr_pythontools_pkg }}"
    state: present
  when: frr_pythontools_pkg | default('') | length > 0
  tags: [apply]

- name: Stage new FRR config on host (.new)
  copy:
    src: "{{ frr_config_src_dir }}/{{ inventory_hostname }}/frr.conf"
    dest: "{{ frr_conf_path }}.new"
    mode: "0640"
  tags: [apply]

- name: Syntax-check the staged FRR config
  command: "{{ frr_validate_cmd }} {{ frr_conf_path }}.new"
  changed_when: false
  tags: [apply]

- name: Backup the currently-loaded FRR config before swap
  copy:
    src: "{{ frr_conf_path }}"
    dest: "{{ frr_backup_path }}"
    remote_src: true
    mode: "0640"
  changed_when: false
  tags: [apply]

- name: Schedule rollback watchdog — restores + reloads the backup if not cancelled
  shell: |
    echo 'cp {{ frr_backup_path }} {{ frr_conf_path }} && {{ frr_reload_cmd }} 2>&1 | logger -t frr-rollback' \
      | at now + {{ frr_watchdog_minutes }} minutes 2>&1 \
      | awk 'tolower($1) == "job" {print $2}'
  register: _frr_at_job
  changed_when: false
  tags: [apply]

- name: Move new FRR config into place
  copy:
    src: "{{ frr_conf_path }}.new"
    dest: "{{ frr_conf_path }}"
    remote_src: true
    mode: "0640"
  tags: [apply]

- name: Reload FRR (integrated delta apply — converges running daemon, no restart)
  command: "{{ frr_reload_cmd }}"
  changed_when: true
  tags: [apply]

- name: Re-evaluate BGP policy (soft — re-applies route-maps without flapping sessions)
  command: "{{ frr_clear_bgp_cmd }}"
  changed_when: false
  when: frr_clear_bgp | default(true) | bool
  tags: [apply]

- name: Cancel rollback watchdog
  command: "atrm {{ _frr_at_job.stdout }}"
  changed_when: false
  when: _frr_at_job.stdout | default('') | length > 0
  tags: [apply]
