---
- name: Ensure Knowledge MCP packages are installed
  ansible.builtin.apt:
    name: "{{ knowledge_mcp_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure Docker config directory exists
  ansible.builtin.file:
    path: "{{ knowledge_mcp_docker_daemon_config | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: knowledge_mcp_docker_ipv6_enabled | bool

- name: Install Docker daemon routed IPv6 config for Knowledge MCP
  ansible.builtin.template:
    src: docker-daemon.json.j2
    dest: "{{ knowledge_mcp_docker_daemon_config }}"
    owner: root
    group: root
    mode: "0644"
  register: knowledge_mcp_docker_daemon_config_result
  when: knowledge_mcp_docker_ipv6_enabled | bool

- name: Enable IPv6 forwarding for Knowledge MCP Docker routed subnet
  sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_file: "{{ knowledge_mcp_docker_sysctl_file }}"
    state: present
    reload: true
  register: knowledge_mcp_docker_ipv6_forwarding
  when: knowledge_mcp_docker_ipv6_enabled | bool

- name: Restart Docker to apply Knowledge MCP routed IPv6 config
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: restarted
  when:
    - knowledge_mcp_docker_ipv6_enabled | bool
    - >-
      knowledge_mcp_docker_daemon_config_result.changed | default(false) or
      knowledge_mcp_docker_ipv6_forwarding.changed | default(false)

- name: Ensure Docker is enabled for Knowledge MCP
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure Knowledge MCP group exists
  ansible.builtin.group:
    name: "{{ knowledge_mcp_group }}"
    state: present
    system: true

# Don't pass `home:` for the shared loop user. On live hosts the loop daemon
# keeps processes running as this account, and changing account metadata forces
# usermod to fail while those processes exist. Runtime state is owned through
# the explicit directory task below; create_home only controls first creation.
- name: Ensure Knowledge MCP user exists
  ansible.builtin.user:
    name: "{{ knowledge_mcp_user }}"
    group: "{{ knowledge_mcp_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Ensure Knowledge MCP directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(knowledge_mcp_user) }}"
    group: "{{ item.group | default(knowledge_mcp_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ knowledge_mcp_install_dir }}", mode: "0755" }
    - { path: "{{ knowledge_mcp_state_dir }}", mode: "0750" }

- name: Checkout Knowledge MCP source
  ansible.builtin.git:
    repo: "{{ knowledge_mcp_repo }}"
    dest: "{{ knowledge_mcp_install_dir }}"
    version: "{{ knowledge_mcp_version }}"
    update: true
    force: false
  become: true
  become_user: "{{ knowledge_mcp_user }}"
  notify: restart knowledge-mcp

- name: Inspect existing Knowledge MCP container image revision
  ansible.builtin.command:
    argv:
      - docker
      - image
      - inspect
      - "{{ knowledge_mcp_image }}"
      - --format
      - "{{ '{{' }} index .Config.Labels \"org.opencontainers.image.revision\" {{ '}}' }}"
  register: knowledge_mcp_image_revision
  failed_when: false
  changed_when: false

- name: Build Knowledge MCP container image
  ansible.builtin.command:
    argv:
      - docker
      - build
      - -t
      - "{{ knowledge_mcp_image }}"
      - --label
      - "org.opencontainers.image.revision={{ knowledge_mcp_version }}"
      - .
  args:
    chdir: "{{ knowledge_mcp_install_dir }}"
  register: knowledge_mcp_docker_build
  changed_when: true
  when: knowledge_mcp_image_revision.stdout | trim != knowledge_mcp_version
  notify: restart knowledge-mcp

- name: Install Knowledge MCP systemd service
  ansible.builtin.template:
    src: hyrule-knowledge-mcp.service.j2
    dest: /etc/systemd/system/hyrule-knowledge-mcp.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart knowledge-mcp

- name: Set Knowledge MCP service state
  ansible.builtin.systemd:
    name: hyrule-knowledge-mcp.service
    enabled: "{{ knowledge_mcp_enabled | bool }}"
    state: "{{ 'started' if knowledge_mcp_enabled | bool else 'stopped' }}"
    daemon_reload: true
