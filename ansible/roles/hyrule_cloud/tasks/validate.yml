---
# Assertions that run on every invocation. Cheap, controller-local where
# possible, and they make `--tags validate` a real safety net rather than
# a no-op rubber stamp.

- name: Assert hyrule_cloud_version is pinned to a commit SHA
  ansible.builtin.assert:
    that:
      - hyrule_cloud_version is defined
      - hyrule_cloud_version is match('^[0-9a-fA-F]{40}$')
    fail_msg: >-
      hyrule_cloud_version must be set to a 40-character commit SHA. Production
      deploys are promoted through network-operations by pinning the exact app
      commit; for rollback, promote the previous SHA or pass it explicitly.

- name: Stat reusable configs on the controller (hyrule-cloud.service)
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../configs/hyrule-cloud.service"
  register: hyrule_cloud_service_file
  delegate_to: localhost
  become: false
  changed_when: false

- name: Stat reusable configs on the controller (hyrule-cloud-worker.service)
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../configs/hyrule-cloud-worker.service"
  register: hyrule_cloud_worker_service_file
  delegate_to: localhost
  become: false
  changed_when: false

- name: Stat reusable configs on the controller (hyrule-cloud Vault template)
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../roles/vault_agent/templates/hyrule-cloud.env.ctmpl.j2"
  register: hyrule_cloud_vault_env_template
  delegate_to: localhost
  become: false
  changed_when: false

- name: Assert reusable configs are present
  ansible.builtin.assert:
    that:
      - hyrule_cloud_service_file.stat.exists
      - hyrule_cloud_worker_service_file.stat.exists
      - hyrule_cloud_vault_env_template.stat.exists
    fail_msg: >-
      configs/hyrule-cloud.service, configs/hyrule-cloud-worker.service, and
      the Vault Agent hyrule-cloud env template must exist in the infra repo.
