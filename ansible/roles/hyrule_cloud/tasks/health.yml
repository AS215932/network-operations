---
# Flush handlers first so any `reload systemd` (changed unit file) runs before
# we restart. Then restart UNCONDITIONALLY: the deploy must guarantee the
# running process is on the requested ref, but a retry where the checkout SHA
# was already current, or a deps-only change, notifies no restart handler and
# leaves the OLD process running (#96). This runs after vault.yml so the
# restarted process sees the freshly-rendered env, and before the asserts so
# they observe post-restart state.

- name: Flush handlers (reload systemd if the unit changed) before restart
  ansible.builtin.meta: flush_handlers

- name: Run hyrule-cloud database migrations
  ansible.builtin.command:
    cmd: /usr/local/bin/uv run alembic upgrade head
    chdir: "{{ hyrule_cloud_install_dir }}"
  become: true
  become_user: "{{ hyrule_cloud_app_user }}"
  environment:
    PYTHONPATH: "{{ hyrule_cloud_install_dir }}"
  changed_when: false
  when: hyrule_cloud_pyproject.stat.exists

- name: Restart hyrule-cloud (deterministic on every apply)
  ansible.builtin.systemd:
    name: "{{ hyrule_cloud_service_name }}"
    state: restarted
    enabled: true

- name: Restart dedicated hyrule-cloud worker (deterministic on every apply)
  ansible.builtin.systemd:
    name: "{{ hyrule_cloud_worker_service_name }}"
    state: restarted
    enabled: true

- name: Check hyrule-cloud systemd state
  ansible.builtin.systemd:
    name: "{{ hyrule_cloud_service_name }}"
  register: hyrule_cloud_service

- name: Assert hyrule-cloud service is active
  ansible.builtin.assert:
    that:
      - hyrule_cloud_service.status.ActiveState == "active"
    fail_msg: >-
      hyrule-cloud.service is {{ hyrule_cloud_service.status.ActiveState }};
      expected "active". Check journalctl -u hyrule-cloud on the target.

- name: Check hyrule-cloud worker systemd state
  ansible.builtin.systemd:
    name: "{{ hyrule_cloud_worker_service_name }}"
  register: hyrule_cloud_worker_service

- name: Assert hyrule-cloud worker is active
  ansible.builtin.assert:
    that:
      - hyrule_cloud_worker_service.status.ActiveState == "active"
    fail_msg: >-
      hyrule-cloud-worker.service is
      {{ hyrule_cloud_worker_service.status.ActiveState }}; expected "active".
      Check journalctl -u hyrule-cloud-worker on the target.

- name: HTTP health check (local loopback)
  ansible.builtin.uri:
    url: "{{ hyrule_cloud_listen_url }}"
    status_code: 200
    return_content: false
    timeout: 5
  register: hyrule_cloud_http
  retries: 10
  delay: 3
  until: hyrule_cloud_http.status == 200

- name: Wait for production payment rails to become ready
  ansible.builtin.uri:
    url: "{{ hyrule_cloud_payment_catalog_url }}"
    status_code: 200
    return_content: true
    timeout: 10
  register: hyrule_cloud_payment_catalog
  retries: 20
  delay: 3
  until:
    - hyrule_cloud_payment_catalog.status == 200
    - hyrule_cloud_payment_catalog.json.native_worker.ready | default(false) | bool
    - >-
      (hyrule_cloud_required_native_assets
       | difference(hyrule_cloud_payment_catalog.json.native | default([]))
       | length) == 0
    - >-
      (hyrule_cloud_required_x402_networks
       | difference(hyrule_cloud_payment_catalog.json.networks
                    | default([])
                    | map(attribute='key')
                    | list)
       | length) == 0

- name: Report payment rail deploy-gate evidence
  ansible.builtin.debug:
    msg:
      x402_networks: >-
        {{ hyrule_cloud_payment_catalog.json.networks
           | map(attribute='key') | list }}
      native_assets: "{{ hyrule_cloud_payment_catalog.json.native }}"
      native_worker: "{{ hyrule_cloud_payment_catalog.json.native_worker }}"

- name: Keep Monero wallet RPC stopped after cloud restart when native rails are disabled
  ansible.builtin.systemd:
    name: monero-wallet-rpc.service
    state: stopped
    enabled: false
  when: not (hyrule_cloud_monero_wallet_rpc_enabled | bool)
  failed_when: false

- name: Clear Monero wallet RPC failed state when native rails are disabled
  ansible.builtin.command: systemctl reset-failed monero-wallet-rpc.service
  when: not (hyrule_cloud_monero_wallet_rpc_enabled | bool)
  changed_when: false
  failed_when: false
