---
# --no-dev: skip pytest/ruff/mypy on the production venv. Those run in CI.
# changed_when: false because we want git/template/unit tasks to drive the
# restart notification — uv's "Audited"/"Resolved" stdout is noisy and would
# fire spurious restarts.

- name: Check for hyrule-cloud pyproject.toml (gated on a successful clone)
  ansible.builtin.stat:
    path: "{{ hyrule_cloud_install_dir }}/pyproject.toml"
  register: hyrule_cloud_pyproject

- name: Sync hyrule-cloud production dependencies via uv
  ansible.builtin.command:
    cmd: /usr/local/bin/uv sync --frozen --no-dev
    chdir: "{{ hyrule_cloud_install_dir }}"
  become: true
  become_user: "{{ hyrule_cloud_app_user }}"
  changed_when: false
  when: hyrule_cloud_pyproject.stat.exists
  # No `notify: restart` — `changed_when: false` means this task never reports
  # changed, so the handler would never fire anyway (dead notify, #96). The
  # restart is unconditional in health.yml on every apply.

- name: Ensure Hyrule Cloud BGP data directory exists
  ansible.builtin.file:
    path: "{{ hyrule_cloud_state_dir }}/bgp"
    state: directory
    owner: "{{ hyrule_cloud_app_user }}"
    group: "{{ hyrule_cloud_app_group }}"
    mode: "0750"

- name: Install Vault render hook for hyrule-cloud environment file
  ansible.builtin.template:
    src: vault-render-hook.sh.j2
    dest: "{{ hyrule_cloud_vault_render_hook }}"
    owner: root
    group: root
    mode: "0755"

- name: Install /etc/systemd/system/hyrule-cloud.service
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../configs/hyrule-cloud.service"
    dest: /etc/systemd/system/hyrule-cloud.service
    owner: root
    group: root
    mode: "0644"
  # reload systemd if the unit file changed; the restart itself is
  # unconditional in health.yml (after vault.yml renders the env), so it is
  # deliberately not notified here (#96).
  notify:
    - reload systemd

- name: Ensure Monero wallet RPC directory exists
  ansible.builtin.file:
    path: "{{ hyrule_cloud_monero_wallet_dir }}"
    state: directory
    owner: "{{ hyrule_cloud_app_user }}"
    group: "{{ hyrule_cloud_app_group }}"
    mode: "0750"
  when: hyrule_cloud_monero_wallet_rpc_enabled | bool

- name: Install Monero wallet RPC restore helper
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../configs/hyrule-cloud-monero-restore-wallet"
    dest: /usr/local/sbin/hyrule-cloud-monero-restore-wallet
    owner: root
    group: root
    mode: "0755"
  when: hyrule_cloud_monero_wallet_rpc_enabled | bool

- name: Install /etc/systemd/system/monero-wallet-rpc.service
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../configs/monero-wallet-rpc.service"
    dest: /etc/systemd/system/monero-wallet-rpc.service
    owner: root
    group: root
    mode: "0644"
  when: hyrule_cloud_monero_wallet_rpc_enabled | bool
  notify:
    - reload systemd

- name: Stop and disable Monero wallet RPC when native rails are not configured
  ansible.builtin.systemd:
    name: monero-wallet-rpc.service
    state: stopped
    enabled: false
  when: not (hyrule_cloud_monero_wallet_rpc_enabled | bool)
  failed_when: false
