---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart hyrule-cloud
  ansible.builtin.systemd:
    name: "{{ hyrule_cloud_service_name }}"
    state: restarted
    enabled: true

- name: restart hyrule-cloud-worker
  ansible.builtin.systemd:
    name: "{{ hyrule_cloud_worker_service_name }}"
    state: restarted
    enabled: true
