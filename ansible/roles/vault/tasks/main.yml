---
- name: Ensure Vault package prerequisites are installed
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [apply]

- name: Install HashiCorp apt signing key
  get_url:
    url: "{{ vault_hashicorp_gpg_url }}"
    dest: /usr/share/keyrings/hashicorp-archive-keyring.asc
    owner: root
    group: root
    mode: "0644"
  tags: [apply]

- name: Add HashiCorp apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.asc] {{ vault_hashicorp_repo_url }} {{ ansible_distribution_release | default('bookworm') }} main"
    filename: hashicorp
    state: present
    update_cache: true
  tags: [apply]

- name: Install Vault OSS
  apt:
    name: vault
    state: present
  tags: [apply]

- name: Ensure Vault raft storage directory exists
  file:
    path: "{{ item.path }}"
    state: directory
    owner: vault
    group: vault
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ vault_storage_path }}", mode: "0750" }
    - { path: /var/log/vault, mode: "0750" }
  tags: [apply]

- name: Render Vault server configuration
  template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: root
    group: vault
    mode: "0640"
  notify: restart vault
  tags: [apply]

- name: Enable and start Vault
  systemd:
    name: vault
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]
