---
- name: Validate Knowledge API deployment inputs
  ansible.builtin.assert:
    that:
      - knowledge_api_user | length > 0
      - knowledge_api_install_dir.startswith('/')
      - knowledge_api_port | int > 0
      # An ENABLED API deploys an exact reviewed SHA, never a moving ref. Gate
      # this on knowledge_api_enabled (not the apply flag) so the render-only CI
      # path (--tags validate, no knowledge_api_apply) also rejects a promotion
      # that flips enabled=true while leaving knowledge_api_version=main.
      - >-
        not (knowledge_api_enabled | bool)
        or (knowledge_api_version | length == 40
            and knowledge_api_version is match('^[0-9a-f]{40}$'))
    fail_msg: >-
      Enabling the Knowledge API requires knowledge_api_version pinned to an
      exact 40-character commit SHA that contains the api module (>= #36).
  tags: [validate, always]

# Runs on any live apply, enabled or not: while disabled it is a no-op (deploy
# tasks are skipped) EXCEPT the service-state enforcement, so a rollback to
# knowledge_api_enabled=false still stops and disables a previously deployed
# service instead of leaving it running.
- name: Apply Knowledge API runtime
  ansible.builtin.import_tasks: apply.yml
  when: knowledge_api_apply | bool
  tags: [apply]
