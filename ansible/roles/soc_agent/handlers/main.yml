---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart soc-posture timer
  ansible.builtin.systemd:
    name: soc-posture.timer
    state: "{{ 'restarted' if soc_posture_timer_enabled | bool else 'stopped' }}"
    enabled: "{{ soc_posture_timer_enabled | bool }}"
    daemon_reload: true

- name: restart soc-agent service
  ansible.builtin.systemd:
    name: soc-agent.service
    state: "{{ 'restarted' if soc_agent_service_enabled | bool else 'stopped' }}"
    enabled: "{{ soc_agent_service_enabled | bool }}"
    daemon_reload: true
