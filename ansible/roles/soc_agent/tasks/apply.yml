---
- name: Create soc-agent group
  ansible.builtin.group:
    name: "{{ soc_agent_group }}"
    system: true

- name: Create soc-agent user
  ansible.builtin.user:
    name: "{{ soc_agent_user }}"
    group: "{{ soc_agent_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ soc_agent_state_dir }}"
    create_home: false

- name: Create SOC Agent runtime directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ soc_agent_user }}"
    group: "{{ soc_agent_group }}"
    mode: "0750"
  loop:
    - "{{ soc_agent_install_dir }}"
    - "{{ soc_agent_state_dir }}"

# Root-owned: the mode env here carries SOC_MODE and the hard kill switches,
# so the service account must not be able to replace it (or its parent).
- name: Create SOC Agent config directory (root-owned)
  ansible.builtin.file:
    path: "{{ soc_agent_config_dir }}"
    state: directory
    owner: root
    group: "{{ soc_agent_group }}"
    mode: "0750"

- name: Install SOC bootstrap packages
  ansible.builtin.apt:
    name: "{{ soc_agent_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure SOC PostgreSQL is enabled
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true
  when: soc_database_enabled | bool

- name: Install uv (Python package manager)
  ansible.builtin.shell:
    cmd: |
      curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh
    creates: "{{ soc_agent_uv_path }}"

- name: Clone SOC Agent at pinned version
  ansible.builtin.git:
    repo: "{{ soc_agent_repo }}"
    dest: "{{ soc_agent_install_dir }}/repo"
    version: "{{ soc_agent_version }}"
  become: true
  become_user: "{{ soc_agent_user }}"
  notify:
    - restart soc-posture timer
    - restart soc-agent service

# Desired-state repo the posture scanner audits live infrastructure against
# (SOC_NETWORK_OPERATIONS_DIR) — distinct from the app checkout above.
- name: Clone network-operations desired-state checkout
  ansible.builtin.git:
    repo: "{{ soc_network_operations_repo }}"
    dest: "{{ soc_network_operations_dir }}"
    version: "{{ soc_network_operations_version }}"
  become: true
  become_user: "{{ soc_agent_user }}"
  notify: restart soc-posture timer

- name: Sync SOC Agent dependencies
  ansible.builtin.command:
    cmd: "{{ soc_agent_uv_path }} sync --frozen"
    chdir: "{{ soc_agent_install_dir }}/repo"
  become: true
  become_user: "{{ soc_agent_user }}"
  register: soc_agent_uv_sync
  changed_when: "'No changes' not in soc_agent_uv_sync.stderr"

- name: Wait for SOC secrets env rendered by Vault Agent
  ansible.builtin.wait_for:
    path: "{{ soc_agent_secrets_env_file }}"
    state: present
    timeout: 60
  when: soc_database_enabled | bool or soc_coordinator_enabled | bool

- name: Read SOC Vault-rendered environment
  ansible.builtin.slurp:
    src: "{{ soc_agent_secrets_env_file }}"
  register: soc_agent_secrets_env_blob
  no_log: true
  when: soc_database_enabled | bool

- name: Resolve SOC PostgreSQL password in memory
  ansible.builtin.set_fact:
    soc_agent_db_password: >-
      {{
        (
          (soc_agent_secrets_env_blob.content | b64decode).splitlines()
          | select('match', '^SOC_DB_PASSWORD=')
          | list
          | first
          | default('')
        )
        | regex_replace('^SOC_DB_PASSWORD=', '')
      }}
  no_log: true
  when: soc_database_enabled | bool

- name: Assert SOC PostgreSQL password is present
  ansible.builtin.assert:
    that: soc_agent_db_password | length > 0
    fail_msg: SOC_DB_PASSWORD missing from the Vault-rendered environment
  no_log: true
  when: soc_database_enabled | bool

- name: Configure SOC PostgreSQL role over stdin
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
    stdin: |
      DO $role$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ soc_database_role | replace("'", "''") }}') THEN
          CREATE ROLE "{{ soc_database_role | replace('"', '""') }}"
            LOGIN
            PASSWORD '{{ soc_agent_db_password | replace("'", "''") }}';
        ELSE
          ALTER ROLE "{{ soc_database_role | replace('"', '""') }}"
            WITH LOGIN
            PASSWORD '{{ soc_agent_db_password | replace("'", "''") }}';
        END IF;
      END
      $role$;
  become: true
  become_user: postgres
  changed_when: false
  no_log: true
  when: soc_database_enabled | bool

- name: Check SOC PostgreSQL database
  ansible.builtin.command:
    argv:
      - psql
      - -tAc
      - "SELECT 1 FROM pg_database WHERE datname='{{ soc_database_name }}'"
  become: true
  become_user: postgres
  register: soc_agent_pg_database
  changed_when: false
  when: soc_database_enabled | bool

- name: Create SOC PostgreSQL database
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ soc_database_name }} OWNER {{ soc_database_role }}"
  become: true
  become_user: postgres
  when:
    - soc_database_enabled | bool
    - soc_agent_pg_database.stdout | trim != '1'

- name: Render SOC mode/kill-switch environment (non-secret)
  ansible.builtin.template:
    src: soc-agent-mode.env.j2
    dest: "{{ soc_agent_mode_env_file }}"
    owner: root
    group: "{{ soc_agent_group }}"
    mode: "0640"
  notify:
    - restart soc-posture timer
    - restart soc-agent service

- name: Install soc-posture service
  ansible.builtin.template:
    src: soc-posture.service.j2
    dest: /etc/systemd/system/soc-posture.service
    mode: "0644"
  notify: reload systemd

- name: Install soc-posture timer
  ansible.builtin.template:
    src: soc-posture.timer.j2
    dest: /etc/systemd/system/soc-posture.timer
    mode: "0644"
  notify: restart soc-posture timer

- name: Install soc-agent service (LHP endpoints)
  ansible.builtin.template:
    src: soc-agent.service.j2
    dest: /etc/systemd/system/soc-agent.service
    mode: "0644"
  notify: restart soc-agent service

- name: Install SOC inbound handoff service
  ansible.builtin.template:
    src: soc-handoffs.service.j2
    dest: /etc/systemd/system/soc-handoffs.service
    mode: "0644"
  notify: reload systemd

- name: Install SOC inbound handoff timer
  ansible.builtin.template:
    src: soc-handoffs.timer.j2
    dest: /etc/systemd/system/soc-handoffs.timer
    mode: "0644"
  notify: restart soc-handoff timer

- name: Install SOC approved probe service
  ansible.builtin.template:
    src: soc-probes.service.j2
    dest: /etc/systemd/system/soc-probes.service
    mode: "0644"
  notify: reload systemd

- name: Install SOC approved probe timer
  ansible.builtin.template:
    src: soc-probes.timer.j2
    dest: /etc/systemd/system/soc-probes.timer
    mode: "0644"
  notify: restart soc-probe timer

# Enforce the desired unit states on every apply — a promotion PR that only
# flips soc_posture_timer_enabled/soc_agent_service_enabled must take effect
# even when no template changed (handlers alone would never fire).
- name: Enforce soc-posture timer state
  ansible.builtin.systemd:
    name: soc-posture.timer
    state: "{{ 'started' if soc_posture_timer_enabled | bool else 'stopped' }}"
    enabled: "{{ soc_posture_timer_enabled | bool }}"
    daemon_reload: true

- name: Enforce soc-agent service state
  ansible.builtin.systemd:
    name: soc-agent.service
    state: "{{ 'started' if soc_agent_service_enabled | bool else 'stopped' }}"
    enabled: "{{ soc_agent_service_enabled | bool }}"
    daemon_reload: true

- name: Enforce SOC inbound handoff timer state
  ansible.builtin.systemd:
    name: soc-handoffs.timer
    state: "{{ 'started' if soc_handoff_timer_enabled | bool else 'stopped' }}"
    enabled: "{{ soc_handoff_timer_enabled | bool }}"
    daemon_reload: true

- name: Enforce SOC approved probe timer state
  ansible.builtin.systemd:
    name: soc-probes.timer
    state: "{{ 'started' if soc_probe_timer_enabled | bool else 'stopped' }}"
    enabled: "{{ soc_probe_timer_enabled | bool }}"
    daemon_reload: true
