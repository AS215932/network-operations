---
- name: Inspect the installed Agent Mail backup timer
  ansible.builtin.stat:
    path: /etc/systemd/system/agent-mail-backup.timer
  register: _agent_mail_backup_timer_unit

- name: Inspect the installed Agent Mail backup service
  ansible.builtin.stat:
    path: /etc/systemd/system/agent-mail-backup.service
  register: _agent_mail_backup_service_unit

# Stop the timer first, then wait for any in-flight backup to finish its EXIT
# trap before Compose is allowed to take Stalwart down. Otherwise that trap can
# restart the container after the shutdown path has completed.
- name: Stop and disable the Agent Mail backup timer before shutdown
  ansible.builtin.systemd:
    name: agent-mail-backup.timer
    enabled: false
    state: stopped
    daemon_reload: true
  when:
    - not (agent_mail_start | bool) or not (agent_mail_backup_enabled | bool)
    - _agent_mail_backup_timer_unit.stat.exists

- name: Stop any in-flight Agent Mail backup before shutdown
  ansible.builtin.systemd:
    name: agent-mail-backup.service
    state: stopped
  when:
    - not (agent_mail_start | bool) or not (agent_mail_backup_enabled | bool)
    - _agent_mail_backup_service_unit.stat.exists

- name: Install Agent Mail runtime packages
  ansible.builtin.apt:
    name: "{{ agent_mail_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure Agent Mail runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ agent_mail_root }}", owner: root, group: root, mode: "0750" }
    - { path: "{{ agent_mail_etc_dir }}", owner: root, group: root, mode: "0700" }
    - { path: "{{ agent_mail_stalwart_config_dir }}", owner: "2000", group: "2000", mode: "0750" }
    - { path: "{{ agent_mail_stalwart_data_dir }}", owner: "2000", group: "2000", mode: "0750" }
    - { path: "{{ agent_mail_backup_dir }}", owner: root, group: root, mode: "0700" }

- name: Verify the dedicated Agent Mail backup volume is mounted
  ansible.builtin.command:
    argv: [mountpoint, --quiet, "{{ agent_mail_backup_dir }}"]
  changed_when: false
  check_mode: false
  when: agent_mail_backup_enabled | bool

- name: Inspect Agent Mail backup, root, and data filesystems
  ansible.builtin.stat:
    path: "{{ item }}"
    get_attributes: false
    get_checksum: false
    get_mime: false
  loop:
    - "{{ agent_mail_backup_dir }}"
    - /
    - "{{ agent_mail_stalwart_data_dir }}"
  register: _agent_mail_backup_filesystems
  when: agent_mail_backup_enabled | bool

- name: Require a backup filesystem distinct from root and Stalwart data
  ansible.builtin.assert:
    that:
      - _agent_mail_backup_filesystems.results[0].stat.dev != _agent_mail_backup_filesystems.results[1].stat.dev
      - _agent_mail_backup_filesystems.results[0].stat.dev != _agent_mail_backup_filesystems.results[2].stat.dev
    fail_msg: >-
      {{ agent_mail_backup_dir }} must be a distinct filesystem, not a bind mount
      or directory on the root or Stalwart data filesystem.
  when: agent_mail_backup_enabled | bool

- name: Install Agent Mail runtime and staged control artifacts
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: docker-compose.yml.j2, dest: "{{ agent_mail_compose_file }}", mode: "0644" }
    - { src: agent-mail.env.j2, dest: "{{ agent_mail_env_file }}", mode: "0600" }
    - { src: bootstrap.json.j2, dest: "{{ agent_mail_etc_dir }}/bootstrap.json", mode: "0600" }
    - { src: desired-state.ndjson.j2, dest: "{{ agent_mail_etc_dir }}/desired-state.ndjson", mode: "0600" }
    - { src: agent-mail-backup.sh.j2, dest: /usr/local/sbin/agent-mail-backup, mode: "0750" }
    - { src: agent-mail-backup.service.j2, dest: /etc/systemd/system/agent-mail-backup.service, mode: "0644" }
    - { src: agent-mail-backup.timer.j2, dest: /etc/systemd/system/agent-mail-backup.timer, mode: "0644" }
  loop_control:
    label: "{{ item.dest }}"
  no_log: "{{ item.src == 'agent-mail.env.j2' }}"

- name: Enable Docker without starting Stalwart implicitly
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Enable IPv6 forwarding for the Agent Mail bridge
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_file: /etc/sysctl.d/99-agent-mail-docker.conf
    state: present
    reload: true

- name: Validate the rendered Compose project
  ansible.builtin.command:
    argv: [docker, compose, --file, "{{ agent_mail_compose_file }}", config, --quiet]
  changed_when: false

- name: Pull the immutable Stalwart image
  ansible.builtin.command:
    argv: [docker, compose, --file, "{{ agent_mail_compose_file }}", pull, stalwart]
  register: _agent_mail_pull
  changed_when: "'Downloaded newer image' in _agent_mail_pull.stdout"
  when: agent_mail_start | bool

- name: Start the staged Agent Mail container
  ansible.builtin.command:
    argv: [docker, compose, --file, "{{ agent_mail_compose_file }}", up, --detach, --remove-orphans]
  register: _agent_mail_up
  changed_when: >-
    'Started' in _agent_mail_up.stderr or 'Created' in _agent_mail_up.stderr or
    'Recreated' in _agent_mail_up.stderr
  when: agent_mail_start | bool

- name: Stop and remove Agent Mail when the start gate is disabled
  ansible.builtin.command:
    argv: [docker, compose, --file, "{{ agent_mail_compose_file }}", down, --remove-orphans, --timeout, "120"]
  register: _agent_mail_down
  changed_when: >-
    'Stopped' in (_agent_mail_down.stdout + _agent_mail_down.stderr) or
    'Removed' in (_agent_mail_down.stdout + _agent_mail_down.stderr)
  when: not (agent_mail_start | bool)

- name: Configure the local quiesced-backup timer
  ansible.builtin.systemd:
    name: agent-mail-backup.timer
    enabled: "{{ agent_mail_backup_enabled | bool }}"
    state: "{{ 'started' if agent_mail_backup_enabled | bool else 'stopped' }}"
    daemon_reload: true
  when: agent_mail_start | bool
