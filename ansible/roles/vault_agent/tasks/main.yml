---
- name: Ensure Vault Agent package prerequisites are installed
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [apply]

- name: Install HashiCorp apt signing key
  get_url:
    url: "{{ vault_agent_hashicorp_gpg_url }}"
    dest: /usr/share/keyrings/hashicorp-archive-keyring.asc
    owner: root
    group: root
    mode: "0644"
  tags: [apply]

- name: Add HashiCorp apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.asc] {{ vault_agent_hashicorp_repo_url }} {{ ansible_distribution_release | default('bookworm') }} main"
    filename: hashicorp
    state: present
    update_cache: true
  tags: [apply]

- name: Install Vault package for agent mode
  apt:
    name: vault
    state: present
  tags: [apply]

- name: Ensure Vault Agent directories exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop: >-
    {{ [
         {'path': vault_agent_config_dir, 'mode': '0750'},
         {'path': vault_agent_template_dir, 'mode': '0750'},
         {'path': vault_agent_run_dir, 'group': vault_agent_run_dir_group, 'mode': vault_agent_run_dir_mode},
       ] + vault_agent_extra_dirs }}
  tags: [apply]

- name: Install Vault AppRole role_id
  copy:
    content: "{{ vault_agent_role_id }}"
    dest: "{{ vault_agent_role_id_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: vault_agent_role_id | length > 0
  register: vault_agent_role_id_state
  tags: [apply]

- name: Install Vault AppRole secret_id
  copy:
    content: "{{ vault_agent_secret_id }}"
    dest: "{{ vault_agent_secret_id_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: vault_agent_secret_id | length > 0
  register: vault_agent_secret_id_state
  tags: [apply]

- name: Render secret templates for Vault Agent
  template:
    src: "{{ item.src }}"
    dest: "{{ vault_agent_template_dir }}/{{ item.name }}"
    owner: root
    group: root
    mode: "0640"
  loop: "{{ vault_agent_templates }}"
  loop_control:
    label: "{{ item.name }}"
  register: vault_agent_templates_state
  tags: [apply]

- name: Check existing Vault Agent configuration
  stat:
    path: "{{ vault_agent_config_dir }}/{{ vault_agent_name }}.hcl"
  register: vault_agent_existing_config
  tags: [apply]

- name: Read existing Vault Agent response wrapping path
  command:
    argv:
      - awk
      - '/^[[:space:]]*secret_id_response_wrapping_path[[:space:]]*=/{gsub(/^[^"]*"/, ""); gsub(/".*$/, ""); print; exit}'
      - "{{ vault_agent_config_dir }}/{{ vault_agent_name }}.hcl"
  register: vault_agent_existing_response_wrapping_path
  changed_when: false
  failed_when: false
  when: vault_agent_existing_config.stat.exists
  tags: [apply]

- name: Resolve Vault Agent response wrapping path
  set_fact:
    vault_agent_effective_secret_id_response_wrapping_path: >-
      {{
        ''
        if (
          vault_agent_secret_id | length > 0
          and vault_agent_secret_id_response_wrapping_path | length == 0
        )
        else (
          vault_agent_secret_id_response_wrapping_path
          if vault_agent_secret_id_response_wrapping_path | length > 0
          else vault_agent_existing_response_wrapping_path.stdout | default('')
        )
      }}
  tags: [apply]

- name: Render Vault Agent configuration
  template:
    src: vault-agent.hcl.j2
    dest: "{{ vault_agent_config_dir }}/{{ vault_agent_name }}.hcl"
    owner: root
    group: root
    mode: "0640"
  register: vault_agent_config_state
  tags: [apply]

- name: Install Vault Agent systemd unit
  template:
    src: vault-agent.service.j2
    dest: "/etc/systemd/system/vault-agent-{{ vault_agent_name }}.service"
    owner: root
    group: root
    mode: "0644"
  register: vault_agent_unit_state
  tags: [apply]

- name: Check for existing Vault AppRole role_id
  stat:
    path: "{{ vault_agent_role_id_file }}"
  register: vault_agent_existing_role_id
  tags: [apply]

- name: Check for existing Vault AppRole secret_id
  stat:
    path: "{{ vault_agent_secret_id_file }}"
  register: vault_agent_existing_secret_id
  no_log: true
  tags: [apply]

- name: Check for existing Vault Agent token sink
  stat:
    path: "{{ vault_agent_token_sink }}"
  register: vault_agent_existing_token_sink
  no_log: true
  tags: [apply]

- name: Check for existing Vault Agent rendered destinations
  stat:
    path: "{{ item.destination }}"
  loop: "{{ vault_agent_templates }}"
  loop_control:
    label: "{{ item.destination }}"
  register: vault_agent_existing_rendered_destinations
  no_log: true
  tags: [apply]

- name: Check existing Vault Agent service state
  command:
    argv:
      - systemctl
      - is-active
      - "vault-agent-{{ vault_agent_name }}.service"
  register: vault_agent_existing_service_state
  changed_when: false
  failed_when: false
  tags: [apply]

- name: Resolve Vault Agent steady-state facts
  set_fact:
    vault_agent_has_bootstrap_material: >-
      {{
        vault_agent_secret_id | length > 0
        or vault_agent_existing_secret_id.stat.exists
      }}
    vault_agent_has_running_rendered_state: >-
      {{
        vault_agent_existing_service_state.stdout == "active"
        and (vault_agent_existing_rendered_destinations.results | map(attribute='stat.exists') | min)
      }}
    vault_agent_restart_needed: >-
      {{
        vault_agent_role_id_state is changed
        or vault_agent_secret_id_state is changed
        or vault_agent_templates_state is changed
        or vault_agent_config_state is changed
        or vault_agent_unit_state is changed
      }}
  tags: [apply]

- name: Assert Vault AppRole bootstrap credentials are present
  assert:
    that:
      - vault_agent_role_id | length > 0 or vault_agent_existing_role_id.stat.exists
      - >-
        vault_agent_has_bootstrap_material | bool
        or (
          vault_agent_has_running_rendered_state | bool
          and not (vault_agent_restart_needed | bool)
        )
    fail_msg: >-
      Vault Agent {{ vault_agent_name }} needs role_id and secret_id bootstrap
      values for the first deploy or any apply that must restart Vault Agent.
      Existing active service plus rendered destinations is accepted only for
      steady-state, no-restart applies; the token sink is output state and is
      not sufficient restart bootstrap material.
  tags: [apply]

# Restart in-role (not via a handler) so vault_agent_name binds at task-execution
# time. A play may include this role more than once, and a shared/templated
# handler name would be deduped at play load and could restart the wrong instance.
- name: Enable and (re)start Vault Agent
  systemd:
    name: "vault-agent-{{ vault_agent_name }}"
    state: >-
      {{
        'restarted'
        if (vault_agent_restart_needed | bool and vault_agent_has_bootstrap_material | bool)
        else 'started'
      }}
    enabled: true
    daemon_reload: true
  when:
    - vault_agent_role_id | length > 0 or vault_agent_existing_role_id.stat.exists
    - vault_agent_has_bootstrap_material | bool or vault_agent_has_running_rendered_state | bool
  tags: [apply]

- name: Ensure Vault Agent token sink permissions
  file:
    path: "{{ vault_agent_token_sink }}"
    owner: root
    group: "{{ vault_agent_token_sink_group }}"
    mode: "{{ vault_agent_token_sink_mode }}"
  when:
    - vault_agent_token_sink_group != "root" or vault_agent_token_sink_mode != "0600"
    - vault_agent_role_id | length > 0 or vault_agent_existing_role_id.stat.exists
    - vault_agent_has_bootstrap_material | bool or vault_agent_existing_token_sink.stat.exists
  tags: [apply]
