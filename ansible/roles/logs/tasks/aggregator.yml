---
# Runs ONLY on the log VM (logs_aggregator: true). Installs Vector + Loki
# in aggregator mode. Vector comes from timberio's APT repo; Loki ships
# as a single Go binary from upstream releases (no apt package on Debian).

# --- Vector via direct .deb download from GitHub releases ---
# (timberio's apt repo no longer resolves; see vars/Debian.yml.)

- name: Download Vector .deb
  get_url:
    url: "{{ logs_vector_deb_url }}"
    dest: "/tmp/vector_{{ logs_vector_version }}.deb"
    mode: "0644"
  tags: [apply]

- name: Install Vector .deb
  apt:
    deb: "/tmp/vector_{{ logs_vector_version }}.deb"
    state: present
  tags: [apply]

# --- Loki: upstream binary release ---
# Loki isn't in Debian's apt repos. Download the prebuilt binary and
# manage it ourselves. Pin via logs_loki_version (defaulted in
# vars/Debian.yml so we can bump in one place).

- name: Ensure loki system user
  user:
    name: "{{ logs_loki_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ logs_loki_data_dir }}"
    create_home: false
  tags: [apply]

- name: Loki data + config dirs
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(logs_loki_user) }}"
    group: "{{ item.group | default(logs_loki_group) }}"
    mode: "{{ item.mode | default('0750') }}"
  loop:
    - { path: /etc/loki, owner: root, group: "{{ logs_loki_group }}", mode: "0750" }
    - { path: "{{ logs_loki_data_dir }}" }
    - { path: "{{ logs_loki_chunks_dir }}" }
    - { path: "{{ logs_loki_index_dir }}" }
    - { path: "{{ logs_loki_compactor_dir }}" }
    - { path: "{{ logs_loki_wal_dir }}" }
    - { path: "{{ logs_loki_data_dir }}/rules" }
    - { path: "{{ logs_loki_data_dir }}/rules-tmp" }
    - { path: "{{ logs_loki_data_dir }}/index_cache" }
  tags: [apply]

- name: Install unzip (needed to extract Loki release)
  apt:
    name: unzip
    state: present
  tags: [apply]

- name: Download Loki binary release
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ logs_loki_version }}/loki-linux-amd64.zip"
    dest: "/tmp/loki-{{ logs_loki_version }}.zip"
    mode: "0644"
  register: loki_download
  tags: [apply]

- name: Extract Loki binary
  unarchive:
    src: "/tmp/loki-{{ logs_loki_version }}.zip"
    dest: /usr/local/bin
    remote_src: true
    creates: "/usr/local/bin/loki-linux-amd64"
  when: loki_download is succeeded
  tags: [apply]

- name: Symlink loki-linux-amd64 → /usr/local/bin/loki
  file:
    src: /usr/local/bin/loki-linux-amd64
    dest: /usr/local/bin/loki
    state: link
    force: true
  notify: restart loki
  tags: [apply]

- name: Render Loki systemd unit
  copy:
    dest: /etc/systemd/system/loki.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Grafana Loki
      Documentation=https://grafana.com/docs/loki/
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ logs_loki_user }}
      Group={{ logs_loki_group }}
      ExecStart=/usr/local/bin/loki -config.file={{ logs_loki_config_path }}
      Restart=on-failure
      RestartSec=2
      LimitNOFILE=65536
      ReadWritePaths={{ logs_loki_data_dir }}

      [Install]
      WantedBy=multi-user.target
  notify: restart loki
  tags: [apply]

- name: Reload systemd to pick up loki.service
  systemd:
    daemon_reload: true
  tags: [apply]

# --- Configs ---

- name: Ensure Vector data dir exists
  file:
    path: "{{ logs_vector_data_dir }}"
    state: directory
    owner: "{{ logs_vector_user }}"
    group: "{{ logs_vector_group }}"
    mode: "0750"
  tags: [apply]

- name: Deploy redact.vrl (shared by aggregator)
  copy:
    src: redact.vrl
    dest: "{{ logs_vector_config_dir }}/redact.vrl"
    owner: root
    group: "{{ logs_vector_group }}"
    mode: "0644"
  notify: restart vector
  tags: [apply]

- name: Deploy Vector aggregator config
  template:
    src: vector-aggregator.toml.j2
    dest: "{{ logs_vector_config_path }}"
    owner: root
    group: "{{ logs_vector_group }}"
    mode: "0640"
  notify: restart vector
  tags: [apply]

- name: Deploy Loki config
  template:
    src: loki-config.yaml.j2
    dest: "{{ logs_loki_config_path }}"
    owner: root
    group: "{{ logs_loki_group }}"
    mode: "0640"
  notify: restart loki
  tags: [apply]

- name: Enable + start Loki
  systemd:
    name: "{{ logs_loki_service }}"
    state: started
    enabled: true
  tags: [apply]

- name: Enable + start Vector (aggregator)
  systemd:
    name: "{{ logs_vector_service }}"
    state: started
    enabled: true
  tags: [apply]
