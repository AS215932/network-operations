---
# Install + configure Vector agent on Debian/RedHat hosts. The aggregator
# host (logs_aggregator=true) is excluded by main.yml's gating so this
# file only runs on agent-mode hosts.
#
# Vector ships as a single .deb on GitHub releases — no apt repo. The
# legacy timberio.io apt host is no longer resolving (2026-05). Pin the
# version in vars/Debian.yml.

- name: Download Vector .deb (Debian)
  get_url:
    url: "{{ logs_vector_deb_url }}"
    dest: "/tmp/vector_{{ logs_vector_version }}.deb"
    mode: "0644"
  when: ansible_os_family == "Debian"
  tags: [apply]

- name: Install Vector .deb (Debian)
  apt:
    deb: "/tmp/vector_{{ logs_vector_version }}.deb"
    state: present
  when: ansible_os_family == "Debian"
  tags: [apply]

- name: Install timberio yum repo (RedHat / dom0 CentOS 7)
  yum_repository:
    name: timberio-vector
    description: Vector (timberio)
    baseurl: https://repositories.timber.io/public/vector/rpm/el/$releasever/$basearch
    gpgcheck: true
    gpgkey: https://repositories.timber.io/public/vector/gpg.3543DB2D0A2BC4B8.key
  when: ansible_os_family == "RedHat"
  tags: [apply]

- name: Install Vector (RedHat)
  package:
    name: "{{ logs_vector_pkg }}"
    state: present
  when: ansible_os_family == "RedHat"
  tags: [apply]

- name: Ensure Vector data dir exists
  file:
    path: "{{ logs_vector_data_dir }}"
    state: directory
    owner: "{{ logs_vector_user }}"
    group: "{{ logs_vector_group }}"
    mode: "0750"
  tags: [apply]

- name: Deploy Vector agent config
  template:
    src: vector-agent.toml.j2
    dest: "{{ logs_vector_config_path }}"
    owner: root
    group: "{{ logs_vector_group }}"
    mode: "0640"
  notify: restart vector
  tags: [apply]

- name: Enable + start Vector
  systemd:
    name: "{{ logs_vector_service }}"
    state: started
    enabled: true
  tags: [apply]
