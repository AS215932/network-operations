---
- name: Assert hyrule_tunnel_proxy_version is pinned to a commit SHA
  ansible.builtin.assert:
    that:
      - hyrule_tunnel_proxy_version is defined
      - hyrule_tunnel_proxy_version is match('^[0-9a-fA-F]{40}$')
    fail_msg: >-
      hyrule_tunnel_proxy_version must be a 40-character commit SHA. Production
      deploys are controlled from hyrule-infra by pinning the exact app commit.

- name: Assert required peers exist
  ansible.builtin.assert:
    that:
      - peers.netproxy.ipv6 is defined
      - peers.api.ipv6 is defined
      - peers.mon.ipv6 is defined
    fail_msg: peers.netproxy, peers.api, and peers.mon must be defined in group_vars/all.yml.

- name: Assert control API listener is not wildcard
  ansible.builtin.assert:
    that:
      - "'0.0.0.0' not in hyrule_tunnel_proxy_control_listen_addr"
      - "'[::]' not in hyrule_tunnel_proxy_control_listen_addr"
    fail_msg: >-
      The tunnel control API is the money path and must bind the internal
      netproxy address, not a wildcard. Only the SSH intake and STUN responder
      face the Internet.
