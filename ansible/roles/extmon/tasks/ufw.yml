---
# UFW is retired on extmon: the host firewall is owned by roles/firewall
# (nftables, rules in host_vars/extmon.yml + docs/network-flows.md) like the
# rest of the fleet. Two owners fought over the ruleset — the nftables config
# starts with `flush ruleset`, and a later UFW re-enable would clobber it back.
#
# Migration ordering: run `firewall.yml --tags apply --limit extmon` BEFORE
# this task disables UFW, so the nftables ruleset is already enforcing when
# UFW goes down. Idempotent afterwards (disabled stays disabled).

- name: ufw — retired in favour of roles/firewall (nftables)
  ufw:
    state: disabled
  tags: [apply]
