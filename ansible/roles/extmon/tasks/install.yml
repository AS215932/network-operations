---
# Push rendered configs onto the live VPS, place secrets, install collector
# script + systemd timer, reload each component on change.

- name: Install blackbox.yml
  template:
    src: blackbox.yml.j2
    dest: /etc/prometheus/blackbox.yml
    owner: root
    group: prometheus
    mode: "0640"
  notify: restart blackbox_exporter
  tags: [apply]

- name: Install prometheus.yml
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: root
    group: prometheus
    mode: "0640"
  notify: reload prometheus
  tags: [apply]

- name: Install Prometheus alert rules
  template:
    src: alerts.yml.j2
    dest: /etc/prometheus/alerts.yml
    owner: root
    group: prometheus
    mode: "0640"
  notify: reload prometheus
  tags: [apply]

- name: Install alertmanager.yml
  template:
    src: alertmanager.yml.j2
    dest: /etc/prometheus/alertmanager.yml
    owner: root
    group: prometheus
    mode: "0640"
  notify: reload alertmanager
  tags: [apply]

# --- node_exporter: enable textfile collector for ovh-expiry metrics ---
- name: Ensure textfile collector dir exists
  file:
    path: "{{ extmon_textfile_dir }}"
    state: directory
    owner: root
    group: prometheus
    mode: "0755"
  tags: [apply]

- name: Configure node_exporter ARGS (enable textfile collector)
  lineinfile:
    path: /etc/default/prometheus-node-exporter
    create: true
    regexp: "^ARGS="
    line: 'ARGS="--web.listen-address={{ extmon_node_exporter_listen }} --collector.systemd --collector.textfile.directory={{ extmon_textfile_dir }}"'
    owner: root
    group: root
    mode: "0644"
  notify: restart node_exporter
  tags: [apply]

# --- BGP / diagnostic agents ---
- name: Ensure extmon and BGPalerter directories exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
    recurse: "{{ item.recurse | default(false) }}"
  loop:
    - { path: /etc/extmon, mode: "0750" }
    - { path: /opt/bgpalerter, mode: "0755" }
    - { path: /etc/bgpalerter, owner: prometheus, group: prometheus, mode: "0755" }
    # No recurse: BGPalerter (User=prometheus) owns the files it writes here;
    # recursing over a runtime log dir never converges in check mode and made
    # the nightly drift run flag this task forever.
    - { path: /etc/bgpalerter/logs, owner: prometheus, group: prometheus, mode: "0755" }
    - { path: /etc/bgpalerter/alertdata, owner: prometheus, group: prometheus, mode: "0755", recurse: true }
    - { path: /etc/bgpalerter/.cache, owner: prometheus, group: prometheus, mode: "0755", recurse: true }
    - { path: /var/lib/bgpalerter, owner: prometheus, group: prometheus, mode: "0755" }
  tags: [apply]

- name: Install extmon BGP and diagnostic agents
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - { src: bgp-agent.py.j2, dest: /usr/local/bin/extmon-bgp-agent.py }
    - { src: diag-agent.py.j2, dest: /usr/local/bin/extmon-diag-agent.py }
  notify:
    - restart extmon-bgp-agent
    - restart extmon-diag-agent
  tags: [apply]

# Secret-bearing env files are only managed when the corresponding token is
# present in the controller environment. The nightly drift check runs without
# the extmon tokens; skipping (instead of diffing an empty render against the
# live 0600 file) keeps drift green while every other file is still checked.
- name: Install extmon agent env files (skipped when tokens are absent)
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0600"
  loop:
    - { src: bgp-agent.env.j2, dest: /etc/extmon/bgp-agent.env, token: "{{ extmon_bgp_ingest_token }}" }
    - { src: diag-agent.env.j2, dest: /etc/extmon/diag-agent.env, token: "{{ extmon_diag_agent_token }}" }
  when: item.token | length > 0
  no_log: true
  notify:
    - restart extmon-bgp-agent
    - restart extmon-diag-agent
  tags: [apply]

- name: Install extmon BGP and diagnostic systemd units
  template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: bgp-agent.service.j2, dest: extmon-bgp-agent.service }
    - { src: diag-agent.service.j2, dest: extmon-diag-agent.service }
  notify: reload systemd
  tags: [apply]

- name: Download pinned BGPalerter binary
  get_url:
    url: "{{ extmon_bgpalerter_url }}"
    dest: /opt/bgpalerter/bgpalerter-linux-x64
    checksum: "sha256:{{ extmon_bgpalerter_sha256 }}"
    owner: root
    group: root
    mode: "0755"
  notify: restart bgpalerter
  tags: [apply]

- name: Install BGPalerter config
  template:
    src: "{{ item.src }}"
    dest: "/etc/bgpalerter/{{ item.dest }}"
    owner: prometheus
    group: prometheus
    mode: "0644"
  loop:
    - { src: bgpalerter-config.yml.j2, dest: config.yml }
    - { src: bgpalerter-prefixes.yml.j2, dest: prefixes.yml }
  notify: restart bgpalerter
  tags: [apply]

- name: Install BGPalerter systemd unit
  template:
    src: bgpalerter.service.j2
    dest: /etc/systemd/system/bgpalerter.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  tags: [apply]

# --- OVH expiry collector (Phase C/L0b) ---
- name: Install ovh.conf for the collector
  copy:
    dest: /etc/extmon/ovh.conf
    content: |
      [default]
      endpoint={{ extmon_ovh_endpoint }}

      [ovh-eu]
      application_key={{ extmon_ovh_application_key }}
      application_secret={{ extmon_ovh_application_secret }}
      consumer_key={{ extmon_ovh_consumer_key }}
    owner: root
    group: root
    mode: "0600"
  no_log: true
  tags: [apply]

- name: Install ovh-expiry-collector.py
  template:
    src: ovh-expiry-collector.py.j2
    dest: /usr/local/bin/ovh-expiry-collector.py
    owner: root
    group: root
    mode: "0755"
  tags: [apply]

- name: Install ovh-expiry-collector.service
  template:
    src: ovh-expiry-collector.service.j2
    dest: /etc/systemd/system/ovh-expiry-collector.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  tags: [apply]

- name: Install ovh-expiry-collector.timer
  template:
    src: ovh-expiry-collector.timer.j2
    dest: /etc/systemd/system/ovh-expiry-collector.timer
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  tags: [apply]

- name: Enable + start ovh-expiry-collector.timer
  systemd:
    name: ovh-expiry-collector.timer
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]

# --- Stack services ---
- name: Enable + start node_exporter
  systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
  tags: [apply]

- name: Enable + start blackbox_exporter
  systemd:
    name: prometheus-blackbox-exporter
    state: started
    enabled: true
  tags: [apply]

- name: Enable + start alertmanager
  systemd:
    name: prometheus-alertmanager
    state: started
    enabled: true
  tags: [apply]

- name: Enable + start Routinator
  systemd:
    name: routinator
    state: started
    enabled: true
  tags: [apply]

- name: Enable + start extmon BGP/diagnostic services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - extmon-bgp-agent
    - extmon-diag-agent
    - bgpalerter
  tags: [apply]

- name: Enable + start prometheus
  systemd:
    name: prometheus
    state: started
    enabled: true
  tags: [apply]

# blackbox_exporter ICMP probes need raw sockets. The Debian package ships
# without CAP_NET_RAW; grant it via setcap so we don't need to run as root.
# Guarded command instead of the `capabilities` module: modern libcap's getcap
# prints `cap_net_raw=ep` while the module compares against `+ep`, so the
# module reports changed on every run and kept the drift check red.
- name: Check blackbox_exporter capabilities
  command: getcap /usr/bin/prometheus-blackbox-exporter
  register: extmon_blackbox_caps
  changed_when: false
  check_mode: false
  tags: [apply]

- name: Grant CAP_NET_RAW to blackbox_exporter (for ICMP)
  command: setcap cap_net_raw+ep /usr/bin/prometheus-blackbox-exporter
  when: "'cap_net_raw' not in extmon_blackbox_caps.stdout"
  notify: restart blackbox_exporter
  tags: [apply]
