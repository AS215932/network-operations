---
# Render every config to ansible/generated/extmon/ for review.
# Mirrors the render pattern in roles/firewall and roles/logs.

- name: Ensure generated dir exists
  file:
    path: "{{ playbook_dir }}/../generated/extmon"
    state: directory
    mode: "0755"
  delegate_to: localhost
  connection: local
  become: false
  run_once: true
  tags: [validate, diff, apply]

- name: Render blackbox.yml
  template:
    src: blackbox.yml.j2
    dest: "{{ playbook_dir }}/../generated/extmon/blackbox.yml"
    mode: "0644"
  delegate_to: localhost
  connection: local
  become: false
  tags: [validate, diff, apply]

- name: Render prometheus.yml
  template:
    src: prometheus.yml.j2
    dest: "{{ playbook_dir }}/../generated/extmon/prometheus.yml"
    mode: "0644"
  delegate_to: localhost
  connection: local
  become: false
  tags: [validate, diff, apply]

- name: Render alerts.yml
  template:
    src: alerts.yml.j2
    dest: "{{ playbook_dir }}/../generated/extmon/alerts.yml"
    mode: "0644"
  delegate_to: localhost
  connection: local
  become: false
  tags: [validate, diff, apply]

- name: Render alertmanager.yml
  template:
    src: alertmanager.yml.j2
    dest: "{{ playbook_dir }}/../generated/extmon/alertmanager.yml"
    mode: "0644"
  delegate_to: localhost
  connection: local
  become: false
  tags: [validate, diff, apply]

- name: Render ovh-expiry-collector.py
  template:
    src: ovh-expiry-collector.py.j2
    dest: "{{ playbook_dir }}/../generated/extmon/ovh-expiry-collector.py"
    mode: "0755"
  delegate_to: localhost
  connection: local
  become: false
  tags: [validate, diff, apply]

# NOTE: bgp-agent.env / diag-agent.env are deliberately NOT rendered here.
# They carry EXTMON_BGP_INGEST_TOKEN, the Cloudflare token, and
# EXTMON_DIAG_AGENT_TOKEN; rendering them into the git-tracked worktree would
# put bearer tokens one `git add` away from a leak. They are templated straight
# to /etc/extmon/*.env (mode 0600) by tasks/install.yml instead.
- name: Render BGP and diagnostic agent configs
  template:
    src: "{{ item.src }}"
    dest: "{{ playbook_dir }}/../generated/extmon/{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - { src: bgp-agent.py.j2, dest: extmon-bgp-agent.py, mode: "0755" }
    - { src: diag-agent.py.j2, dest: extmon-diag-agent.py, mode: "0755" }
    - { src: bgp-agent.service.j2, dest: extmon-bgp-agent.service }
    - { src: diag-agent.service.j2, dest: extmon-diag-agent.service }
    - { src: bgpalerter-config.yml.j2, dest: bgpalerter-config.yml }
    - { src: bgpalerter-prefixes.yml.j2, dest: bgpalerter-prefixes.yml }
    - { src: bgpalerter.service.j2, dest: bgpalerter.service }
  delegate_to: localhost
  connection: local
  become: false
  tags: [validate, diff, apply]
