---
- name: Apply common baseline
  include_role:
    name: base_common

- name: Update apt cache and upgrade packages
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Ensure standard utility packages are installed
  apt:
    name:
      - curl
      - git
      - at
      - vim
      - sudo
    state: present
  when: ansible_os_family == "Debian"
