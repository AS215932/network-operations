---
# Self-hosted GitHub Actions runner.
# Reference: https://docs.github.com/en/actions/hosting-your-own-runners

github_runner_apply: false

# Scope: 'org' registers the runner against the AS215932 org so any allowed
# repo can use it (controlled by github_runner_group). 'repo' registers against
# a single repo's /actions/runners API surface — the legacy mode.
github_runner_scope: org

# Org and (optional) repo name. When scope=org, github_runner_repo is unused
# for registration but kept for the fail-fast help text.
github_runner_owner: AS215932
github_runner_repo: network-operations

# Runner group on the org. Restrict allowed repos in the org settings UI
# (Settings → Actions → Runner groups → <name> → Repository access).
# Ignored when scope=repo.
github_runner_group_name: hyrule-ci

# Pinned runner version. Bump deliberately; mismatches with the GHA control
# plane cause silent registration failures. Must be recent enough that the
# runner's installdependencies.sh knows the host's libicu (Debian 13 trixie
# ships libicu76 — anything before ~2.330 only probes up to libicu72).
github_runner_version: "2.334.0"
github_runner_arch: x64
github_runner_tarball_url: >-
  https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-{{ github_runner_arch }}-{{ github_runner_version }}.tar.gz
github_runner_tarball_sha256: "048024cd2c848eb6f14d5646d56c13a4def2ae7ee3ad12122bee960c56f3d271"

github_runner_user: runner
github_runner_group: runner
github_runner_home: /var/lib/github-runner
github_runner_install_dir: "{{ github_runner_home }}/runner"
github_runner_diag_dir: "{{ github_runner_install_dir }}/_diag"
github_runner_diag_retention: 7d
github_runner_storage_enabled: false
github_runner_data_disk_device: /dev/xvdi
github_runner_data_disk_partition_number: 1
github_runner_data_disk_partition: >-
  {{ github_runner_data_disk_device }}{{ github_runner_data_disk_partition_number }}
github_runner_data_disk_fstype: ext4
github_runner_data_disk_mount_opts: defaults,nofail
github_runner_data_disk_stage_mount: /mnt/github-runner-data
github_runner_tmp_dir: "{{ github_runner_home }}/tmp"
github_runner_tmp_retention: 7d
github_runner_bootstrap_dir: "{{ github_runner_home }}/bootstrap"
github_runner_bootstrap_retention: 3d
github_runner_docker_data_root: "{{ github_runner_home }}/docker"
github_runner_docker_ipv6_enabled: false
github_runner_docker_fixed_cidr_v6: ""
github_runner_docker_dns: []
github_runner_docker_prune_enabled: true
github_runner_docker_prune_interval: daily
github_runner_docker_prune_randomized_delay: 15m
github_runner_docker_prune_until: 168h

# Labels the workflows match against. With scope=org these are shared across
# every repo in the runner group; pick a generic namespace (`hyrule`) and let
# repo isolation come from the runner group ACL, not labels.
github_runner_labels:
  - self-hosted
  - linux
  - "{{ github_runner_arch }}"
  - hyrule
  - hyrule-infra
github_runner_name: "{{ inventory_hostname }}-runner"

# Registration token must be passed in at first apply via -e or env var.
# For scope=org:
#   gh api -X POST /orgs/{owner}/actions/runners/registration-token --jq .token
# For scope=repo:
#   gh api -X POST /repos/{owner}/{repo}/actions/runners/registration-token --jq .token
# After the runner is registered the .runner / .credentials files persist
# across reboots, so this is only needed once.
github_runner_registration_token: ""

# Vault Agent secret delivery for apply.yml runs. The runner authenticates
# with its own AppRole and Vault Agent renders github_runner_secrets_env,
# which .github/workflows/apply.yml sources so ansible-playbook --tags apply
# picks up the secrets its target playbooks read from the environment.
# AppRole bootstrap: docs/runbooks/bootstrap-runner-vault.md.
github_runner_vault_enabled: true
github_runner_vault_role_id: "{{ lookup('env', 'VAULT_CI_RUNNER_ROLE_ID') | default('', true) }}"
github_runner_vault_secret_id: "{{ lookup('env', 'VAULT_CI_RUNNER_SECRET_ID') | default('', true) }}"
github_runner_secrets_env: /etc/github-runner/secrets.env
# secrets.env is read fresh by apply.yml on every job, not from the runner's
# process environment — so a secret rotation needs no runner restart (and a
# restart would kill in-flight CI jobs). Keep this a no-op.
github_runner_vault_reload_command: /bin/true

# SSH identity for the runner. apply.yml jobs SSH to the infra fleet (pre/post
# Icinga snapshots, --tags apply runs); the runner user needs its own key.
# The private half is copied from the controller path CI_KEY_PATH when set; the
# public half is distributed fleet-wide by playbooks/ci-runner-key.yml.
# known_hosts is always seeded so ansible.cfg's host_key_checking=True still
# holds for the runner during normal apply.yml runs where the key already
# exists on disk.
github_runner_ssh_key_path: "{{ lookup('env', 'CI_KEY_PATH') | default('', true) }}"
github_runner_ssh_dir: "{{ github_runner_home }}/.ssh"
github_runner_ssh_key_dest: "{{ github_runner_ssh_dir }}/id_ci"

# Toolchain installed on the runner (consumed by workflows). Kept minimal —
# workflows install role-specific deps as needed.
github_runner_packages:
  - ansible
  - ansible-lint
  - yamllint
  - shellcheck
  - docker.io
  - goss
  - python3-jsonschema
  - python3-jinja2
  - python3-yaml
  - python3-pytest
  - python3-pip
  - python3-venv
  - bind9-utils
  - nftables
  - unbound
  - golang-go
  - jq
  - git
  - parted
  - rsync
  - openssh-client
  - gh

# Heavy IaC gates. Enabled by default so the privileged `ci` runner keeps
# building the Containerlab/Batfish labs and the RFC2136 Caddy. The unprivileged
# `ci-pr` runner sets both false — it never runs labs, and dropping them keeps
# its toolchain (and attack surface) minimal.
github_runner_containerlab_enabled: true
github_runner_caddy_rfc2136_enabled: true

# Heavy IaC gates. containerlab is installed from its upstream .deb because it
# is not packaged in Debian; Caddy is built with the RFC2136 DNS provider so
# `caddy validate` can parse configs/Caddyfile.
github_runner_containerlab_version: "0.75.0"
github_runner_containerlab_deb_url: >-
  https://github.com/srl-labs/containerlab/releases/download/
  v{{ github_runner_containerlab_version }}/containerlab_
  {{ github_runner_containerlab_version }}_linux_amd64.deb
github_runner_containerlab_deb_path: >-
  {{ github_runner_bootstrap_dir }}/containerlab_{{ github_runner_containerlab_version }}_linux_amd64.deb
github_runner_containerlab_admin_group: clab_admins
github_runner_xcaddy_path: /usr/local/bin/xcaddy
github_runner_caddy_path: /usr/local/bin/caddy
github_runner_caddy_build_dir: "{{ github_runner_tmp_dir }}/caddy-build"
github_runner_caddy_go_cache: "{{ github_runner_tmp_dir }}/go-cache-caddy"
github_runner_caddy_go_path: "{{ github_runner_tmp_dir }}/go-path-caddy"
github_runner_tarball_path: >-
  {{ github_runner_bootstrap_dir }}/actions-runner-{{ github_runner_version }}.tar.gz
