---
# Self-hosted GitHub Actions runner.
# Reference: https://docs.github.com/en/actions/hosting-your-own-runners

github_runner_apply: false

# Repo this runner attaches to. The runner registers against this repo's
# /actions/runners API surface.
github_runner_owner: AS215932
github_runner_repo: network-operations

# Pinned runner version. Bump deliberately; mismatches with the GHA control
# plane cause silent registration failures. Must be recent enough that the
# runner's installdependencies.sh knows the host's libicu (Debian 13 trixie
# ships libicu76 — anything before ~2.330 only probes up to libicu72).
github_runner_version: "2.334.0"
github_runner_arch: x64
github_runner_tarball_url: >-
  https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-{{ github_runner_arch }}-{{ github_runner_version }}.tar.gz
github_runner_tarball_sha256: "048024cd2c848eb6f14d5646d56c13a4def2ae7ee3ad12122bee960c56f3d271"

github_runner_user: runner
github_runner_group: runner
github_runner_home: /var/lib/github-runner
github_runner_install_dir: "{{ github_runner_home }}/runner"

# Labels the workflows match against. The 'hyrule-infra' label scopes runs to
# this runner so other repos in the org cannot squat the pool.
github_runner_labels:
  - self-hosted
  - linux
  - "{{ github_runner_arch }}"
  - hyrule-infra
github_runner_name: "{{ inventory_hostname }}-runner"

# Registration token must be passed in at first apply via -e or env var:
#   gh api -X POST /repos/{owner}/{repo}/actions/runners/registration-token --jq .token
# After the runner is registered the .runner / .credentials files persist
# across reboots, so this is only needed once.
github_runner_registration_token: ""

# Vault Agent secret delivery for apply.yml runs. The runner authenticates
# with its own AppRole and Vault Agent renders github_runner_secrets_env,
# which .github/workflows/apply.yml sources so ansible-playbook --tags apply
# picks up the secrets its target playbooks read from the environment.
# AppRole bootstrap: docs/runbooks/bootstrap-runner-vault.md.
github_runner_vault_enabled: true
github_runner_vault_role_id: "{{ lookup('env', 'VAULT_CI_RUNNER_ROLE_ID') | default('', true) }}"
github_runner_vault_secret_id: "{{ lookup('env', 'VAULT_CI_RUNNER_SECRET_ID') | default('', true) }}"
github_runner_secrets_env: /etc/github-runner/secrets.env
# secrets.env is read fresh by apply.yml on every job, not from the runner's
# process environment — so a secret rotation needs no runner restart (and a
# restart would kill in-flight CI jobs). Keep this a no-op.
github_runner_vault_reload_command: /bin/true

# Toolchain installed on the runner (consumed by workflows). Kept minimal —
# workflows install role-specific deps as needed.
github_runner_packages:
  - ansible
  - ansible-lint
  - yamllint
  - shellcheck
  - python3-jsonschema
  - python3-jinja2
  - python3-pip
  - python3-venv
  - jq
  - git
  - rsync
  - openssh-client
  - gh
