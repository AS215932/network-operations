---
# Self-hosted GitHub Actions runner for AS215932 CI.
# First-apply needs a registration token (1 hour TTL). With github_runner_scope=org
# (default), the runner registers against the AS215932 org and any repo in the
# `github_runner_group_name` runner group can use it; with scope=repo it
# registers against owner/repo as before.
#
# Org-scope token:
#   export GH_RUNNER_TOKEN=$(gh api -X POST \
#     /orgs/{{ github_runner_owner }}/actions/runners/registration-token \
#     --jq .token)
# Repo-scope token:
#   export GH_RUNNER_TOKEN=$(gh api -X POST \
#     /repos/{{ github_runner_owner }}/{{ github_runner_repo }}/actions/runners/registration-token \
#     --jq .token)
#
#   ansible-playbook playbooks/ci.yml --tags apply \
#     -e github_runner_apply=true \
#     -e github_runner_registration_token="$GH_RUNNER_TOKEN"

- name: Ensure runner toolchain packages are installed
  apt:
    name: "{{ github_runner_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [apply]

- name: Ensure runner group exists
  group:
    name: "{{ github_runner_group }}"
    state: present
    system: true
  tags: [apply]

- name: Ensure runner data disk device exists
  stat:
    path: "{{ github_runner_data_disk_device }}"
  register: github_runner_data_disk_device_stat
  when: github_runner_storage_enabled | bool
  tags: [apply]

- name: Fail if runner data disk device is missing
  fail:
    msg: >-
      github_runner_storage_enabled is true but {{ github_runner_data_disk_device }}
      is not present on the host. Attach the 50 GiB ci runner disk first.
  when:
    - github_runner_storage_enabled | bool
    - not (github_runner_data_disk_device_stat.stat.isblk | default(false))
  tags: [apply]

- name: Ensure runner data disk staging mount exists
  file:
    path: "{{ github_runner_data_disk_stage_mount }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: github_runner_storage_enabled | bool
  tags: [apply]

- name: Ensure runner data disk partition exists
  community.general.parted:
    device: "{{ github_runner_data_disk_device }}"
    label: gpt
    number: "{{ github_runner_data_disk_partition_number }}"
    part_start: 1MiB
    part_end: 100%
    state: present
  when: github_runner_storage_enabled | bool
  tags: [apply]

- name: Ensure runner data disk filesystem exists
  community.general.filesystem:
    dev: "{{ github_runner_data_disk_partition }}"
    fstype: "{{ github_runner_data_disk_fstype }}"
    resizefs: true
  when: github_runner_storage_enabled | bool
  tags: [apply]

- name: Check current runner home mount source
  command: findmnt -n -o SOURCE --target "{{ github_runner_home }}"
  register: github_runner_home_mount_source
  changed_when: false
  failed_when: false
  check_mode: false
  when: github_runner_storage_enabled | bool
  tags: [apply]

- name: Set runner storage migration flag
  set_fact:
    github_runner_storage_migration_needed: >-
      {{ (github_runner_home_mount_source.stdout | default('') | trim)
         != github_runner_data_disk_partition }}
  when: github_runner_storage_enabled | bool
  tags: [apply]

- name: Mount runner data disk on staging path during migration
  mount:
    path: "{{ github_runner_data_disk_stage_mount }}"
    src: "{{ github_runner_data_disk_partition }}"
    fstype: "{{ github_runner_data_disk_fstype }}"
    opts: "{{ github_runner_data_disk_mount_opts }}"
    state: mounted
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
  tags: [apply]

- name: Stop runner services before data-disk migration
  systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - github-runner
    - vault-agent-github-runner
    - docker
  failed_when: false
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
  tags: [apply]

- name: Check current runner home contents before migration
  stat:
    path: "{{ github_runner_home }}"
  register: github_runner_home_stat
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
  tags: [apply]

- name: Copy existing runner data to staging disk
  command: >-
    rsync -aHAX --delete {{ github_runner_home }}/ {{ github_runner_data_disk_stage_mount }}/
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
    - github_runner_home_stat.stat.exists | default(false)
  changed_when: true
  tags: [apply]

- name: Check current Docker data root before migration
  stat:
    path: /var/lib/docker
  register: github_runner_root_docker_stat
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
  tags: [apply]

- name: Copy existing Docker data to staging disk
  command: >-
    rsync -aHAX --delete /var/lib/docker/ {{ github_runner_data_disk_stage_mount }}/docker/
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
    - github_runner_root_docker_stat.stat.exists | default(false)
  changed_when: true
  tags: [apply]

- name: Unmount runner data disk staging path after migration copy
  mount:
    path: "{{ github_runner_data_disk_stage_mount }}"
    state: unmounted
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
  tags: [apply]

- name: Remove old runner home before mounting data disk
  file:
    path: "{{ github_runner_home }}"
    state: absent
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
  tags: [apply]

- name: Ensure runner home mountpoint exists
  file:
    path: "{{ github_runner_home }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
  tags: [apply]

- name: Mount runner data disk at runner home
  mount:
    path: "{{ github_runner_home }}"
    src: "{{ github_runner_data_disk_partition }}"
    fstype: "{{ github_runner_data_disk_fstype }}"
    opts: "{{ github_runner_data_disk_mount_opts }}"
    state: mounted
  when: github_runner_storage_enabled | bool
  tags: [apply]

- name: Remove legacy root-disk Docker data after migration
  file:
    path: /var/lib/docker
    state: absent
  when:
    - github_runner_storage_enabled | bool
    - github_runner_storage_migration_needed | default(false)
    - github_runner_root_docker_stat.stat.exists | default(false)
  tags: [apply]

- name: Ensure runner user exists
  user:
    name: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    home: "{{ github_runner_home }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  tags: [apply]

- name: Ensure runner home exists on the mounted filesystem
  file:
    path: "{{ github_runner_home }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0750"
  tags: [apply]

- name: Ensure runner auxiliary directories exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ github_runner_bootstrap_dir }}", owner: root, group: root, mode: "0755" }
    - { path: "{{ github_runner_tmp_dir }}", owner: root, group: root, mode: "1777" }
    - { path: "{{ github_runner_docker_data_root }}", owner: root, group: root, mode: "0710" }
  tags: [apply]

- name: Install Docker daemon config for runner data disk
  template:
    src: docker-daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: restart docker
  tags: [apply]

- name: Enable IPv6 forwarding for Docker routed subnet
  sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_file: /etc/sysctl.d/99-github-runner-docker.conf
    state: present
    reload: true
  when: github_runner_docker_ipv6_enabled | bool
  notify: restart docker
  tags: [apply]

- name: Ensure runner is in docker group
  user:
    name: "{{ github_runner_user }}"
    groups: docker
    append: true
  tags: [apply]

- name: Enable and start Docker for Containerlab/Batfish gates
  systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]

- name: Ensure sbin validators are visible in runner PATH
  file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: /usr/sbin/nft, dest: /usr/local/bin/nft }
    - { src: /usr/sbin/unbound-checkconf, dest: /usr/local/bin/unbound-checkconf }
  tags: [apply]

- name: Check whether containerlab is installed
  command: containerlab version
  register: github_runner_containerlab_check
  changed_when: false
  failed_when: false
  when: github_runner_containerlab_enabled | bool
  tags: [apply]

- name: Download containerlab package
  get_url:
    url: "{{ github_runner_containerlab_deb_url }}"
    dest: "{{ github_runner_containerlab_deb_path }}"
    owner: root
    group: root
    mode: "0644"
  when:
    - github_runner_containerlab_enabled | bool
    - github_runner_containerlab_check.rc | default(1) != 0
  tags: [apply]

- name: Install containerlab package
  apt:
    deb: "{{ github_runner_containerlab_deb_path }}"
  when:
    - github_runner_containerlab_enabled | bool
    - github_runner_containerlab_check.rc | default(1) != 0
  tags: [apply]

- name: Ensure runner is in containerlab admin group
  user:
    name: "{{ github_runner_user }}"
    groups: "{{ github_runner_containerlab_admin_group }}"
    append: true
  when: github_runner_containerlab_enabled | bool
  tags: [apply]

# containerlab needs root to create netns/veth; the runner runs unprivileged
# (User=runner). Scope a passwordless sudo to exactly the containerlab binary so
# the containerlab-frr CI gate can `sudo containerlab` (network-operations#143).
- name: Allow the runner passwordless sudo for containerlab
  copy:
    content: "{{ github_runner_user }} ALL=(root) NOPASSWD: {{ github_runner_containerlab_bin }}\n"
    dest: /etc/sudoers.d/github-runner-containerlab
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  when: github_runner_containerlab_enabled | bool
  tags: [apply]

- name: Install xcaddy builder
  command: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
  environment:
    GOBIN: "{{ github_runner_xcaddy_path | dirname }}"
  args:
    creates: "{{ github_runner_xcaddy_path }}"
  when: github_runner_caddy_rfc2136_enabled | bool
  tags: [apply]

- name: Check whether Caddy has RFC2136 DNS provider
  shell: >-
    {{ github_runner_caddy_path }} list-modules 2>/dev/null |
    grep -qx dns.providers.rfc2136
  register: github_runner_caddy_rfc2136_check
  changed_when: false
  failed_when: false
  when: github_runner_caddy_rfc2136_enabled | bool
  tags: [apply]

- name: Ensure Caddy build directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ github_runner_caddy_build_dir }}"
    - "{{ github_runner_caddy_go_cache }}"
    - "{{ github_runner_caddy_go_path }}"
  when:
    - github_runner_caddy_rfc2136_enabled | bool
    - github_runner_caddy_rfc2136_check.rc | default(1) != 0
  tags: [apply]

- name: Build Caddy with RFC2136 DNS provider
  command: >-
    {{ github_runner_xcaddy_path }} build
    --output {{ github_runner_caddy_path }}
    --with github.com/caddy-dns/rfc2136
  environment:
    TMPDIR: "{{ github_runner_caddy_build_dir }}"
    GOCACHE: "{{ github_runner_caddy_go_cache }}"
    GOPATH: "{{ github_runner_caddy_go_path }}"
  when:
    - github_runner_caddy_rfc2136_enabled | bool
    - github_runner_caddy_rfc2136_check.rc | default(1) != 0
  tags: [apply]

- name: Ensure custom Caddy binary is executable
  file:
    path: "{{ github_runner_caddy_path }}"
    owner: root
    group: root
    mode: "0755"
  when:
    - github_runner_caddy_rfc2136_enabled | bool
    - github_runner_caddy_rfc2136_check.rc | default(1) != 0
  tags: [apply]

- name: Ensure runner install directory exists
  file:
    path: "{{ github_runner_install_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0750"
  tags: [apply]

- name: Ensure runner diagnostics directory exists
  file:
    path: "{{ github_runner_diag_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0750"
  tags: [apply]

- name: Ensure runner .ssh directory exists
  file:
    path: "{{ github_runner_ssh_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0700"
  tags: [apply]

- name: Install runner SSH keypair
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: "{{ github_runner_ssh_key_path }}", dest: "{{ github_runner_ssh_key_dest }}", mode: "0600" }
    - { src: "{{ github_runner_ssh_key_path }}.pub", dest: "{{ github_runner_ssh_key_dest }}.pub", mode: "0644" }
  loop_control:
    label: "{{ item.dest }}"
  when: github_runner_ssh_key_path | length > 0
  tags: [apply]

# Seed known_hosts so ansible.cfg's host_key_checking=True holds for the
# runner without a manual ssh-keyscan on every fresh host.
- name: Seed runner known_hosts with the infra fleet host keys
  shell:
    cmd: |
      set -euo pipefail
      tmp="$(mktemp)"
      {% set ns = namespace(targets=[]) %}
      {% for host in groups['all'] | default([]) %}
      {% set target = hostvars[host].ansible_host | default(host) %}
      {% if target not in ['0.0.0.0', '::'] %}
      {% set _ = ns.targets.append(target) %}
      {% endif %}
      {% endfor %}
      {% for p in peers.values() %}
      {% for attr in ['ipv6', 'loopback', 'underlay'] %}
      {% if p[attr] is defined and p[attr] not in ['0.0.0.0', '::'] %}
      {% set _ = ns.targets.append(p[attr]) %}
      {% endif %}
      {% endfor %}
      {% endfor %}
      {% for target in ns.targets | unique %}
      ssh-keyscan -T 5 {{ target | quote }} >> "$tmp" 2>/dev/null || true
      {% endfor %}
      sort -u "$tmp" > {{ github_runner_ssh_dir }}/known_hosts
      rm -f "$tmp"
      test -s {{ github_runner_ssh_dir }}/known_hosts
    executable: /bin/bash
  changed_when: true
  tags: [apply]

- name: Fix runner known_hosts ownership
  file:
    path: "{{ github_runner_ssh_dir }}/known_hosts"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0644"
  tags: [apply]

- name: Check whether runner is already installed
  stat:
    path: "{{ github_runner_install_dir }}/config.sh"
  register: github_runner_installed
  tags: [apply]

- name: Download runner tarball
  get_url:
    url: "{{ github_runner_tarball_url }}"
    dest: "{{ github_runner_tarball_path }}"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0644"
    checksum: "{{ ('sha256:' + github_runner_tarball_sha256) if github_runner_tarball_sha256 else omit }}"
  when: not github_runner_installed.stat.exists
  tags: [apply]

- name: Extract runner tarball
  unarchive:
    src: "{{ github_runner_tarball_path }}"
    dest: "{{ github_runner_install_dir }}"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    remote_src: true
  when: not github_runner_installed.stat.exists
  tags: [apply]

- name: Check whether runner is already registered
  stat:
    path: "{{ github_runner_install_dir }}/.runner"
  register: github_runner_registered
  tags: [apply]

# The runner ships a .NET Core 6.0 payload that needs libicu et al.; config.sh
# refuses to run without them. The runner's own script knows the exact set.
# Gated on "not registered" rather than "not installed" so a host that
# extracted the tarball but failed registration still gets its deps on re-run.
# installdependencies.sh is apt-idempotent.
- name: Install runner .NET dependencies
  command: ./bin/installdependencies.sh
  args:
    chdir: "{{ github_runner_install_dir }}"
  when: not github_runner_registered.stat.exists
  changed_when: true
  tags: [apply]

- name: Fail fast if registration token missing on first run
  fail:
    msg: |
      github_runner_registration_token is empty and the runner is not yet registered.
      {% if github_runner_scope == 'org' %}
      Run: gh api -X POST /orgs/{{ github_runner_owner }}/actions/runners/registration-token --jq .token
      {% else %}
      Run: gh api -X POST /repos/{{ github_runner_owner }}/{{ github_runner_repo }}/actions/runners/registration-token --jq .token
      {% endif %}
      Then re-apply with -e github_runner_registration_token=<token>.
  when:
    - not github_runner_registered.stat.exists
    - github_runner_registration_token | length == 0
  tags: [apply]

- name: Register runner
  command: >-
    ./config.sh
    --unattended
    --replace
    --url https://github.com/{{ github_runner_owner }}{% if github_runner_scope == 'repo' %}/{{ github_runner_repo }}{% endif %}
    --token {{ github_runner_registration_token }}
    --name {{ github_runner_name }}
    --labels {{ github_runner_labels | join(',') }}
    {% if github_runner_scope == 'org' %}--runnergroup {{ github_runner_group_name }}{% endif %}
    --work _work
  args:
    chdir: "{{ github_runner_install_dir }}"
  become: true
  become_user: "{{ github_runner_user }}"
  when:
    - not github_runner_registered.stat.exists
    - github_runner_registration_token | length > 0
  no_log: true
  tags: [apply]

- name: Install systemd unit
  template:
    src: github-runner.service.j2
    dest: /etc/systemd/system/github-runner.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart github-runner
  tags: [apply]

- name: Install Docker prune service
  template:
    src: github-runner-docker-prune.service.j2
    dest: /etc/systemd/system/github-runner-docker-prune.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  when: github_runner_docker_prune_enabled | bool
  tags: [apply]

- name: Install Docker prune timer
  template:
    src: github-runner-docker-prune.timer.j2
    dest: /etc/systemd/system/github-runner-docker-prune.timer
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  when: github_runner_docker_prune_enabled | bool
  tags: [apply]

- name: Enable Docker prune timer
  systemd:
    name: github-runner-docker-prune.timer
    state: started
    enabled: true
    daemon_reload: true
  when: github_runner_docker_prune_enabled | bool
  tags: [apply]

- name: Install tmpfiles policy for runner diagnostics retention
  template:
    src: github-runner-diag.tmpfiles.j2
    dest: /etc/tmpfiles.d/github-runner-diag.conf
    owner: root
    group: root
    mode: "0644"
  tags: [apply]

- name: Ensure systemd tmpfiles cleanup timer is enabled
  systemd:
    name: systemd-tmpfiles-clean.timer
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]

- name: Apply runner diagnostics retention policy
  command: systemd-tmpfiles --clean /etc/tmpfiles.d/github-runner-diag.conf
  changed_when: false
  tags: [apply]

- name: Enable and start runner
  systemd:
    name: github-runner
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]

# Vault Agent renders /etc/github-runner/secrets.env so apply.yml can source
# the secrets its target playbooks expect in the environment. The generic
# vault_agent role drives this; we hand it the runner's own AppRole, template,
# and config dir. First apply needs VAULT_CI_RUNNER_ROLE_ID / _SECRET_ID set
# (see docs/runbooks/bootstrap-runner-vault.md); afterwards the AppRole files
# on the host persist and re-applies converge without them.
- name: Set up Vault Agent for runner secret delivery
  include_role:
    name: vault_agent
  vars:
    vault_agent_name: github-runner
    vault_agent_role_id: "{{ github_runner_vault_role_id }}"
    vault_agent_secret_id: "{{ github_runner_vault_secret_id }}"
    vault_agent_templates:
      - src: github-runner.env.ctmpl.j2
        name: github-runner.env.ctmpl
        destination: "{{ github_runner_secrets_env }}"
        group: "{{ github_runner_group }}"
        reload_command: "{{ github_runner_vault_reload_command }}"
    vault_agent_extra_dirs:
      - path: "{{ github_runner_secrets_env | dirname }}"
        group: "{{ github_runner_group }}"
        mode: "0750"
  when: github_runner_vault_enabled | bool
  tags: [apply]
