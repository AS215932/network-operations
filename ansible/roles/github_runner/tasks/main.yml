---
# Self-hosted GitHub Actions runner for AS215932 CI.
# First-apply needs a registration token (1 hour TTL). With github_runner_scope=org
# (default), the runner registers against the AS215932 org and any repo in the
# `github_runner_group_name` runner group can use it; with scope=repo it
# registers against owner/repo as before.
#
# Org-scope token:
#   export GH_RUNNER_TOKEN=$(gh api -X POST \
#     /orgs/{{ github_runner_owner }}/actions/runners/registration-token \
#     --jq .token)
# Repo-scope token:
#   export GH_RUNNER_TOKEN=$(gh api -X POST \
#     /repos/{{ github_runner_owner }}/{{ github_runner_repo }}/actions/runners/registration-token \
#     --jq .token)
#
#   ansible-playbook playbooks/ci.yml --tags apply \
#     -e github_runner_apply=true \
#     -e github_runner_registration_token="$GH_RUNNER_TOKEN"

- name: Ensure runner toolchain packages are installed
  apt:
    name: "{{ github_runner_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [apply]

- name: Ensure runner group exists
  group:
    name: "{{ github_runner_group }}"
    state: present
    system: true
  tags: [apply]

- name: Ensure runner user exists
  user:
    name: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    home: "{{ github_runner_home }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: true
  tags: [apply]

- name: Ensure runner install directory exists
  file:
    path: "{{ github_runner_install_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0750"
  tags: [apply]

- name: Ensure runner diagnostics directory exists
  file:
    path: "{{ github_runner_diag_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0750"
  tags: [apply]

- name: Ensure runner .ssh directory exists
  file:
    path: "{{ github_runner_ssh_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0700"
  tags: [apply]

- name: Install runner SSH keypair
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: "{{ github_runner_ssh_key_path }}", dest: "{{ github_runner_ssh_key_dest }}", mode: "0600" }
    - { src: "{{ github_runner_ssh_key_path }}.pub", dest: "{{ github_runner_ssh_key_dest }}.pub", mode: "0644" }
  loop_control:
    label: "{{ item.dest }}"
  when: github_runner_ssh_key_path | length > 0
  tags: [apply]

# Seed known_hosts so ansible.cfg's host_key_checking=True holds for the
# runner without a manual ssh-keyscan on every fresh host.
- name: Seed runner known_hosts with the infra fleet host keys
  shell:
    cmd: >-
      ssh-keyscan -T 5 -6
      {% for name, p in peers.items() if p.ipv6 is defined and p.ipv6 != '::' %}{{ p.ipv6 }} {% endfor %}
      > {{ github_runner_ssh_dir }}/known_hosts 2>/dev/null
  changed_when: true
  when: github_runner_ssh_key_path | length > 0
  tags: [apply]

- name: Fix runner known_hosts ownership
  file:
    path: "{{ github_runner_ssh_dir }}/known_hosts"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0644"
  when: github_runner_ssh_key_path | length > 0
  tags: [apply]

- name: Check whether runner is already installed
  stat:
    path: "{{ github_runner_install_dir }}/config.sh"
  register: github_runner_installed
  tags: [apply]

- name: Download runner tarball
  get_url:
    url: "{{ github_runner_tarball_url }}"
    dest: "/tmp/actions-runner-{{ github_runner_version }}.tar.gz"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0644"
    checksum: "{{ ('sha256:' + github_runner_tarball_sha256) if github_runner_tarball_sha256 else omit }}"
  when: not github_runner_installed.stat.exists
  tags: [apply]

- name: Extract runner tarball
  unarchive:
    src: "/tmp/actions-runner-{{ github_runner_version }}.tar.gz"
    dest: "{{ github_runner_install_dir }}"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    remote_src: true
  when: not github_runner_installed.stat.exists
  tags: [apply]

- name: Check whether runner is already registered
  stat:
    path: "{{ github_runner_install_dir }}/.runner"
  register: github_runner_registered
  tags: [apply]

# The runner ships a .NET Core 6.0 payload that needs libicu et al.; config.sh
# refuses to run without them. The runner's own script knows the exact set.
# Gated on "not registered" rather than "not installed" so a host that
# extracted the tarball but failed registration still gets its deps on re-run.
# installdependencies.sh is apt-idempotent.
- name: Install runner .NET dependencies
  command: ./bin/installdependencies.sh
  args:
    chdir: "{{ github_runner_install_dir }}"
  when: not github_runner_registered.stat.exists
  changed_when: true
  tags: [apply]

- name: Fail fast if registration token missing on first run
  fail:
    msg: |
      github_runner_registration_token is empty and the runner is not yet registered.
      {% if github_runner_scope == 'org' %}
      Run: gh api -X POST /orgs/{{ github_runner_owner }}/actions/runners/registration-token --jq .token
      {% else %}
      Run: gh api -X POST /repos/{{ github_runner_owner }}/{{ github_runner_repo }}/actions/runners/registration-token --jq .token
      {% endif %}
      Then re-apply with -e github_runner_registration_token=<token>.
  when:
    - not github_runner_registered.stat.exists
    - github_runner_registration_token | length == 0
  tags: [apply]

- name: Register runner
  command: >-
    ./config.sh
    --unattended
    --replace
    --url https://github.com/{{ github_runner_owner }}{% if github_runner_scope == 'repo' %}/{{ github_runner_repo }}{% endif %}
    --token {{ github_runner_registration_token }}
    --name {{ github_runner_name }}
    --labels {{ github_runner_labels | join(',') }}
    {% if github_runner_scope == 'org' %}--runnergroup {{ github_runner_group_name }}{% endif %}
    --work _work
  args:
    chdir: "{{ github_runner_install_dir }}"
  become: true
  become_user: "{{ github_runner_user }}"
  when:
    - not github_runner_registered.stat.exists
    - github_runner_registration_token | length > 0
  no_log: true
  tags: [apply]

- name: Install systemd unit
  template:
    src: github-runner.service.j2
    dest: /etc/systemd/system/github-runner.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart github-runner
  tags: [apply]

- name: Install tmpfiles policy for runner diagnostics retention
  template:
    src: github-runner-diag.tmpfiles.j2
    dest: /etc/tmpfiles.d/github-runner-diag.conf
    owner: root
    group: root
    mode: "0644"
  tags: [apply]

- name: Ensure systemd tmpfiles cleanup timer is enabled
  systemd:
    name: systemd-tmpfiles-clean.timer
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]

- name: Apply runner diagnostics retention policy
  command: systemd-tmpfiles --clean /etc/tmpfiles.d/github-runner-diag.conf
  changed_when: false
  tags: [apply]

- name: Enable and start runner
  systemd:
    name: github-runner
    state: started
    enabled: true
    daemon_reload: true
  tags: [apply]

# Vault Agent renders /etc/github-runner/secrets.env so apply.yml can source
# the secrets its target playbooks expect in the environment. The generic
# vault_agent role drives this; we hand it the runner's own AppRole, template,
# and config dir. First apply needs VAULT_CI_RUNNER_ROLE_ID / _SECRET_ID set
# (see docs/runbooks/bootstrap-runner-vault.md); afterwards the AppRole files
# on the host persist and re-applies converge without them.
- name: Set up Vault Agent for runner secret delivery
  include_role:
    name: vault_agent
  vars:
    vault_agent_name: github-runner
    vault_agent_role_id: "{{ github_runner_vault_role_id }}"
    vault_agent_secret_id: "{{ github_runner_vault_secret_id }}"
    vault_agent_templates:
      - src: github-runner.env.ctmpl.j2
        name: github-runner.env.ctmpl
        destination: "{{ github_runner_secrets_env }}"
        group: "{{ github_runner_group }}"
        reload_command: "{{ github_runner_vault_reload_command }}"
    vault_agent_extra_dirs:
      - path: "{{ github_runner_secrets_env | dirname }}"
        group: "{{ github_runner_group }}"
        mode: "0750"
  when: github_runner_vault_enabled | bool
  tags: [apply]
