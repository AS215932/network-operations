---
# Pre/post Icinga snapshot — captures the current HARD-state problem list from
# mon and writes it to the controller's ansible/generated/snapshots/<phase>/ so
# the apply.yml "Capture snapshot diff" step can compare pre vs post and surface
# regressions the rollout introduced.
#
# The helper (/usr/local/bin/icinga-snapshot) and its API creds are deployed by
# the icinga2 role. CI/apply can also pass ICINGA_API_USER/ICINGA_API_PASSWORD
# from the trusted runner environment; this keeps app deploy snapshots working
# even if mon's helper env file has not been rendered yet. See
# network-operations#149 and #311.
#
# Connects as mon's inventory user (svag from the workstation, ci from the
# runner) and escalates with sudo — never a hardcoded root login.

- name: "Capture {{ snapshot_phase }}-deploy Icinga problem state on mon"
  delegate_to: mon
  become: "{{ not ansible_check_mode }}"
  environment:
    ICINGA_API_USER: "{{ lookup('ansible.builtin.env', 'ICINGA_API_USER') | default('', true) }}"
    ICINGA_API_PASS: "{{ lookup('ansible.builtin.env', 'ICINGA_API_PASSWORD') | default('', true) }}"
  shell: |
    set -eu

    if [ -x /usr/local/bin/icinga-snapshot ] && [ -r /etc/icinga2/scripts/.icinga-snapshot.env ]; then
      /usr/local/bin/icinga-snapshot
      exit 0
    fi

    if [ ! -x /usr/local/bin/icinga-snapshot ]; then
      echo "icinga-snapshot: /usr/local/bin/icinga-snapshot not present yet" >&2
      exit 2
    fi

    : "${ICINGA_API_URL:=https://localhost:5665}"
    : "${ICINGA_API_USER:?ICINGA_API_USER unset and /etc/icinga2/scripts/.icinga-snapshot.env missing}"
    : "${ICINGA_API_PASS:?ICINGA_API_PASS unset and /etc/icinga2/scripts/.icinga-snapshot.env missing}"

    if ! command -v jq >/dev/null 2>&1; then
      echo "icinga-snapshot: jq not installed" >&2
      exit 2
    fi

    curl -fsS -k \
      -u "${ICINGA_API_USER}:${ICINGA_API_PASS}" \
      -H 'Accept: application/json' \
      -H 'X-HTTP-Method-Override: GET' \
      -d '{"filter":"service.state!=0 && service.state_type==1","attrs":["state"],"joins":["host.name"]}' \
      "${ICINGA_API_URL}/v1/objects/services" \
      | jq -r '.results[]? | "\(.name)\tstate=\(.attrs.state)"' \
      | sort
  args:
    executable: /bin/bash
  register: _icinga_snapshot
  changed_when: false
  failed_when: (snapshot_required | default(false) | bool) and _icinga_snapshot.rc != 0
  tags: [snapshot]

- name: "Ensure {{ snapshot_phase }} snapshot directory exists on the controller"
  delegate_to: localhost
  connection: local
  become: false
  file:
    path: "{{ playbook_dir }}/../generated/snapshots/{{ snapshot_phase }}"
    state: directory
    mode: "0755"
  changed_when: false
  tags: [snapshot]

- name: "Write {{ snapshot_phase }} snapshot to the controller for diffing"
  delegate_to: localhost
  connection: local
  become: false
  copy:
    content: |
      # icinga {{ snapshot_phase }}-deploy snapshot — HARD-state service problems
      {% if _icinga_snapshot.rc | default(0) != 0 %}
      # snapshot capture failed rc={{ _icinga_snapshot.rc | default('unknown') }}
      # stderr: {{ _icinga_snapshot.stderr | default('') }}
      {% endif %}
      {{ _icinga_snapshot.stdout | default('') }}
    dest: "{{ playbook_dir }}/../generated/snapshots/{{ snapshot_phase }}/icinga.txt"
    mode: "0644"
  changed_when: false
  failed_when: (snapshot_required | default(false) | bool) and _icinga_snapshot.rc != 0
  tags: [snapshot]
