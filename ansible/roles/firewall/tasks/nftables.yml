---
- name: Stage nat64-vrf-leak unit to controller (review artifact)
  delegate_to: localhost
  become: false
  copy:
    src: "{{ playbook_dir }}/../../configs/rtr/jool/nat64-vrf-leak.service"
    dest: "{{ firewall_generated_dir }}/{{ inventory_hostname }}/nat64-vrf-leak.service"
    mode: "0644"
  when: inventory_hostname == "rtr"
  tags: [validate, diff, apply]

- name: Install nat64-vrf-leak unit on rtr
  copy:
    src: "{{ playbook_dir }}/../../configs/rtr/jool/nat64-vrf-leak.service"
    dest: /etc/systemd/system/nat64-vrf-leak.service
    mode: "0644"
  when:
    - inventory_hostname == "rtr"
    - firewall_apply | default(false) | bool
  notify: reload nftables
  tags: [apply]

- name: Enable nat64-vrf-leak unit on rtr
  systemd:
    name: nat64-vrf-leak
    enabled: true
    daemon_reload: true
  when:
    - inventory_hostname == "rtr"
    - firewall_apply | default(false) | bool
  tags: [apply]

- name: Render nftables config to controller (review artifact)
  delegate_to: localhost
  become: false
  template:
    src: "{{ 'nftables-rtr.conf.j2' if inventory_hostname == 'rtr' else 'nftables.conf.j2' }}"
    dest: "{{ firewall_generated_dir }}/{{ inventory_hostname }}/nftables.conf"
    mode: "0644"
  tags: [validate, diff, apply]

- name: Render nftables config to host (staging path)
  template:
    src: "{{ 'nftables-rtr.conf.j2' if inventory_hostname == 'rtr' else 'nftables.conf.j2' }}"
    dest: "{{ firewall_conf_path }}.new"
    mode: "0644"
  when: firewall_apply | default(false) | bool
  tags: [apply]

- name: Syntax check rendered nftables config
  command: "{{ firewall_validate_cmd }} {{ firewall_conf_path }}.new"
  changed_when: false
  when:
    - firewall_apply | default(false) | bool
    - not ansible_check_mode
  tags: [apply]

# The watchdog restores {{ firewall_backup_path }} with `nft -f`. On hosts
# that never had a config, synthesize it from the live ruleset instead —
# prefixed with `flush ruleset` (which `nft list ruleset` omits but every
# rendered config carries) so the restore replaces rather than merges.
- name: Backup currently-loaded ruleset before swap
  shell: |
    set -e
    nft list ruleset > {{ firewall_backup_path }}.live || true
    if [ -f {{ firewall_conf_path }} ]; then
      cp {{ firewall_conf_path }} {{ firewall_backup_path }}
    else
      { echo "flush ruleset"; cat {{ firewall_backup_path }}.live; } > {{ firewall_backup_path }}
    fi
  changed_when: false
  when:
    - firewall_apply | default(false) | bool
    - not ansible_check_mode
  tags: [apply]

- name: Schedule rollback watchdog (3 min) — cancels on success
  shell: |
    echo 'nft -f {{ firewall_backup_path }} 2>&1 | logger -t firewall-rollback' \
      | at now + 3 minutes 2>&1 | awk '/job/ {print $2}'
  register: _firewall_at_job
  changed_when: false
  when:
    - firewall_apply | default(false) | bool
    - not ansible_check_mode
  tags: [apply]

- name: Move new config into place
  copy:
    src: "{{ firewall_conf_path }}.new"
    dest: "{{ firewall_conf_path }}"
    remote_src: true
    mode: "0644"
  when:
    - firewall_apply | default(false) | bool
    - not ansible_check_mode
  notify: reload nftables
  tags: [apply]

# First-time hosts have nftables.service inactive (never started), and the
# reload handler's `systemctl reload` fails on inactive units. Starting here
# loads the config just moved into place; on already-active hosts this is a
# no-op (started != restarted). Enabling keeps the ruleset across reboots.
# Notify on change: starting the unit loads the ruleset even when the copy
# above didn't change the file, and on rtr the handler chain (validate →
# reload → jool → nat64-vrf-leak) must run whenever the ruleset is reloaded.
- name: Ensure nftables service is enabled and active
  systemd:
    name: nftables
    enabled: true
    state: started
  when: firewall_apply | default(false) | bool
  notify: reload nftables
  tags: [apply]

- name: Flush handlers now (so watchdog cancellation reflects current state)
  meta: flush_handlers
  when: not ansible_check_mode
  tags: [apply]

- name: Cancel rollback watchdog
  command: "atrm {{ _firewall_at_job.stdout }}"
  changed_when: false
  when:
    - firewall_apply | default(false) | bool
    - not ansible_check_mode
    - _firewall_at_job.stdout | default('') | length > 0
  tags: [apply]
