---
- name: validate nftables
  command: "nft -c -f {{ firewall_conf_path }}"
  changed_when: false
  listen: reload nftables

- name: reload nftables
  systemd:
    name: nftables
    state: reloaded
  listen: reload nftables

- name: restart jool
  systemd:
    name: jool
    state: restarted
    no_block: false
  when: inventory_hostname == 'rtr'
  listen: reload nftables

# Keep this handler after the synchronous Jool restart. Jool service restarts
# stop nat64-vrf-leak because the unit is ordered Before=jool.service; restoring
# the leak last reinstalls return-routing rules for overlay clients.
- name: restart nat64-vrf-leak after jool
  systemd:
    name: nat64-vrf-leak
    state: restarted
    no_block: false
  when: inventory_hostname == 'rtr'
  listen: reload nftables

- name: validate pf
  command: "pfctl -nf {{ firewall_conf_path }}"
  changed_when: false
  listen: reload pf

- name: reload pf
  command: "pfctl -f {{ firewall_conf_path }}"
  changed_when: false
  listen: reload pf

# Table-only reload — atomic, doesn't touch other rules. Used when the
# bogon list changes but the ruleset shape hasn't. Both v4 and v6 tables
# get one handler each so a change to only one doesn't reload both.
- name: reload pf bogons6
  command: "pfctl -t bogons6 -T replace -f /etc/pf.bogons6"
  changed_when: false
  listen: reload pf bogons6

- name: reload pf bogons4
  command: "pfctl -t bogons4 -T replace -f /etc/pf.bogons4"
  changed_when: false
  listen: reload pf bogons4
