# /etc/knot/knot.conf — managed by ansible/roles/knot.
# Host:  dns
# Role:  primary
#
# Do not edit manually — changes will be overwritten on next deploy.

server:
  listen: [ ::@53, 0.0.0.0@53 ]
  rundir: "/run/knot"
  user: knot:knot

log:
  - target: syslog
    any: info

database:
  storage: "/var/lib/knot"

# TSIG key shared between primary (dns) and all secondaries. Name MUST be
# "hyrule-dns" — hardcoded in hyrule_cloud/providers/dns.py.
key:
  - id: hyrule-dns
    algorithm: hmac-sha256
    secret: "vLFkcfnJZux1BQuoaavvrwNS97vyhomvN6NEle92qG8="

# --- Primary: notifies + serves AXFR to secondaries -----------------------
remote:
  - id: ns2
    address: [ 2001:41d0:304:300::7bfb, 54.38.14.218 ]
    key: hyrule-dns

acl:
  # RFC 2136 dynamic updates from authorized clients (TSIG-authed).
  - id: api-update
    address: 2a0c:b641:b50:2::20
    key: hyrule-dns
    action: update

  - id: caddy-update
    address: 2a0c:b641:b50:2::40
    key: hyrule-dns
    action: update

  - id: irc-update
    address: 2a0c:b641:b50:2::80
    key: hyrule-dns
    action: update

  - id: ns2-xfr
    address: [ 2001:41d0:304:300::7bfb, 54.38.14.218 ]
    key: hyrule-dns
    action: transfer

  # AXFR from the ops home network (no TSIG — IP-based for ad-hoc dig +axfr).
  - id: home-xfr
    address: [ 77.166.211.126/32, 2a02:a442:1016::/48 ]
    action: transfer

template:
  - id: default
    storage: "/var/lib/knot/zones"
    file: "%s.zone"
    journal-content: all
    zonefile-load: difference-no-serial
    notify: [ ns2 ]

zone:
  - domain: servify.network
    acl: [ api-update, caddy-update, irc-update, home-xfr, ns2-xfr ]
    template: default
  - domain: as215932.net
    acl: [ api-update, caddy-update, irc-update, home-xfr, ns2-xfr ]
    template: default
  - domain: 0.5.b.0.1.4.6.b.c.0.a.2.ip6.arpa
    acl: [ api-update, caddy-update, irc-update, home-xfr, ns2-xfr ]
    template: default

