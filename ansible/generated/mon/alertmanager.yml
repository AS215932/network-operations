# /etc/prometheus/alertmanager.yml — mon VM (2a0c:b641:b50:2::50)
# Alertmanager binds 127.0.0.1:9093 (local-only). Outbound webhook to noc-agent.

global:
  resolve_timeout: 5m

route:
  receiver: noc-agent
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: noc-agent
    webhook_configs:
      - url: http://[2a0c:b641:b50:2::a0]:8000/webhook/alertmanager
        send_resolved: true
        max_alerts: 0
    discord_configs:
      - webhook_url: '__REDACTED_DISCORD_WEBHOOK_URL__'
        send_resolved: true
        title: '🚨 [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts -}}
          **{{ .Labels.severity | toUpper }}** — {{ .Annotations.summary }}
          {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
          Source: mon (internal monitor) | Started: {{ .StartsAt.Format "2006-01-02 15:04 UTC" }}
          {{ end }}
inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, instance]
