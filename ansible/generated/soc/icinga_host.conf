// /etc/icinga2/conf.d/hosts/ansible/soc.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/soc.yml

object Host "soc" {
  address6 = "2a0c:b641:b50:2::100"
  display_name = "soc"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "soc"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::100]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}
object Service "soc-posture-timer" {
  host_name = "soc"
  check_command = "prom_systemd_unit"
  check_interval = 2m
  retry_interval = 1m
  enable_active_checks = false
  notes = "Enable only after the SOC shadow timer promotion"
  vars.prom_instance = "[2a0c:b641:b50:2::100]:9100"
  vars.systemd_unit = "soc-posture.timer"
}

object Service "soc-coordinator-handoffs" {
  host_name = "soc"
  check_command = "prom_systemd_unit"
  check_interval = 2m
  retry_interval = 1m
  enable_active_checks = false
  notes = "Enable with the LHP-v2 SOC handoff worker promotion"
  vars.prom_instance = "[2a0c:b641:b50:2::100]:9100"
  vars.systemd_unit = "soc-handoffs.timer"
}
