// /etc/icinga2/conf.d/hosts/ansible/irc.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/irc.yml

object Host "irc" {
  address6 = "2a0c:b641:b50:2::80"
  display_name = "irc (Soju IRC bouncer)"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "irc"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::80]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "ircs-tcp" {
  host_name = "irc"
  check_command = "tcp"
  check_interval = 2m
  retry_interval = 30s
  notes = "Soju TLS listener on tcp/6697"
  vars.tcp_address = "2a0c:b641:b50:2::80"
  vars.tcp_port = 6697
}

object Service "ircs-cert-validity" {
  host_name = "irc"
  check_command = "ssl"
  check_interval = 1h
  retry_interval = 30s
  notes = "TLS certificate days-until-expiry on Soju"
  vars.ssl_address = "2a0c:b641:b50:2::80"
  vars.ssl_port = 6697
  vars.ssl_cert_valid_days_warn = 14
  vars.ssl_cert_valid_days_critical = 5
}

