// /etc/icinga2/conf.d/hosts/ansible/ns2.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/ns2.yml

object Host "ns2" {
  address  = "54.38.14.218"
  address6 = "2001:41d0:304:300::7bfb"
  display_name = "ns2 (secondary nameserver, OVH GRA11)"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "nameserver"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2001:41d0:304:300::7bfb]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "dns-soa-servify-network" {
  host_name = "ns2"
  check_command = "dig"
  check_interval = 2m
  retry_interval = 30s
  notes = "Authoritative SOA query against ns2 for servify.network"
  vars.dig_lookup = "servify.network"
  vars.dig_server = "2001:41d0:304:300::7bfb"
  vars.dig_record_type = "SOA"
}

object Service "dns-soa-as215932-net" {
  host_name = "ns2"
  check_command = "dig"
  check_interval = 2m
  retry_interval = 30s
  notes = "Authoritative SOA query against ns2 for as215932.net"
  vars.dig_lookup = "as215932.net"
  vars.dig_server = "2001:41d0:304:300::7bfb"
  vars.dig_record_type = "SOA"
}

object Service "dns-soa-reverse" {
  host_name = "ns2"
  check_command = "dig"
  check_interval = 2m
  retry_interval = 30s
  notes = "Authoritative SOA query against ns2 for reverse zone"
  vars.dig_lookup = "0.5.b.1.4.6.b.c.0.a.2.ip6.arpa"
  vars.dig_server = "2001:41d0:304:300::7bfb"
  vars.dig_record_type = "SOA"
}

object Service "dns-axfr-fresh" {
  host_name = "ns2"
  check_command = "dummy"
  check_interval = 5m
  retry_interval = 30s
  notes = "Detect AXFR drift: compare serials between ns1 and ns2"
}

