# /etc/knot/knot.conf — managed by ansible/roles/knot.
# Host:  ns2
# Role:  secondary
#
# Do not edit manually — changes will be overwritten on next deploy.

server:
  listen: [ ::@53, 0.0.0.0@53 ]
  rundir: "/run/knot"
  user: knot:knot

log:
  - target: syslog
    any: info

database:
  storage: "/var/lib/knot"

# TSIG key shared between primary (dns) and all secondaries. Name MUST be
# "hyrule-dns" — hardcoded in hyrule_cloud/providers/dns.py.
key:
  - id: hyrule-dns
    algorithm: hmac-sha256
    secret: "vLFkcfnJZux1BQuoaavvrwNS97vyhomvN6NEle92qG8="

# --- Secondary: pulls AXFR from primary -----------------------------------
remote:
  - id: ns1
    address: [ 2a0c:b641:b50:2::10, 46.105.40.223 ]
    key: hyrule-dns

acl:
  - id: ns1-notify
    address: [ 2a0c:b641:b50:2::10, 46.105.40.223 ]
    key: hyrule-dns
    action: notify

template:
  - id: default
    storage: "/var/lib/knot/zones"
    file: "%s.zone"
    master: [ ns1 ]
    acl: [ ns1-notify ]

zone:
  - domain: servify.network
  - domain: as215932.net
  - domain: 0.5.b.1.4.6.b.c.0.a.2.ip6.arpa

