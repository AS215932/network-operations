#!/usr/sbin/nft -f
# /etc/nftables.conf — managed by ansible (roles/firewall)
# Host: rtr
# Combines existing IPv4 NAT/forward (preserved verbatim from configs/rtr/nftables.conf)
# with new IPv6 host-level input filter.
# Generated: do not edit by hand.

flush ruleset

# --- IPv4 NAT (DNAT inbound on failover IP, masquerade outbound on WAN) ---
# Original file: configs/rtr/nftables.conf. Preserved here so that
# `ansible --check --diff` shows zero functional change to v4 behaviour
# on first run; only the inet filter table below is new.

define WAN_IP   = 46.105.40.223
define WAN_IF   = enX4
define DNS_IP   = 10.0.2.10
define PROXY_IP = 10.0.2.40
define VPN_IP   = 10.0.2.60

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;

        # DNS → Knot
        ip daddr $WAN_IP tcp dport 53 dnat to $DNS_IP
        ip daddr $WAN_IP udp dport 53 dnat to $DNS_IP

        # HTTP/HTTPS → Caddy
        ip daddr $WAN_IP tcp dport { 80, 443 } dnat to $PROXY_IP

        # WireGuard VPN → vpn VM
        ip daddr $WAN_IP udp dport 51820 dnat to $VPN_IP
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Masquerade on WAN — preserves source IPs through DNAT (no masq on enX2),
        # and allows infra VMs to reach IPv4 internet (outgoing NAT).
        oifname $WAN_IF masquerade
    }
}

table ip filter {
    chain forward {
        type filter hook forward priority filter; policy accept;

        # Customer VM isolation: drop forwarding from the customer VM bridge
        # to the infra and management bridges. Documented in CLAUDE.md but
        # missing from the previous live config — added here.
        iifname enX3 oifname { enX2, enX0 } drop

        # Allow established/related
        ct state established,related accept

        # Allow DNAT'd traffic to infra VMs
        ip daddr $DNS_IP tcp dport 53 accept
        ip daddr $DNS_IP udp dport 53 accept
        ip daddr $PROXY_IP tcp dport { 80, 443 } accept
        ip daddr $VPN_IP udp dport 51820 accept
    }
}

# --- IPv6 host filter — new in this rollout ---
table inet filter {
    chain input {
        type filter hook input priority filter; policy accept;

        # Loopback always allowed.
        iif lo accept

        # Established/related — keep returning packets flowing.
        ct state established,related accept
        ct state invalid drop

        # ICMPv6 — required for ND, RA, MTU discovery, ping.
        meta l4proto ipv6-icmp accept

        # ICMPv4 — keep ping working.
        meta l4proto icmp accept

        # SSH from VPN clients and the KPN ops prefix.
        ip6 saddr 2a02:a442:1016::/48 tcp dport 22 counter accept comment "ssh from 2a02:a442:1016::/48"
        ip6 saddr 2a0c:b641:b50:3::/64 tcp dport 22 counter accept comment "ssh from 2a0c:b641:b50:3::/64"
        ip saddr 77.166.211.126/32 tcp dport 22 counter accept comment "ssh from 77.166.211.126/32"

        # Per-host service allowances.
        ip6 saddr { 2a0c:b641:b50:2::/64, 2a0c:b641:b51::/48, 2a0c:b641:b50:3::/64 } tcp dport 53 counter accept comment "DNS recursion from overlay"
        ip6 saddr { 2a0c:b641:b50:2::/64, 2a0c:b641:b51::/48, 2a0c:b641:b50:3::/64 } udp dport 53 counter accept comment "DNS recursion from overlay"
        ip6 saddr 2a0c:b641:b50:2::50 tcp dport 9100 counter accept comment "node_exporter scrape"
        ip6 saddr 2a0c:b641:b50:2::50 tcp dport 9342 counter accept comment "frr_exporter scrape"
        ip6 saddr { 2a0c:b641:b50::a, 2a0c:b641:b50::b } tcp dport 179 counter accept comment "iBGP from cr1-* loopbacks"
        ip6 saddr 2a0c:b640:8:69::1 udp dport 1337 counter accept comment "WG to cr1-nl1"
        ip6 saddr 2a0c:b640:10::213 udp dport 1338 counter accept comment "WG to cr1-de1"

        # --- raw escape hatch ---
        # OSPF6 (proto 89) on WireGuard interfaces — iBGP/OSPF mesh transit.
        iifname { wg0, wg1 } meta l4proto ospf accept comment "OSPF6 on wg mesh"
        # iBGP also accepted on wg ifaces with no source restriction (already covered above
        # via loopback src match, but this is a defense-in-depth allow for the wg link).


        # End of input — log what would have been dropped.
        limit rate 10/second counter log prefix "fw-would-drop " accept
    }

    chain forward {
        type filter hook forward priority filter; policy accept;

        # Customer VM isolation for IPv6 — mirror of the v4 rule above.
        iifname enX3 oifname { enX2, enX0 } drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
