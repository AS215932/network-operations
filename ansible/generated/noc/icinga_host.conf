// /etc/icinga2/conf.d/hosts/ansible/noc.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/noc.yml

object Host "noc" {
  address6 = "2a0c:b641:b50:2::a0"
  display_name = "noc"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "noc"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::a0]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "noc-agent-http" {
  host_name = "noc"
  check_command = "tcp"
  check_interval = 2m
  retry_interval = 30s
  notes = "noc-agent webhook health"
  vars.tcp_address = "2a0c:b641:b50:2::a0"
  vars.tcp_port = 8000
}

