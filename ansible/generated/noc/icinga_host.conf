// /etc/icinga2/conf.d/hosts/ansible/noc.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/noc.yml

object Host "noc" {
  address6 = "2a0c:b641:b50:2::a0"
  display_name = "noc"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "noc"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::a0]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "noc-agent-health" {
  host_name = "noc"
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  notes = "FastAPI liveness for noc-agent"
  vars.http_address = "2a0c:b641:b50:2::a0"
  vars.http_port = 8000
  vars.http_uri = "/health"
  vars.http_ipv6 = true
  vars.http_timeout = 10
  vars.http_expect_body_regex = "\"status\":\"ok\""
}

object Service "noc-agent-mcp-health" {
  host_name = "noc"
  check_command = "noc_agent_mcp_health"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 5
  enable_flapping = true
  flapping_threshold_low = 20
  flapping_threshold_high = 35
  notes = "MCP subprocess connectivity for Prometheus/SSH and Xen Orchestra tools"
  vars.noc_mcp_host = "2a0c:b641:b50:2::a0"
  vars.noc_mcp_port = 8000
}

object Service "noc-agent-config-health" {
  host_name = "noc"
  check_command = "http"
  check_interval = 2m
  retry_interval = 30s
  notes = "Required noc-agent runtime configuration and secret presence"
  vars.http_address = "2a0c:b641:b50:2::a0"
  vars.http_port = 8000
  vars.http_uri = "/health/config"
  vars.http_ipv6 = true
  vars.http_timeout = 10
  vars.http_expect_body_regex = "\"status\":\"ok\""
}

object Service "noc-agent-mail-health" {
  host_name = "noc"
  check_command = "noc_agent_mail_health"
  check_interval = 2m
  retry_interval = 30s
  notes = "NOC mailbox IMAP login/select used by mail polling"
  vars.noc_mail_host = "2a0c:b641:b50:2::a0"
  vars.noc_mail_port = 8000
}

object Service "noc-agent-model-health" {
  host_name = "noc"
  check_command = "noc_agent_model_health"
  check_interval = 2m
  retry_interval = 30s
  notes = "Configured AI model and fallback access for noc-agent"
  vars.noc_model_host = "2a0c:b641:b50:2::a0"
  vars.noc_model_port = 8000
}

