// /etc/icinga2/conf.d/hosts/ansible/mail.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/mail.yml

object Host "mail" {
  address6 = "2a0c:b641:b50:2::90"
  display_name = "mail (OpenBSD mail server)"

  check_command = "ping6"

  vars.os = "OpenBSD"
  vars.role = "mail"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::90]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "smtp-tcp" {
  host_name = "mail"
  check_command = "tcp"
  check_interval = 2m
  retry_interval = 30s
  notes = "OpenSMTPD public SMTP listener on tcp/25"
  vars.tcp_address = "mail.as215932.net"
  vars.tcp_port = 25
}

object Service "smtps-cert-validity" {
  host_name = "mail"
  check_command = "ssl"
  check_interval = 12h
  retry_interval = 30s
  notes = "TLS certificate days-until-expiry on tcp/465"
  vars.ssl_address = "mail.as215932.net"
  vars.ssl_sni = "mail.as215932.net"
  vars.ssl_port = 465
  vars.ssl_cert_valid_days_warn = 14
  vars.ssl_cert_valid_days_critical = 7
}

object Service "submission-tcp" {
  host_name = "mail"
  check_command = "tcp"
  check_interval = 2m
  retry_interval = 30s
  notes = "OpenSMTPD submission listener on tcp/587"
  vars.tcp_address = "mail.as215932.net"
  vars.tcp_port = 587
}

object Service "imaps-cert-validity" {
  host_name = "mail"
  check_command = "ssl"
  check_interval = 12h
  retry_interval = 30s
  notes = "Dovecot IMAPS certificate days-until-expiry on tcp/993"
  vars.ssl_address = "mail.as215932.net"
  vars.ssl_sni = "mail.as215932.net"
  vars.ssl_port = 993
  vars.ssl_cert_valid_days_warn = 14
  vars.ssl_cert_valid_days_critical = 7
}

