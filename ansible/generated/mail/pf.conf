# /etc/pf.conf — managed by ansible (roles/firewall) — host mail

ext_if="xnf0"

set skip on lo
set loginterface $ext_if

match all scrub(random-id max-mss 1360)

# log_only mode: would-block becomes pass log so we can observe before enforcing.
pass log all

# SSH from ops-prefix and VPN clients.
pass in quick on $ext_if inet proto tcp from 77.166.211.126/32 to any port = ssh flags S/SA keep state label "USER_RULE: SSH from ops-prefix (v4)"
pass in quick on $ext_if inet6 proto tcp from { 2a02:a442:1016::/48, 2a0c:b641:b50:3::/64 } to any port = ssh flags S/SA keep state label "USER_RULE: SSH from ops/VPN (v6)"

# ICMP.
pass in quick on $ext_if inet proto icmp keep state
pass in quick on $ext_if inet6 proto ipv6-icmp keep state


# Per-host service allows.
pass in quick on $ext_if inet proto tcp from any to any port = 25 keep state label "SMTP inbound (OpenSMTPD)"
pass in quick on $ext_if inet6 proto tcp from any to any port = 25 keep state label "SMTP inbound (OpenSMTPD)"
pass in quick on $ext_if inet proto tcp from any to any port = 465 keep state label "SMTPS submission (OpenSMTPD)"
pass in quick on $ext_if inet6 proto tcp from any to any port = 465 keep state label "SMTPS submission (OpenSMTPD)"
pass in quick on $ext_if inet proto tcp from any to any port = 587 keep state label "Submission STARTTLS (OpenSMTPD)"
pass in quick on $ext_if inet6 proto tcp from any to any port = 587 keep state label "Submission STARTTLS (OpenSMTPD)"
pass in quick on $ext_if inet proto tcp from any to any port = 80 keep state label "ACME HTTP-01 (httpd)"
pass in quick on $ext_if inet6 proto tcp from any to any port = 80 keep state label "ACME HTTP-01 (httpd)"
pass in quick on $ext_if inet6 proto tcp from { 2a02:a442:1016::/48, 2a0c:b641:b50:3::/64 } to any port = 993 keep state label "IMAPS from ops/VPN"
pass in quick on $ext_if inet6 proto tcp from { 2a02:a442:1016::/48, 2a0c:b641:b50:3::/64 } to any port = 4190 keep state label "ManageSieve from ops/VPN"
pass in quick on $ext_if inet6 proto tcp from 2a0c:b641:b50:2::50 to any port = 9100 keep state label "node_exporter scrape"

# Outbound.
pass out quick on $ext_if inet proto { tcp, udp, icmp } from any to any keep state
pass out quick on $ext_if inet6 proto { tcp, udp, ipv6-icmp } from any to any keep state
