// /etc/icinga2/conf.d/hosts/ansible/ci.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/ci.yml

object Host "ci" {
  address6 = "2a0c:b641:b50:2::d0"
  display_name = "ci"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "ci"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::d0]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "github-runner-online" {
  host_name = "ci"
  check_command = "by_ssh"
  check_interval = 5m
  retry_interval = 1m
  notes = "Runner service is active and connected to GitHub"
  vars.by_ssh_command = "systemctl is-active --quiet github-runner.service"
}

