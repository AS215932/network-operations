connectors:
  - file: connectorRIS
    name: ris
    params:
      carefulSubscription: true
      url: ws://ris-live.ripe.net/v1/ws/
      perMessageDeflate: true
      authorizationHeader: null
      subscription:
        moreSpecific: true
        type: UPDATE
        socketOptions:
          includeRaw: false

monitors:
  - file: monitorHijack
    channel: hijack
    name: basic-hijack-detection
    params:
      thresholdMinPeers: 3

  - file: monitorPath
    channel: path
    name: path-matching
    params:
      thresholdMinPeers: 1

  - file: monitorVisibility
    channel: visibility
    name: withdrawal-detection
    params:
      thresholdMinPeers: 40
      notificationIntervalSeconds: 3600

  - file: monitorAS
    channel: misconfiguration
    name: asn-monitor
    params:
      skipPrefixMatch: false
      thresholdMinPeers: 3

  - file: monitorRPKI
    channel: rpki
    name: rpki-monitor
    params:
      thresholdMinPeers: 3
      checkUncovered: false
      checkDisappearing: false

  - file: monitorROAS
    channel: roa
    name: rpki-diff
    params:
      enableDiffAlerts: true
      enableExpirationAlerts: true
      enableExpirationCheckTA: true
      enableDeletedCheckTA: true
      checkOnlyASns: true
      roaExpirationAlertHours: 24

reports:
  - file: reportFile
    channels: [hijack, newprefix, visibility, path, misconfiguration, rpki, roa]
    params:
      persistAlertData: false
      alertDataDirectory: alertdata/

  - file: reportHTTP
    channels: [hijack, newprefix, visibility, path, misconfiguration, rpki, roa]
    params:
      isTemplateJSON: true
      templates:
        default: '{"source":"bgpalerter","channel":"${channel}","type":"${type}","summary":"${summary}","prefix":"${prefix}","asn":"${asn}","newprefix":"${newprefix}","neworigin":"${neworigin}","earliest":"${earliest}","latest":"${latest}"}'
      showPaths: 5
      hooks:
        default: http://127.0.0.1:9188/bgpalerter

processMonitors:
  - file: uptimeApi
    params:
      useStatusCodes: true

rest:
  host: "127.0.0.1"
  port: 8011

monitoredPrefixesFiles:
  - prefixes.yml

logging:
  directory: logs
  logRotatePattern: YYYY-MM-DD
  compressOnRotation: true
  maxFileSizeMB: 15
  maxRetainedFiles: 10
  useUTC: true

rpki:
  vrpProvider: api
  url: http://127.0.0.1:8323/json
  refreshVrpListMinutes: 15
  markDataAsStaleAfterMinutes: 120

notificationIntervalSeconds: 1800
checkForUpdatesAtBoot: false
persistStatus: true
alertOnlyOnce: false
fadeOffSeconds: 360
checkFadeOffGroupsSeconds: 30
pidFile: bgpalerter.pid
maxMessagesPerSecond: 6000
multiProcess: false
environment: production
configVersion: 3
