modules:
  http_2xx_v6:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip6
      ip_protocol_fallback: false
      valid_status_codes: [200, 204, 301, 302, 401, 403]
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false

  http_2xx_v4:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false
      valid_status_codes: [200, 204, 301, 302, 401, 403]
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false

  # Plain-HTTP loopback check for local REST endpoints (e.g. BGPalerter's
  # /status on 127.0.0.1). Must NOT set fail_if_not_ssl — these are http://.
  http_2xx_local:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false
      valid_status_codes: [200, 204]
      fail_if_not_ssl: false

  icmp_v4:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false

  icmp_v6:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip6
      ip_protocol_fallback: false

  tcp_connect_v6:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip6
      ip_protocol_fallback: false

  tcp_connect_v4:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false

  smtp_starttls:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: ip6
      query_response:
        - expect: "^220"
        - send: "EHLO extmon.servify.network"
        - expect: "^250"
        - send: "STARTTLS"
        - expect: "^220"
        - starttls: true
        - send: "EHLO extmon.servify.network"
        - expect: "^250"
        - send: "QUIT"

  dns_soa_servify_network:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: ip6
      ip_protocol_fallback: true
      query_name: servify.network
      query_type: SOA
      validate_answer_rrs:
        fail_if_not_matches_regexp:
          - ".*ns1.servify.network\\..*"
  dns_soa_hyrule_host:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: ip6
      ip_protocol_fallback: true
      query_name: hyrule.host
      query_type: SOA
      validate_answer_rrs:
        fail_if_not_matches_regexp:
          - ".*ns1.servify.network\\..*"
  dns_soa_deploy_hyrule_host:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: ip6
      ip_protocol_fallback: true
      query_name: deploy.hyrule.host
      query_type: SOA
      validate_answer_rrs:
        fail_if_not_matches_regexp:
          - ".*ns1.servify.network\\..*"
  dns_soa_as215932_net:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: ip6
      ip_protocol_fallback: true
      query_name: as215932.net
      query_type: SOA
      validate_answer_rrs:
        fail_if_not_matches_regexp:
          - ".*ns1.servify.network\\..*"
