global:
  resolve_timeout: 5m

route:
  receiver: noc-agent
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 24h

  routes:
    # Critical alerts skip group_wait so they hit Discord faster.
    - matchers:
        - severity = "critical"
      receiver: critical-discord
      group_wait: 10s

receivers:
  - name: noc-agent
  - name: critical-discord
    discord_configs:
      - webhook_url: ''
        send_resolved: true
        title: '🚨 [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts -}}
          **{{ .Labels.severity | toUpper }}** — {{ .Annotations.summary }}
          {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
          Source: extmon (external monitor) | Started: {{ .StartsAt.Format "2006-01-02 15:04 UTC" }}
          {{ end }}
inhibit_rules:
  # If a probe is critical, don't also fire the warn-level slow alert for
  # the same instance — would just spam.
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: [instance, job]
