<VirtualHost *:80>
    ServerName flow.as215932.net
    DocumentRoot /var/www/nfsen-ng

    <Directory /var/www/nfsen-ng>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/nfsen-ng-error.log
    CustomLog ${APACHE_LOG_DIR}/nfsen-ng-access.log combined
</VirtualHost>
