// /etc/icinga2/conf.d/hosts/ansible/flow.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/flow.yml

object Host "flow" {
  address6 = "2a0c:b641:b50:2::110"
  display_name = "flow"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "flow"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::110]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "nfsen-ng-http" {
  host_name = "flow"
  check_command = "http"
  check_interval = 2m
  retry_interval = 30s
  notes = "nfsen-ng raw-flow UI"
  vars.http_address = "2a0c:b641:b50:2::110"
  vars.http_port = 80
  vars.http_uri = "/"
  vars.http_ipv6 = true
}

object Service "netflow-collector" {
  host_name = "flow"
  check_command = "prom_systemd_unit"
  check_interval = 2m
  retry_interval = 30s
  notes = "nfcapd NetFlow v9 collector service"
  vars.prom_instance = "[2a0c:b641:b50:2::110]:9100"
  vars.systemd_unit = "flow-nfcapd-netflow.service"
}

