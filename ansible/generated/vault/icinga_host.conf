// /etc/icinga2/conf.d/hosts/ansible/vault.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/vault.yml

object Host "vault" {
  address6 = "2a0c:b641:b50:2::c0"
  display_name = "vault"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "vault"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::c0]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "vault-health" {
  host_name = "vault"
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  notes = "Vault seal/standby health endpoint via internal API"
  vars.http_address = "2a0c:b641:b50:2::c0"
  vars.http_port = 8200
  vars.http_uri = "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
  vars.http_ipv6 = true
  vars.http_timeout = 10
  vars.http_expect_body_regex = "\"sealed\":false|\"initialized\":false"
}

