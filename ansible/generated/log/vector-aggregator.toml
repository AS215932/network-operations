# /etc/vector/vector.toml — managed by ansible (roles/logs)
# Host: log (aggregator)
# Generated: do not edit by hand.
#
# Receives:
#   - vector-native ingest from agents on :6000
#   - syslog (TCP) from OpenBSD mail on :6514
# Redacts (see roles/logs/files/redact.vrl), labels, sinks to local Loki.

data_dir = "/var/lib/vector"

[api]
enabled = true
# Local-only diagnostics API. Prometheus does not scrape this endpoint; Vector's
# API returns health/control-plane responses, not Prometheus samples.
address = "127.0.0.1:8687"

# --- Sources -----------------------------------------------------------------

[sources.internal_metrics]
type = "internal_metrics"

[sources.from_agents]
type = "vector"
address = "[::]:6000"
version = "2"

[sources.openbsd_syslog]
type = "syslog"
address = "[::]:6514"
mode = "tcp"

# Aggregator's own journald (so the log VM is also visible in Loki).
# Vector default is current-boot-only on modern systemd; older releases'
# `current_boot_only = false` flag is rejected on systemd 250+.
# since_now: avoid replaying historical entries on first start (Loki
# rejects them with reject_old_samples_max_age = 168h).
[sources.self_journald]
type = "journald"
since_now = true

# --- Transforms --------------------------------------------------------------

# Self-host journald → same enrichment shape as remote agents.
[transforms.self_enrich]
type = "remap"
inputs = ["self_journald"]
source = '''
parsed, err = parse_json(.message)
if err == null && is_object(parsed) {
    . = merge(., object!(parsed))
}
.service = string(.service) ?? string(._SYSTEMD_UNIT) ?? string(.SYSLOG_IDENTIFIER) ?? "unknown"
.level = string(.level) ?? "info"
.host = "log"
.role = "log"
'''

# OpenBSD syslog → match the same field shape: host/role from the syslog
# hostname, service from the program name, level from the priority.
[transforms.syslog_enrich]
type = "remap"
inputs = ["openbsd_syslog"]
source = '''
.host = string(.hostname) ?? "mail"
.role = "mail"
.service = string(.appname) ?? "syslog"
.level = string(.severity) ?? "info"
'''

# Shared redaction across every event regardless of source.
[transforms.redact]
type = "remap"
inputs = ["from_agents", "self_enrich", "syslog_enrich"]
file = "/etc/vector/redact.vrl"

# Drop labels Loki shouldn't index (anything not in the small label set).
# Keep them in the body — they remain searchable via `| json`.
[transforms.label_strip]
type = "remap"
inputs = ["redact"]
source = '''
# Loki labels we keep: host, role, service, level. Everything else stays
# in the event body for content-search but is removed from labels.
.labels = {
  "host": to_string(.host) ?? "unknown",
  "role": to_string(.role) ?? "infra",
  "service": to_string(.service) ?? "unknown",
  "level": to_string(.level) ?? "info",
}
'''

# --- Sinks -------------------------------------------------------------------

[sinks.prometheus_metrics]
type = "prometheus_exporter"
inputs = ["internal_metrics"]
# Prometheus on mon scrapes this listener; firewall only permits mon.
address = "[::]:8686"

[sinks.loki]
type = "loki"
inputs = ["label_strip"]
endpoint = "http://127.0.0.1:3100"
encoding.codec = "json"
out_of_order_action = "accept"
remove_label_fields = true

[sinks.loki.labels]
host = "{{ labels.host }}"
role = "{{ labels.role }}"
service = "{{ labels.service }}"
level = "{{ labels.level }}"

[sinks.loki.buffer]
type = "disk"
max_size = 4294967296
when_full = "block"
