// /etc/icinga2/conf.d/hosts/ansible/log.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/log.yml

object Host "log" {
  address6 = "2a0c:b641:b50:2::b0"
  display_name = "log"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "log"
  vars.ssh_port = 22

  vars.prom_instance_node = "[2a0c:b641:b50:2::b0]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "vector-aggregator" {
  host_name = "log"
  check_command = "tcp"
  check_interval = 2m
  retry_interval = 30s
  notes = "Vector aggregator listener (vector-native protocol)"
  vars.tcp_address = "2a0c:b641:b50:2::b0"
  vars.tcp_port = 6000
}

object Service "loki-ready" {
  host_name = "log"
  check_command = "http"
  check_interval = 2m
  retry_interval = 30s
  notes = "Loki /ready endpoint"
  vars.http_address = "2a0c:b641:b50:2::b0"
  vars.http_port = 3100
  vars.http_uri = "/ready"
}

