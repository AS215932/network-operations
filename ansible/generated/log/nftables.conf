#!/usr/sbin/nft -f
# /etc/nftables.conf — managed by ansible (roles/firewall)
# Host: log
# Generated: do not edit by hand.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy accept;

        # Loopback always allowed.
        iif lo accept

        # Established/related — keep returning packets flowing.
        ct state established,related accept
        ct state invalid drop

        # ICMPv6 — required for ND, RA, MTU discovery, ping.
        meta l4proto ipv6-icmp accept

        # ICMPv4 — keep ping working.
        meta l4proto icmp accept

        # SSH from VPN clients and the KPN ops prefix.
        ip6 saddr 2a02:a442:1016::/48 tcp dport 22 counter accept comment "ssh from 2a02:a442:1016::/48"
        ip6 saddr 2a0c:b641:b50:3::/64 tcp dport 22 counter accept comment "ssh from 2a0c:b641:b50:3::/64"
        ip saddr 77.166.211.126/32 tcp dport 22 counter accept comment "ssh from 77.166.211.126/32"

        # Per-host service allowances.
        ip6 saddr 2a0c:b641:b50:2::1 tcp dport 6000 counter accept comment "Vector ingest from rtr"
        ip6 saddr 2a0c:b641:b50:2::10 tcp dport 6000 counter accept comment "Vector ingest from dns"
        ip6 saddr 2a0c:b641:b50:2::20 tcp dport 6000 counter accept comment "Vector ingest from api"
        ip6 saddr 2a0c:b641:b50:2::30 tcp dport 6000 counter accept comment "Vector ingest from web"
        ip6 saddr 2a0c:b641:b50:2::40 tcp dport 6000 counter accept comment "Vector ingest from proxy"
        ip6 saddr 2a0c:b641:b50:2::50 tcp dport 6000 counter accept comment "Vector ingest from mon"
        ip6 saddr 2a0c:b641:b50:2::60 tcp dport 6000 counter accept comment "Vector ingest from vpn"
        ip6 saddr 2a0c:b641:b50:2::70 tcp dport 6000 counter accept comment "Vector ingest from xoa"
        ip6 saddr 2a0c:b641:b50:2::80 tcp dport 6000 counter accept comment "Vector ingest from irc"
        ip6 saddr 2a0c:b641:b50:2::a0 tcp dport 6000 counter accept comment "Vector ingest from noc"
        ip6 saddr 2a0c:b641:b50:2::d0 tcp dport 6000 counter accept comment "Vector ingest from ci"
        ip6 saddr 2a0c:b641:b50::a tcp dport 6000 counter accept comment "Vector ingest from cr1-nl1 (over WG mesh)"
        ip6 saddr 2a0c:b641:b50::b tcp dport 6000 counter accept comment "Vector ingest from cr1-de1 (over WG mesh)"
        ip6 saddr 2001:41d0:304:300::7bfb tcp dport 6000 counter accept comment "Vector ingest from off-net ns2"
        ip saddr 10.0.0.0/24 tcp dport 6000 counter accept comment "Vector ingest from dom0 over mgmt v4"
        ip6 saddr 2a0c:b641:b50:2::90 tcp dport 6514 counter accept comment "syslog (TCP) from OpenBSD mail"
        ip6 saddr 2a0c:b641:b50:2::50 tcp dport 3100 counter accept comment "Loki HTTP API from Grafana on mon"
        ip6 saddr 2a0c:b641:b50:2::50 tcp dport 8686 counter accept comment "Vector internal metrics scrape from mon"
        ip6 saddr 2a0c:b641:b50:2::50 tcp dport 9100 counter accept comment "node_exporter scrape"


        # End of input — log+counter what would have been dropped if policy were drop.
        limit rate 10/second counter log prefix "fw-would-drop " accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        ct state established,related accept
        ct state invalid drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
