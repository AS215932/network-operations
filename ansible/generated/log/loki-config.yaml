# /etc/loki/config.yaml — managed by ansible (roles/logs)
# Host: log (aggregator)
# Generated: do not edit by hand.

auth_enabled: false

server:
  # HTTP API (3100) listens on all interfaces so Grafana on mon can query
  # over IPv6. Access is gated at the host firewall (nftables): inbound
  # 3100 is restricted to peers.mon.ipv6 in host_vars/log.yml. A kernel
  # firewall cannot redirect into a loopback socket, so binding here on
  # ::1 / 127.0.0.1 makes Loki unreachable from mon entirely.
  http_listen_address: "::"
  http_listen_port: 3100
  # gRPC (9096) stays on loopback — it carries intra-process ring chatter
  # from the ingester back to itself. The advertised ring address must
  # match the listener, which is why common.instance_addr below also pins
  # to 127.0.0.1.
  grpc_listen_address: 127.0.0.1
  grpc_listen_port: 9096
  log_level: info
common:
  path_prefix: /var/lib/loki
  storage:
    filesystem:
      chunks_directory: /var/lib/loki/chunks
      rules_directory: /var/lib/loki/rules
  replication_factor: 1
  # Pin the ingester's advertised ring address to loopback. Without
  # this, Loki picks the host's first non-loopback address (mgmt v4
  # on this VM) and tries to dial 9096 there — but server.grpc binds
  # to 127.0.0.1 only, so it fails with "connection refused".
  instance_addr: 127.0.0.1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    # Far-back `from:` so historical journald entries replayed by
    # newly-installed Vector agents don't fail with "no schema config
    # found". The reject_old_samples_max_age below is the real ingestion
    # cutoff (7d window).
    - from: 2020-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /var/lib/loki/index
    cache_location: /var/lib/loki/index_cache
  filesystem:
    directory: /var/lib/loki/chunks

# Compactor is what enforces retention. Without retention_enabled: true
# the index grows indefinitely regardless of limits_config — the compactor
# would compact but never delete. Watchdog metric:
#   loki_compactor_oldest_pending_delete_request_age
# alerts in mon's Alertmanager rules if this rises monotonically.
compactor:
  working_directory: /var/lib/loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# Default retention 720h (30d).
# Routers get the longer window via per-stream override below.
limits_config:
  retention_period: 720h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 4MB
  per_stream_rate_limit_burst: 16MB
  max_label_name_length: 1024
  max_label_value_length: 4096
  max_label_names_per_series: 30
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_stream:
    - selector: '{role="router"}'
      priority: 1
      period: 2160h

# Ingester wal: keeps in-flight chunks if Loki crashes mid-write.
ingester:
  wal:
    enabled: true
    dir: /var/lib/loki/wal
  chunk_idle_period: 1h
  max_chunk_age: 2h
  chunk_target_size: 1572864
  chunk_retain_period: 30s

ruler:
  storage:
    type: local
    local:
      directory: /var/lib/loki/rules
  rule_path: /var/lib/loki/rules-tmp
  ring:
    kvstore:
      store: inmemory
  enable_api: true

analytics:
  reporting_enabled: false
