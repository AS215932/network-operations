# /etc/pf.conf — managed by ansible (roles/firewall) — host cr1-ch1

# --- Interfaces ---
ext_if="vmx0"
ixp_4ixp="vmx1"
ixp_sbix="vmx2"
ext_ifs="{ vmx0 vmx1 vmx2 }"

# --- Our networks ---
table <AS215932> const { 2a0c:b641:b50::/44 }

# --- Bogons ---
table <bogons4> persist file "/etc/pf.bogons4"
table <bogons6> persist file "/etc/pf.bogons6"

# --- Options ---
set skip on lo
set loginterface $ext_if

# --- Normalization ---
match all scrub(random-id max-mss 1360)

# --- Default policy ---
block return in log all
block return out log all

# --- Bogons drop ---
block drop in quick log on $ext_if inet from <bogons4>
block drop out quick log on $ext_if inet to <bogons4>
block drop in quick log on $ext_if inet6 from <bogons6>
block drop out quick log on $ext_if inet6 to <bogons6>

# --- Antispoof ---
antispoof quick log for $ext_if

# --- WireGuard mesh transit (asymmetric routing — no state) ---
pass quick on wg all no state

# --- AS215932 transit ---
pass in quick on $ext_ifs inet6 from any to <AS215932> no state
pass out quick on $ext_ifs inet6 from <AS215932> to any no state

# --- WireGuard underlay ports ---
pass in quick on $ext_ifs inet  proto udp from any to any port { 1339, 1341, 1342 } keep state label "WG_RULE: WireGuard underlay (v4)"
pass in quick on $ext_ifs inet6 proto udp from any to any port { 1339, 1341, 1342 } keep state label "WG_RULE: WireGuard underlay (v6)"

# --- External BGP ---
pass in quick on $ext_ifs inet6 proto tcp from { 2a09:4c0:100:2d88::8bfa, 2001:7f8:d9:1::1, 2001:7f8:d9:1::2, 2001:7f8:d9:1::3, 2001:7f8:d9:1::4, 2001:7f8:d0::8b7c:1, 2001:7f8:d0::8b7c:2, 2001:7f8:d0::8b7c:3 } to any port = bgp flags S/SA keep state label "BGP_RULE: External BGP peers"

# --- SSH from ops-prefix ---
pass in quick on $ext_if inet  proto tcp from 77.166.211.126/32 to any port = ssh flags S/SA keep state label "USER_RULE: SSH from ops-prefix (v4)"
pass in quick on $ext_if inet6 proto tcp from 2a02:a442:1016::/48 to any port = ssh flags S/SA keep state label "USER_RULE: SSH from ops-prefix (v6)"

# --- ICMP ---
pass in quick inet  proto icmp keep state
pass in quick inet6 proto ipv6-icmp keep state

# --- Per-host service allows (firewall_extra_rules) ---
pass in quick on $ext_if inet6 proto tcp from 2a0c:b641:b50:2::50 to any port = 9100 keep state label "node_exporter scrape from mon"
pass in quick on $ext_if inet6 proto tcp from 2a0c:b641:b50:2::50 to any port = 9342 keep state label "frr_exporter scrape from mon"

# --- Outbound ---
pass out quick on $ext_ifs inet  proto { tcp, udp, icmp } from any to any keep state
pass out quick on $ext_ifs inet6 proto { tcp, udp, ipv6-icmp } from any to any keep state
