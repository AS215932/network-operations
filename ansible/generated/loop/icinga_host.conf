// /etc/icinga2/conf.d/hosts/ansible/loop.conf
// Managed by ansible/roles/monitoring — do not edit by hand.
// Source of truth: ansible/inventory/host_vars/loop.yml

object Host "loop" {
  address6 = "2a0c:b641:b50:2::f0"
  display_name = "loop"

  check_command = "ping6"

  vars.os = "Debian"
  vars.role = "loop"
  vars.ssh_port = 22
  vars.engineering_loop = true

  vars.prom_instance_node = "[2a0c:b641:b50:2::f0]:9100"

  vars.disks["disk /"] = { mountpoint = "/" }
}

object Service "engineering-loop" {
  host_name = "loop"
  check_command = "dummy"
  check_interval = 1h
  retry_interval = 5m
  enable_active_checks = false
  enable_passive_checks = true
  notes = "Passive run-status check submitted by the Engineering Loop daemon after every cycle"
}

object Service "engineering-loop-timer" {
  host_name = "loop"
  check_command = "prom_systemd_unit"
  check_interval = 2m
  retry_interval = 1m
  notes = "Engineering Loop hourly timer is active on the dedicated loop VM"
  vars.prom_instance = "[2a0c:b641:b50:2::f0]:9100"
  vars.systemd_unit = "hyrule-engineering-loop.timer"
}

object Service "knowledge-mcp-service" {
  host_name = "loop"
  check_command = "prom_systemd_unit"
  check_interval = 2m
  retry_interval = 1m
  notes = "Knowledge MCP container service is active on loopback for Engineering Loop context"
  vars.prom_instance = "[2a0c:b641:b50:2::f0]:9100"
  vars.systemd_unit = "hyrule-knowledge-mcp.service"
}

