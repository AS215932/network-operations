  vars.http_address = "2a0c:b641:b50:2::f0"
  vars.http_port = 8770
  vars.http_uri = "/healthz"
  vars.http_vhost = "agent-core-collector.loop.as215932.internal"
  vars.http_ssl = false
  vars.http_ipv6 = true
  vars.http_timeout = 5
  vars.http_expect_body_regex = "\"status\":\"ok\""
}

object Service "knowledge-api-health" {
  host_name = "loop"
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3
  notes = "Knowledge read API health endpoint (insight metrics + concepts)"
  vars.http_address = "2a0c:b641:b50:2::f0"
