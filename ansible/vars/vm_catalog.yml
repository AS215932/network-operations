vm_catalog:
  dns:
    description: "Authoritative DNS (Knot)"
    os_family: linux
    os_distribution: debian
    os_version: "13"
    xo:
      template: debian_13_cloudinit
      sr: default_ssd
    resources:
      vcpus: 1
      memory: 1073741824
      disks:
        - name: root
          size: 10737418240
    networks:
      - name: infra
        network: xenbr_infra
        device: enX0
        ipv6: "2a0c:b641:b50:2::10"
    ansible:
      groups:
        - linux
        - infra_vms
        - public_facing
        - nameservers
        - dns
    features:
      monitoring: true
      logging: true
      vault_agent: false
      firewall: true
    service_roles: []
    flows:
      inbound: []
      outbound: []

