  hermes:
    description: "Hermes agent / messaging automation"
    os_family: linux
    os_distribution: debian
    os_version: "13"
    xo:
      template: debian_13_cloudinit
      sr: default_ssd
      boot_firmware: uefi
      boot_order: c
      destroy_cloud_config_vdi_after_boot: true
    resources:
      vcpus: 1
      memory: 2147483648
      disks:
        - name: root
          size: 21474836480
    networks:
      - name: infra
        network: xenbr_infra
        device: enX0
        ipv6: "2a0c:b641:b50:2::e0"
    ansible:
      groups:
        - linux
        - infra_vms
        - hermes
    features:
      monitoring: true
      logging: true
      vault_agent: true
      firewall: true
    service_roles:
      - hermes_agent
    flows:
      inbound:
        - name: ssh_admin
          proto: tcp
          port: 22
          source_group: admin_hosts
          reason: SSH administration
        - name: prometheus_node_exporter
          proto: tcp
          port: 9100
          source_host: mon
          reason: Prometheus scrape
      outbound:
        - name: vault_agent
          proto: tcp
          port: 443
          dest_host: vault
          reason: Vault secret retrieval
        - name: discord_api
          proto: tcp
          port: 443
          dest: internet
          reason: Discord bot API
        - name: signal_api
          proto: tcp
          port: 443
          dest: internet
          reason: Signal integration
        - name: llm_api
          proto: tcp
          port: 443
          dest: internet
          reason: LLM API calls
