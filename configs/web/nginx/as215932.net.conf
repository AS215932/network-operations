# /etc/nginx/sites-available/as215932.net.conf
# Deploy to: web VM (2a0c:b641:b50:2::30)
#
# Serves the static AS215932 info site behind Caddy on the proxy VM.
# Caddy reverse-proxies https://as215932.net -> [web]:8081.
# The www -> apex redirect is handled at Caddy; this nginx only sees
# the apex vhost.

server {
    listen [::]:8081;
    server_name as215932.net;

    root /var/www/as215932.net;

    # We sit behind Caddy on the proxy VM. Emit relative Location headers so
    # canonicalize redirects don't leak our internal scheme/port (http:8081).
    absolute_redirect off;
    server_name_in_redirect off;
    port_in_redirect off;

    # Clean URLs:
    #   /        -> serve /index.html (no redirect, no use of `index` directive)
    #   /peering -> serve /peering.html
    # try_files serves the matched file directly without re-entering location
    # matching, so the .html canonicalize regex below does not fire on it.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Canonicalize: /index.html -> /, /peering.html -> /peering.
    location = /index.html { return 301 /; }
    location ~ ^/(.+)\.html$ { return 301 /$1; }

    # Brief cache for the single stylesheet.
    location = /style.css {
        expires 1h;
    }

    # No autoindex, no server tokens, no dynamic modules needed.
    autoindex off;
}
