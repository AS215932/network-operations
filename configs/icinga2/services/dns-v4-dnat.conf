// /etc/icinga2/conf.d/services/dns-v4-dnat.conf
// Probe authoritative DNS via the public v4 DNAT path on rtr.
// Catches: rtr DNAT regression, missing/broken VRF routing-policy rules
// in 10-enX2.network, v4 ARP/L2 break between rtr and dns.

apply Service "dns-v4-public-dnat" {
  check_command = "dns"
  check_interval = 2m
  retry_interval = 30s

  vars.dns_lookup = "servify.network"
  vars.dns_record_type = "SOA"
  vars.dns_server = "46.105.40.223"

  assign where host.name == "dns"
}
