# /etc/sysctl.d/99-rtr.conf — rtr.ovh1
# IPv6 forwarding (routing between VRF interfaces)
net.ipv6.conf.all.forwarding=1
# Disable DAD on WAN — dom0 NDP-proxies our address, causing DAD to fail
net.ipv6.conf.enX4.accept_dad=0
# IPv4 forwarding for NAT64 (Jool)
net.ipv4.conf.all.forwarding=1
# Increase netlink buffers — FRR + WG + VRF generate heavy netlink traffic
net.core.rmem_max=8388608
net.core.rmem_default=4194304
net.core.wmem_max=8388608
# Allow sockets in the default VRF to accept connections from overlay VRF.
# Required for Prometheus exporters (node_exporter, frr_exporter) which run
# in the default VRF but are scraped from mon VM in the overlay VRF.
net.ipv4.tcp_l3mdev_accept=1
net.ipv4.udp_l3mdev_accept=1
