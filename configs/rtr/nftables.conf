#!/usr/sbin/nft -f
# /etc/nftables.conf — rtr.ovh1
# DNAT inbound IPv4 on failover IP to infra VMs (RFC1918 on enX2).
# IPv4 forwarding enabled via sysctl.
# Route leak (10.0.2.0/24 in main table) provided by dnat-vrf-leak.service.

flush ruleset

define WAN_IP = 46.105.40.223
define DNS_IP = 10.0.2.10
define PROXY_IP = 10.0.2.40

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;

        # DNS → Knot
        ip daddr $WAN_IP tcp dport 53 dnat to $DNS_IP
        ip daddr $WAN_IP udp dport 53 dnat to $DNS_IP

        # HTTP/HTTPS → Caddy
        ip daddr $WAN_IP tcp dport { 80, 443 } dnat to $PROXY_IP
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Masquerade DNAT'd traffic so replies come back through rtr
        oifname "enX2" masquerade
    }
}

table ip filter {
    chain forward {
        type filter hook forward priority filter; policy accept;

        # Allow established/related
        ct state established,related accept

        # Allow DNAT'd traffic to infra VMs
        ip daddr $DNS_IP tcp dport 53 accept
        ip daddr $DNS_IP udp dport 53 accept
        ip daddr $PROXY_IP tcp dport { 80, 443 } accept
    }
}
