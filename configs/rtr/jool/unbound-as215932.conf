# /etc/unbound/unbound.conf.d/as215932.conf
# DNS64 + forwarding resolver for AS215932 overlay network.
# Runs in overlay VRF via systemd drop-in (ip vrf exec overlay).
# Synthesizes AAAA records for IPv4-only domains using 64:ff9b::/96.
# Forwards to dual-stack public resolvers (Cloudflare + Google) because
# Unbound can't reach IPv4-only authoritative NS from the IPv6-only overlay.
server:
    interface: 2a0c:b641:b50:2::1

    access-control: 0.0.0.0/0 allow
    access-control: ::/0 allow

    do-ip4: no
    do-ip6: yes
    prefer-ip6: yes

    hide-identity: yes
    hide-version: yes

    module-config: "dns64 validator iterator"

    dns64-prefix: 64:ff9b::/96

forward-zone:
    name: "."
    forward-addr: 2606:4700:4700::1111
    forward-addr: 2606:4700:4700::1001
    forward-addr: 2001:4860:4860::8888
    forward-addr: 2001:4860:4860::8844
