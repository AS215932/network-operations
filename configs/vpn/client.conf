# WireGuard client config — laptop → AS215932 VPN
# DNS64 resolver ensures all lookups return AAAA (native or synthesized).
# IPv4-only destinations are reached via NAT64 on rtr.
# AllowedIPs ::/0 + 0.0.0.0/0 captures all traffic# IPv4 is black-holed
# (no IPv4 address on tunnel), preventing leaks to the local ISP.
#
# IPv6 endpoint (if your network has IPv6):
#   Endpoint = [2a0c:b641:b50:2::60]:51820
[Interface]
PrivateKey = <CLIENT_PRIVATE_KEY>
Address = 2a0c:b641:b50:3::2/128
DNS = 2a0c:b641:b50:2::1

[Peer]
PublicKey = h4AjH9BV72VJEZhiUMZANfIdrzKxX1NQ8JaBJYFH71U=
Endpoint = 46.105.40.223:51820
AllowedIPs = ::/0, 0.0.0.0/0
PersistentKeepalive = 25
