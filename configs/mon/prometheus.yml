# /etc/prometheus/prometheus.yml — mon VM (2a0c:b641:b50:2::50)
# All scrape targets use AS215932 IPv6 overlay addresses, except dom0 (mgmt IPv4).

global:
  scrape_interval: 30s
  evaluation_interval: 30s

# --- Alerting → Alertmanager (localhost on mon) → noc-agent webhook ---
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["127.0.0.1:9093"]

rule_files:
  - /etc/prometheus/rules.d/*.yml

scrape_configs:
  # --- node_exporter (port 9100) ---
  # System metrics from infrastructure VMs and routers.

  - job_name: node-infra
    static_configs:
      - targets:
          - "[2a0c:b641:b50:2::10]:9100"   # dns
          - "[2a0c:b641:b50:2::20]:9100"   # api
          - "[2a0c:b641:b50:2::30]:9100"   # web
          - "[2a0c:b641:b50:2::40]:9100"   # proxy
          - "[2a0c:b641:b50:2::50]:9100"   # mon (self)
          - "[2a0c:b641:b50:2::60]:9100"   # vpn
          - "[2a0c:b641:b50:2::70]:9100"   # xoa
          - "[2a0c:b641:b50:2::90]:9100"   # mail
          - "[2a0c:b641:b50:2::a0]:9100"   # noc
          - "[2a0c:b641:b50:2::b0]:9100"   # log
          - "[2a0c:b641:b50:2::c0]:9100"   # vault
        labels:
          site: ovh1
          role: infra
      - targets:
          - "[2a0c:b641:b50:2::80]:9100"   # irc
        labels:
          site: ovh1
          role: irc
      - targets:
          - "[2001:41d0:304:300::7bfb]:9100" # ns2
        labels:
          site: ovh-gra11
          role: nameserver

  - job_name: node-routers
    static_configs:
      - targets:
          - "[2a0c:b641:b50:2::1]:9100"    # rtr (via infra address)
        labels:
          site: ovh1
          role: router
      - targets:
          - "[2a0c:b641:b50::a]:9100"      # cr1.nl1
        labels:
          site: nl1
          role: router
      - targets:
          - "[2a0c:b641:b50::b]:9100"      # cr1.de1
        labels:
          site: de1
          role: router

  - job_name: node-hypervisor
    static_configs:
      - targets:
          - "10.0.0.1:9100"                # dom0 (via mgmt bridge)
        labels:
          site: ovh1
          role: hypervisor

  # --- frr_exporter (port 9342) ---
  # BGP session state, route counts, OSPF neighbours.

  - job_name: frr
    static_configs:
      - targets:
          - "[2a0c:b641:b50:2::1]:9342"    # rtr (via infra address)
        labels:
          site: ovh1
      - targets:
          - "[2a0c:b641:b50::a]:9342"      # cr1.nl1
        labels:
          site: nl1
      - targets:
          - "[2a0c:b641:b50::b]:9342"      # cr1.de1
        labels:
          site: de1

  # --- postgres_exporter (port 9187) ---

  - job_name: postgres
    static_configs:
      - targets:
          - "[2a0c:b641:b50:2::20]:9187"   # api VM
        labels:
          db: hyrule

  # --- blackbox_exporter (port 9115, local) ---
  # Probes run from the mon VM itself.

  - job_name: blackbox-icmp
    metrics_path: /probe
    params:
      module: [icmp6]
    static_configs:
      - targets:
          # Routers
          - "2a0c:b641:b50::d"             # rtr loopback
          - "2a0c:b641:b50::a"             # cr1.nl1
          - "2a0c:b641:b50::b"             # cr1.de1
          # Infra VMs
          - "2a0c:b641:b50:2::10"          # dns
          - "2a0c:b641:b50:2::20"          # api
          - "2a0c:b641:b50:2::30"          # web
          - "2a0c:b641:b50:2::40"          # proxy
          - "2a0c:b641:b50:2::60"          # vpn
          - "2a0c:b641:b50:2::c0"          # vault
          # WireGuard link endpoints (far side)
          - "2a0c:b641:b50:ff02::"         # cr1.nl1 side of rtr-nl1 tunnel
          - "2a0c:b641:b50:ff05::"         # cr1.de1 side of rtr-de1 tunnel
          - "2a0c:b641:b50:ff00::"         # cr1.nl1 side of nl1-de1 tunnel
          - "2a0c:b641:b50:ff00::1"        # cr1.de1 side of nl1-de1 tunnel
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "[::1]:9115"

  - job_name: blackbox-dns
    metrics_path: /probe
    params:
      module: [dns_servify]
    static_configs:
      - targets:
          - "2a0c:b641:b50:2::10"          # Knot DNS
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "[::1]:9115"

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "https://hyrule.host/"
          - "https://cloud.hyrule.host/health"
          - "https://grafana.servify.network/api/health"
          - "https://mon.servify.network/"
          - "https://vault.as215932.net/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "[::1]:9115"

  # Internal Vault probe — goes direct to [::c0]:8200, bypassing Caddy.
  # Pair this with the public probe above to distinguish "Caddy down"
  # (public fails, internal ok) from "Vault down" (both fail). Cert SAN
  # doesn't cover the literal IPv6, so this uses http_2xx_skip_verify.
  - job_name: blackbox-vault-internal
    metrics_path: /probe
    params:
      module: [http_2xx_skip_verify]
    static_configs:
      - targets:
          - "https://[2a0c:b641:b50:2::c0]:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "[::1]:9115"

  # --- Centralized logging pipeline (log VM at ::b0) ---
  # Vector exposes its own internal metrics on :8686 (parallel to node_exporter
  # on :9100, scraped via the node-infra job above). Loki exposes ingester /
  # compactor / store metrics on :3100/metrics.

  - job_name: vector
    static_configs:
      - targets:
          - "[2a0c:b641:b50:2::b0]:8686"   # log (Vector aggregator)
        labels:
          site: ovh1
          role: log

  - job_name: loki
    static_configs:
      - targets:
          - "[2a0c:b641:b50:2::b0]:3100"   # log (Loki HTTP /metrics)
        labels:
          site: ovh1
          role: log

  - job_name: noc-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - "[2a0c:b641:b50:2::a0]:8000"   # noc-agent app metrics
        labels:
          site: ovh1
          role: noc
