# Deploy to: /etc/prometheus/rules.d/noc-tripwire.yml on mon
# Minimal rule set so Alertmanager has something to fire end-to-end during noc-agent verification.

groups:
  - name: as215932-tripwires
    interval: 30s
    rules:
      - alert: NodeExporterDown
        expr: up{job=~"node-infra|node-routers|node-hypervisor"} == 0
        for: 2m
        labels:
          severity: critical
          source: prometheus
          notification_route: network
        annotations:
          summary: "node_exporter down on {{ $labels.instance }}"
          description: "Prometheus has been unable to scrape {{ $labels.job }} target {{ $labels.instance }} for 2 minutes."

      - alert: BlackboxICMPDown
        expr: probe_success{job="blackbox-icmp"} == 0
        for: 3m
        labels:
          severity: warning
          source: prometheus
          notification_route: network
        annotations:
          summary: "ICMP probe failing for {{ $labels.instance }}"
          description: "blackbox_exporter ICMPv6 probe to {{ $labels.instance }} has been failing for 3 minutes."

      - alert: BGPSessionDown
        # tynany/frr_exporter v1.11.0: 1=Established, 0=down, 2=admin-down.
        expr: frr_bgp_peer_state != 1
        for: 2m
        labels:
          severity: critical
          source: prometheus
          notification_route: network
        annotations:
          summary: "BGP peer {{ $labels.peer }} not established on {{ $labels.instance }}"
          description: "Peer state is {{ $value }} (1 is Established; 2 is administratively down)."

      - alert: HyruleNetworkProxyDown
        expr: up{job="hyrule-network-proxy"} == 0
        for: 2m
        labels:
          severity: critical
          source: prometheus
          notification_route: network
          public_status: "true"
          public_state: degraded
          public_components: "network_proxy"
        annotations:
          summary: "Hyrule Network Proxy metrics scrape down"
          description: "Prometheus cannot scrape the internal network proxy sidecar on {{ $labels.instance }}. Paid network requests may fail or be preflight-blocked."
          public_title: "Network proxy health unconfirmed"
          public_message: "Live network proxy health checks are unavailable. Requests may still succeed, but some modes could be affected."

      - alert: NOCAgentModelFallbackActive
        expr: increase(noc_agent_model_fallback_attempts_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
          source: prometheus
          notification_route: ai
        annotations:
          summary: "NOC Agent used model fallback"
          description: "The NOC Agent attempted model fallback in the last 10 minutes. Check provider quota/rate-limit metrics and fallback success counters."

      - alert: NOCAgentAllModelsFailing
        expr: increase(noc_agent_model_run_failures_total[10m]) > 0 and increase(noc_agent_model_run_successes_total[10m]) == 0
        for: 10m
        labels:
          severity: critical
          source: prometheus
          notification_route: ai
        annotations:
          summary: "NOC Agent model access is failing"
          description: "The NOC Agent has model failures and no successful model runs in the last 10 minutes. Check /health/model and provider credentials/quotas."
