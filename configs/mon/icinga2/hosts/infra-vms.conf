// /etc/icinga2/conf.d/hosts/infra-vms.conf — AS215932 infrastructure VMs

object Host "dns" {
  address6 = "2a0c:b641:b50:2::10"
  display_name = "dns (Knot DNS)"

  check_command = "ping6"

  vars.os = "Debian"
  vars.site = "ovh1"
  vars.role = "infra"
