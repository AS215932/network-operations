// /etc/icinga2/conf.d/hosts/dom0.conf — XCP-NG hypervisor (underlay-only)
// Reachable via mgmt bridge (enX1 on mon VM, 10.0.0.0/24).

object Host "dom0" {
  address = "10.0.0.1"
  display_name = "dom0 (XCP-NG)"

  check_command = "ping4"

  vars.os = "XCP-NG"
  vars.site = "ovh1"
  vars.role = "hypervisor"
  vars.ssh_port = 22
  vars.prom_instance_node = "10.0.0.1:9100"
}
