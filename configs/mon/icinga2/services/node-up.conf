// /etc/icinga2/conf.d/services/node-up.conf — host liveness via Prometheus scrape state.
// Alerts if node_exporter hasn't been scraped successfully at the most recent interval.
// Catches host down, network partition, and exporter crashes — a stricter signal than
// ICMP or the SSH banner probe alone.

object CheckCommand "prom_up" {
  command = [ PluginDir + "/check_prom_query" ]

  arguments = {
    "-u" = "$prom_url$"
    "-q" = {{
      var inst = macro("$prom_instance$")
      return "up{instance=\"" + inst + "\"}"
    }}
    "-w" = "0.5"
    "-c" = "0.5"
    "-o" = "lt"
    "-n" = "up"
    "-f" = "%d"
  }

  vars.prom_url = "http://localhost:9090"
}

apply Service "node-up" {
  check_command = "prom_up"
  check_interval = 1m
  retry_interval = 30s

  vars.prom_instance = host.vars.prom_instance_node

  assign where host.vars.prom_instance_node
}
