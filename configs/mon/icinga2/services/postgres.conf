// /etc/icinga2/conf.d/services/postgres.conf — PostgreSQL health via Prometheus (postgres_exporter)
// pg_up == 1 when the exporter can reach the server; 0 when the database is down or auth failed.

object CheckCommand "prom_pg_up" {
  command = [ PluginDir + "/check_prom_query" ]

  arguments = {
    "-u" = "$prom_url$"
    "-q" = {{
      var inst = macro("$prom_instance$")
      return "pg_up{instance=\"" + inst + "\"}"
    }}
    "-w" = "0.5"
    "-c" = "0.5"
    "-o" = "lt"
    "-n" = "pg_up"
    "-f" = "%d"
  }

  vars.prom_url = "http://localhost:9090"
}

apply Service "postgres" {
  check_command = "prom_pg_up"
  check_interval = 1m
  retry_interval = 30s

  vars.prom_instance = host.vars.prom_instance_postgres

  assign where host.vars.prom_instance_postgres
}
