// Agent Mail backup health via node_exporter. Timer liveness alone does not
// prove that the quiesced archive, checksum, and restart completed.

object CheckCommand "prom_systemd_not_failed" {
  command = [ PluginDir + "/check_prom_query" ]

  arguments = {
    "-u" = "$prom_url$"
    "-q" = {{
      var inst = macro("$prom_instance$")
      var unit = macro("$systemd_unit$")
      return "node_systemd_unit_state{instance=\"" + inst + "\",name=\"" + unit + "\",state=\"failed\"}"
    }}
    "-w" = "0"
    "-c" = "0"
    "-o" = "gt"
    "-n" = "failed"
    "-f" = "%d"
  }

  vars.prom_url = "http://localhost:9090"
}

object CheckCommand "prom_agent_mail_backup_freshness" {
  command = [ PluginDir + "/check_prom_query" ]

  arguments = {
    "-u" = "$prom_url$"
    "-q" = {{
      var inst = macro("$prom_instance$")
      return "time() - agent_mail_backup_last_success_timestamp_seconds{instance=\"" + inst + "\"}"
    }}
    "-w" = "$backup_warn_seconds$"
    "-c" = "$backup_crit_seconds$"
    "-o" = "gt"
    "-n" = "age_seconds"
    "-f" = "%d"
  }

  vars.prom_url = "http://localhost:9090"
  vars.backup_warn_seconds = 93600
  vars.backup_crit_seconds = 129600
}
