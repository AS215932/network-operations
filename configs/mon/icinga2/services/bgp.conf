// /etc/icinga2/conf.d/services/bgp.conf — FRR BGP session state checks
// Uses check_by_ssh to run vtysh on each router and verify all BGP peers
// are in Established state.

object CheckCommand "check_bgp_ssh" {
  command = [ PluginDir + "/check_by_ssh" ]

  arguments = {
    "-H" = "$address6$"
    "-p" = "$ssh_port$"
    "-l" = "root"
    "-C" = {{
      // On FreeBSD use doas, on Debian use sudo
      if (host.vars.os == "FreeBSD") {
        return "doas vtysh -c 'show bgp ipv6 unicast summary json' | python3 -c \"import sys,json; d=json.load(sys.stdin); peers=d.get('ipV6Unicast',{}).get('peers',{}); down=[p for p,v in peers.items() if v.get('state')!='Established']; sys.exit(2) if down else print(str(len(peers))+' BGP peers established')\""
      } else {
        return "sudo vtysh -c 'show bgp ipv6 unicast summary json' | python3 -c \"import sys,json; d=json.load(sys.stdin); peers=d.get('ipV6Unicast',{}).get('peers',{}); down=[p for p,v in peers.items() if v.get('state')!='Established']; sys.exit(2) if down else print(str(len(peers))+' BGP peers established')\""
      }
    }}
    "-t" = "30"
  }
}

apply Service "bgp-sessions" {
  check_command = "check_bgp_ssh"
  check_interval = 2m
  retry_interval = 30s

  assign where host.vars.has_frr
}
