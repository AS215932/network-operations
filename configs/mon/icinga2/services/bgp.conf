// /etc/icinga2/conf.d/services/bgp.conf — BGP session state via Prometheus (frr_exporter)
// Alerts CRITICAL if any peer on the router is not Established. tynany's
// frr_exporter v1.11.0 emits 1=Established, 0=down, 2=administratively down.

object CheckCommand "prom_bgp" {
  command = [ PluginDir + "/check_prom_query" ]

  arguments = {
    "-u" = "$prom_url$"
    "-q" = {{
      var inst = macro("$prom_instance$")
      // count() is intentional: a down peer's sample value is 0, so sum() would
      // hide it even though the comparison returns that time series.
      return "count(frr_bgp_peer_state{instance=\"" + inst + "\"} != 1) OR on() vector(0)"
    }}
    "-w" = "$bgp_warn$"
    "-c" = "$bgp_crit$"
    "-o" = "gt"
    "-n" = "peers_down"
    "-f" = "%d"
  }

  vars.prom_url = "http://localhost:9090"
  // Any single peer down is CRITICAL; thresholds are strict-gt, so 0.5 trips on count>=1.
  vars.bgp_warn = "0.5"
  vars.bgp_crit = "0.5"
}

apply Service "bgp-sessions" {
  check_command = "prom_bgp"
  check_interval = 2m
  retry_interval = 30s

  vars.prom_instance = host.vars.prom_instance_frr

  assign where host.vars.has_frr && host.vars.prom_instance_frr
}
