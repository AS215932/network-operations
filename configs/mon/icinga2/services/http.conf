// /etc/icinga2/conf.d/services/http.conf — HTTP endpoint checks

apply Service "http-api-health" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s

  vars.http_vhost = "api.servify.network"
  vars.http_address = "api.servify.network"
  vars.http_uri = "/health"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true

  assign where host.name == "api"
}

apply Service "http-web" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s

  vars.http_vhost = "servify.network"
  vars.http_address = "servify.network"
  vars.http_uri = "/"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true

  assign where host.name == "web"
}

apply Service "http-grafana" {
  check_command = "http"
  check_interval = 2m
  retry_interval = 1m

  vars.http_vhost = "grafana.servify.network"
  vars.http_address = "grafana.servify.network"
  vars.http_uri = "/api/health"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true

  assign where host.name == "mon"
}

apply Service "http-as215932-net" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s

  vars.http_vhost = "as215932.net"
  vars.http_address = "as215932.net"
  vars.http_uri = "/"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true
  // Guard against silent blank-page regressions on the static site.
  vars.http_expect_body_regex = "AS215932"

  assign where host.name == "web"
}
