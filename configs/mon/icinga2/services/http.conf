// /etc/icinga2/conf.d/services/http.conf — HTTP endpoint checks
//
// Two layers of checks per public service:
//   - http-<name>          public HTTPS via Caddy (proxy ::40, TLS, SNI, public DNS)
//   - http-<name>-backend  direct to the upstream listener over the infra bridge,
//                          bypassing Caddy. Lets us tell Caddy faults from app faults.
// Plus tcp-proxy-443 to disambiguate "Caddy down" from "Caddy slow".
//
// max_check_attempts=3 + retry_interval=30s means a transient blip needs ~1 minute
// of consistent failure before going HARD CRITICAL. http_timeout=15 keeps us above
// the plugin default (10s) so we don't blame Caddy for a 10.1s response.

apply Service "http-api-health" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_vhost = "api.servify.network"
  vars.http_address = "api.servify.network"
  vars.http_uri = "/health"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true
  vars.http_timeout = 15

  assign where host.name == "api"
}

apply Service "http-api-health-backend" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_address = "2a0c:b641:b50:2::20"
  vars.http_port = 8402
  vars.http_uri = "/health"
  vars.http_vhost = "api.servify.network"
  vars.http_ssl = false
  vars.http_ipv6 = true
  vars.http_timeout = 15

  assign where host.name == "api"
}

apply Service "http-web" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_vhost = "servify.network"
  vars.http_address = "servify.network"
  vars.http_uri = "/"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true
  vars.http_timeout = 15

  assign where host.name == "web"
}

apply Service "http-web-backend" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_address = "2a0c:b641:b50:2::30"
  vars.http_port = 8080
  vars.http_uri = "/"
  vars.http_vhost = "servify.network"
  vars.http_ssl = false
  vars.http_ipv6 = true
  vars.http_timeout = 15

  assign where host.name == "web"
}

apply Service "http-grafana" {
  check_command = "http"
  check_interval = 2m
  retry_interval = 1m
  max_check_attempts = 3

  vars.http_vhost = "grafana.servify.network"
  vars.http_address = "grafana.servify.network"
  vars.http_uri = "/api/health"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true
  vars.http_timeout = 15

  assign where host.name == "mon"
}

apply Service "http-as215932-net" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_vhost = "as215932.net"
  vars.http_address = "as215932.net"
  vars.http_uri = "/"
  vars.http_ssl = true
  vars.http_sni = true
  vars.http_ipv6 = true
  vars.http_timeout = 15
  // Guard against silent blank-page regressions on the static site.
  vars.http_expect_body_regex = "AS215932"

  assign where host.name == "web"
}

apply Service "http-as215932-net-backend" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_address = "2a0c:b641:b50:2::30"
  vars.http_port = 8081
  vars.http_uri = "/"
  vars.http_vhost = "as215932.net"
  vars.http_ssl = false
  vars.http_ipv6 = true
  vars.http_timeout = 15
  vars.http_expect_body_regex = "AS215932"

  assign where host.name == "web"
}

// L4 reachability of the Caddy listener. If this passes while http-* fails,
// Caddy is up but stalling on the request path (most likely the upstream).
apply Service "tcp-proxy-443" {
  check_command = "tcp"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.tcp_address = "2a0c:b641:b50:2::40"
  vars.tcp_port = 443
  vars.tcp_ipv6 = true
  vars.tcp_timeout = 5

  assign where host.name == "proxy"
}
