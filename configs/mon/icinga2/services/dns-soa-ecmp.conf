// /etc/icinga2/conf.d/services/dns-soa-ecmp.conf
//
// ECMP-aware DNS SOA reachability — issue #27. The legacy `dns-soa-*`
// checks fire one dig from mon; kernel ephemeral source port hashes onto
// one of two ECMP next-hops on rtr (wg0 → cr1-nl1, wg1 → cr1-de1). When
// one path breaks, ~50% of probes fail and Icinga sees flap. This check
// sweeps source ports across both halves and reports per-path success.

object CheckCommand "dns_soa_ecmp" {
  // Deployed to mon by ansible/roles/icinga2 (see install.yml: install
  // notify scripts → /etc/icinga2/scripts).
  command = [ "/etc/icinga2/scripts/check_dns_soa_ecmp.py" ]

  arguments = {
    "-H" = "$dns_soa_ecmp_host$"
    "-z" = "$dns_soa_ecmp_zone$"
    "-n" = {
      value = "$dns_soa_ecmp_probes_per_half$"
      set_if = "$dns_soa_ecmp_probes_per_half$"
    }
    "-t" = {
      value = "$dns_soa_ecmp_timeout$"
      set_if = "$dns_soa_ecmp_timeout$"
    }
    "-6" = {
      set_if = "$dns_soa_ecmp_ipv6$"
    }
  }
}

apply Service "dns-soa-ecmp-servify" {
  check_command = "dns_soa_ecmp"
  check_interval = 5m
  retry_interval = 1m

  vars.dns_soa_ecmp_host = "2001:41d0:304:300::7bfb"
  vars.dns_soa_ecmp_zone = "servify.network"
  vars.dns_soa_ecmp_ipv6 = true
  vars.dns_soa_ecmp_probes_per_half = "15"

  notes = "Per-ECMP-half SOA query for servify.network from mon. Catches single-path-down failures the legacy dns-soa-* check sees as ~50% flap."

  assign where host.name == "ns2"
}

apply Service "dns-soa-ecmp-as215932" {
  check_command = "dns_soa_ecmp"
  check_interval = 5m
  retry_interval = 1m

  vars.dns_soa_ecmp_host = "2001:41d0:304:300::7bfb"
  vars.dns_soa_ecmp_zone = "as215932.net"
  vars.dns_soa_ecmp_ipv6 = true
  vars.dns_soa_ecmp_probes_per_half = "15"

  notes = "Per-ECMP-half SOA query for as215932.net from mon."

  assign where host.name == "ns2"
}
