// /etc/icinga2/conf.d/services/dns.conf — DNS resolution checks

// Check authoritative DNS on Knot (::10)
apply Service "dns-resolution" {
  check_command = "dns"
  check_interval = 1m
  retry_interval = 30s

  vars.dns_lookup = "servify.network"
  vars.dns_record_type = "AAAA"
  vars.dns_expected_answer = "2a0c:b641:b50:2::40"
  vars.dns_server = "2a0c:b641:b50:2::10"

  assign where host.name == "dns"
}

// Check zone transfer health (SOA query)
apply Service "dns-soa" {
  check_command = "dns"
  check_interval = 5m
  retry_interval = 1m

  vars.dns_lookup = "servify.network"
  vars.dns_record_type = "SOA"
  vars.dns_server = "2a0c:b641:b50:2::10"

  assign where host.name == "dns"
}
