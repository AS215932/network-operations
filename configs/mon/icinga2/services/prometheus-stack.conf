// /etc/icinga2/conf.d/services/prometheus-stack.conf — mon's own monitoring
// daemons.
//
// Prometheus (alert evaluation) and Alertmanager (alert delivery to the
// noc-agent webhook + Discord) both run on mon. If either dies, alerting fails
// silently: Prometheus stops evaluating rules, or it keeps firing into a dead
// 127.0.0.1:9093 socket with nothing delivered. Icinga is a *separate* delivery
// path (Discord + noc-agent, see notifications.conf), so it still pages when the
// Prometheus stack itself is down — the watchdog can't depend on the thing it
// watches. See network-operations#385 (and #382/#383/#384 for the stack itself).
//
// check_http runs on the mon master (no command_endpoint) against the local
// /-/healthy endpoints. Both daemons listen on IPv4 loopback — Alertmanager is
// pinned to 127.0.0.1:9093 by the alertmanager role, and Prometheus's default
// listener (:9090) is the same localhost:9090 the prom_* checks already query —
// so http_address is 127.0.0.1 (IPv4), not ::1.

apply Service "prometheus-health" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_address = "127.0.0.1"
  vars.http_port = 9090
  vars.http_uri = "/-/healthy"
  vars.http_ssl = false
  vars.http_timeout = 10

  assign where host.name == "mon"
}

apply Service "alertmanager-health" {
  check_command = "http"
  check_interval = 1m
  retry_interval = 30s
  max_check_attempts = 3

  vars.http_address = "127.0.0.1"
  vars.http_port = 9093
  vars.http_uri = "/-/healthy"
  vars.http_ssl = false
  vars.http_timeout = 10

  assign where host.name == "mon"
}
