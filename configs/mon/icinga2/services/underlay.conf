// /etc/icinga2/conf.d/services/underlay.conf — underlay reachability checks
//
// Overlay (AS215932) reachability doesn't prove the router's underlay (hosting
// provider) is healthy: overlay traffic can transit the WG mesh via a sibling
// router even when the direct underlay path is broken. Ping the underlay IPv6
// endpoint from mon so a single-site underlay outage surfaces clearly instead
// of hiding behind a ping-OK overlay path.
//
// IPv4 is not checked: mon is IPv6-only; it reaches the IPv4 internet only via
// NAT64 (64:ff9b::/96), which a ping4 plugin can't target.

apply Service "underlay-ipv6" {
  check_command = "ping6"
  check_interval = 2m
  retry_interval = 30s

  vars.ping_address = host.vars.underlay_address6

  assign where host.vars.underlay_address6
}
