// /etc/icinga2/conf.d/services/ssh.conf — SSH accessibility checks

apply Service "ssh" {
  check_command = "ssh"
  check_interval = 2m
  retry_interval = 30s

  vars.ssh_port = host.vars.ssh_port
  if (host.vars.ssh_address) {
    vars.ssh_address = host.vars.ssh_address
  }
  if (host.vars.ssh_ipv6) {
    vars.ssh_ipv6 = host.vars.ssh_ipv6
  }

  assign where host.vars.ssh_port
}
