// /etc/icinga2/conf.d/services/wireguard.conf — WireGuard mesh link checks
// Ping the far side of each WireGuard /127 link to verify tunnel health.

apply Service "wg-rtr-to-nl1" {
  check_command = "ping6"
  check_interval = 2m
  retry_interval = 30s

  // rtr wg0 (::ff02::1) -> cr1.nl1 wg3 (::ff02::)
  vars.ping_address = "2a0c:b641:b50:ff02::"

  assign where host.name == "rtr.ovh1"
}

apply Service "wg-rtr-to-de1" {
  check_command = "ping6"
  check_interval = 2m
  retry_interval = 30s

  // rtr wg1 (::ff05::1) -> cr1.de1 wg1 (::ff05::)
  vars.ping_address = "2a0c:b641:b50:ff05::"

  assign where host.name == "rtr.ovh1"
}

apply Service "wg-nl1-to-de1" {
  check_command = "ping6"
  check_interval = 2m
  retry_interval = 30s

  // cr1.nl1 wg0 (::ff00::) -> cr1.de1 wg0 (::ff00::1)
  vars.ping_address = "2a0c:b641:b50:ff00::1"

  assign where host.name == "cr1.nl1"
}
