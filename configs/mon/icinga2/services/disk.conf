// /etc/icinga2/conf.d/services/disk.conf — Disk space via Prometheus (node_exporter)
// Queries node_filesystem_*_bytes from local Prometheus; no SSH, no remote plugin exec.

object CheckCommand "prom_disk" {
  command = [ PluginDir + "/check_prom_query" ]

  arguments = {
    "-u" = "$prom_url$"
    "-q" = {{
      var inst = macro("$prom_instance$")
      var mnt = macro("$disk_mountpoint$")
      return "min(node_filesystem_avail_bytes{instance=\"" + inst + "\",mountpoint=\"" + mnt + "\",fstype!~\"tmpfs|overlay|squashfs\"} / node_filesystem_size_bytes{instance=\"" + inst + "\",mountpoint=\"" + mnt + "\",fstype!~\"tmpfs|overlay|squashfs\"})"
    }}
    "-w" = "$disk_warn$"
    "-c" = "$disk_crit$"
    "-o" = "lt"
    "-n" = "free_ratio"
    "-f" = "%.3f"
  }

  vars.prom_url = "http://localhost:9090"
  vars.disk_warn = "0.2"
  vars.disk_crit = "0.1"
}

apply Service "disk " for (disk_name => disk_config in host.vars.disks) {
  check_command = "prom_disk"
  check_interval = 10m
  retry_interval = 5m

  vars.prom_instance = host.vars.prom_instance_node
  vars.disk_mountpoint = disk_config.mountpoint

  assign where host.vars.disks && host.vars.prom_instance_node
}
