// /etc/icinga2/conf.d/services/disk.conf — Disk space checks via SSH

apply Service "disk " for (disk_name => disk_config in host.vars.disks) {
  check_command = "by_ssh_disk"
  check_interval = 10m
  retry_interval = 5m

  vars += disk_config
  vars.by_ssh_host = host.address6

  assign where host.vars.disks
}

// Custom check command: check disk via SSH
object CheckCommand "by_ssh_disk" {
  command = [ PluginDir + "/check_by_ssh" ]

  arguments = {
    "-H" = "$by_ssh_host$"
    "-p" = "$ssh_port$"
    "-l" = "root"
    "-C" = {{
      return "/usr/lib/nagios/plugins/check_disk -w 20% -c 10% -p " + macro("$disk_partitions$")
    }}
    "-t" = "30"
  }
}
