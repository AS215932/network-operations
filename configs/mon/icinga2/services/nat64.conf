// /etc/icinga2/conf.d/services/nat64.conf — NAT64/DNS64 reachability test
// Verifies the full Jool + Unbound pipeline: mon VM sends an IPv6 packet to
// the NAT64 prefix (64:ff9b::5db8:d822 = 93.184.216.34 / example.com),
// Jool translates it to IPv4, and the ICMP reply comes back.

apply Service "nat64-ipv4-reachability" {
  check_command = "ping4"
  check_interval = 5m
  retry_interval = 1m

  // Ping the IPv4 address directly — the mon VM's DNS64 resolver will
  // synthesize the AAAA, and Jool on rtr handles translation.
  vars.ping_address = "93.184.216.34"

  assign where host.name == "rtr.ovh1"
}
