// /etc/icinga2/conf.d/services/nat64.conf — NAT64/DNS64 reachability test
//
// Exercises the full Jool + Unbound + VRF-leak pipeline: mon (overlay,
// IPv6-only) sends a ping6 to the embedded NAT64 address for 1.1.1.1, the
// forward VRF rule hands the packet to Jool, Jool translates to IPv4, and
// the reply comes back through the return rule. Any failure along the
// chain (Jool down, missing pool4 proto, missing VRF rules, failover IP
// unbound, upstream IPv4 broken) turns this check critical.
//
// Target choice: 1.1.1.1 is always up and answers ICMP, so a failure
// reflects our pipeline, not the target. The service runs on rtr because
// rtr owns the NAT64 components — but the check itself executes from mon
// so overlay -> Jool -> WAN path is actually traversed.

apply Service "nat64-ipv4-reachability" {
  check_command = "ping6"
  check_interval = 5m
  retry_interval = 1m

  // 64:ff9b::0101:0101 == embedded 1.1.1.1
  vars.ping_address = "64:ff9b::0101:0101"

  assign where host.name == "rtr.ovh1"
}
