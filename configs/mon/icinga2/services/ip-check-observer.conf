// Active end-to-end probes for the public, binding-only STUN observer.

object CheckCommand "stun_binding" {
  command = [ "/etc/icinga2/scripts/check_stun_binding.py" ]
  arguments = {
    "-H" = "$stun_host$"
    "-p" = "$stun_port$"
    "-4" = { set_if = "$stun_ipv4$" }
    "-6" = { set_if = "$stun_ipv6$" }
  }
}

apply Service "ip-check-stun-ipv4" {
  check_command = "stun_binding"
  check_interval = 2m
  retry_interval = 30s
  vars.stun_host = "stun.hyrule.host"
  vars.stun_port = "3478"
  vars.stun_ipv4 = true
  notes = "Real RFC 5389 binding request over IPv4; coturn relay allocation is disabled."
  assign where host.name == "proxy"
}

apply Service "ip-check-stun-ipv6" {
  check_command = "stun_binding"
  check_interval = 2m
  retry_interval = 30s
  vars.stun_host = "stun.hyrule.host"
  vars.stun_port = "3478"
  vars.stun_ipv6 = true
  notes = "Real RFC 5389 binding request over IPv6; coturn relay allocation is disabled."
  assign where host.name == "proxy"
}
