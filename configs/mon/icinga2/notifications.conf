// /etc/icinga2/conf.d/notifications.conf — Notification configuration
// Placeholder — configure notification targets (email, webhook) post-deployment.

object User "admin" {
  display_name = "Admin"
  // email = "admin@servify.network"
  states = [ OK, Warning, Critical, Unknown ]
  types = [ Problem, Recovery ]
}

object UserGroup "admins" {
  display_name = "Admin Group"
  assign where user.name == "admin"
}

