# /etc/rc.conf — cr1-ch1.as215932.net
# FreeBSD 14.4 at Securebit CH. No secrets in this file.

hostname="cr1-ch1.as215932.net"

# Securebit transit / management underlay on vmx0.
ifconfig_vmx0="DHCP"
ifconfig_vmx0_ipv6="inet6 2a09:4c0:100:2d88::8898 prefixlen 64"
ipv6_defaultrouter="2a09:4c0:100:2d88::8bfe"

# 4IXP peering LAN on vmx1. Provider-assigned MAC: c0:ff:2d:88:88:98.
# IPv6-only BGP; no IPv4 address configured intentionally.
ifconfig_vmx1="up"
ifconfig_vmx1_ipv6="inet6 2001:7f8:d0::3:4b7c:1 prefixlen 64"

# SBIX Zurich peering LAN on vmx2. Provider-assigned MAC: c0:01:2d:88:88:98.
ifconfig_vmx2="inet 185.1.135.139 netmask 255.255.255.0"
ifconfig_vmx2_ipv6="inet6 2001:7f8:d9:1::3:4b7c:2 prefixlen 64"

ipv6_activate_all_interfaces="YES"
gateway_enable="YES"
ipv6_gateway_enable="YES"

pf_enable="YES"
pflog_enable="YES"

frr_enable="YES"
frr_daemons="zebra bgpd ospf6d staticd mgmtd"
frr_vtysh_boot="YES"

wireguard_enable="YES"
wireguard_interfaces="wg0 wg1 wg2"
wireguard_wg0_ips="fe80::3/64 2a0c:b641:b50:ff06::/127"
wireguard_wg0_mtu="1420"
wireguard_wg0_routes=""
wireguard_wg1_ips="fe80::3/64 2a0c:b641:b50:ff07::1/127"
wireguard_wg1_mtu="1420"
wireguard_wg1_routes=""
wireguard_wg2_ips="fe80::3/64 2a0c:b641:b50:ff08::1/127"
wireguard_wg2_mtu="1420"
wireguard_wg2_routes=""

node_exporter_enable="YES"
frr_exporter_enable="YES"
